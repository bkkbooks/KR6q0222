front:
  text: 解惑編序佛之智洵難測度也哉能測者誰惟佛與佛矣諸大菩薩尚不能得其倣佛況降斯以下而許少思議者乎嗚呼衆生福薄鮮具信根甘自伶俜難為教化勞我釋尊大慈悲父出世援拔法說三乘然而有耳曾聞有眼曾視者千萬人中未易多為屈指也所謂終日戴天不知天之高終日履地不知地之厚流離瑣尾窮子何歸慈父憫念而襁褓之吾曹日在襁褓中而竟忘其所自而奚慚為軹耶今夫坐井觀天者心惟計天如許大耳初不知其無涯涘焉有告以無涯涘者弗信也告者曰何物老嫗産此愚人良以見識有限執一不通故對醯雞而語滄海雖費盡無量至言終叵令其無疑也何也彼畢生所由不過是也則凡囿於見聞而不信有佛道可成者亦若是則已矣牟子所謂少所見多所怪睹馲駝言馬腫背莊子所謂鵬飛九萬里而圖南而取笑于蜩鳩者也豫不敏身出東官官之人多崇佛道豫自齠齔便識佛名稍長輒遊梵剎粗覽佛書頗諳佛教為最上事遂欲作上人弗果洎以一官羇縻益不遑滿願為悵今老矣無能為也惟是慕道之心未嘗少置每歎吾生也晚且處邊地不獲於靈山會上親聞佛說法為悲更悲夫同吾生者辨髦至道惑於偏邪排難繽紛牢莫能解思著一書解之而靡暇也先年偶從禪者得解惑編云是鼎湖在和尚所集撫掌欣欣先得我心之所同然也閲畢翹空作禮曰在大師為再來大士者歟非耶抑天生以救斯民於未溺也夫惑亦衆矣解之雖不乏人然皆散出于各典曾未有搜而裒之以為世之良導故閲者未便得其全理以互絶其狐疑焉縱間或遇一二章均不足以感發前人之趣向惟和尚以度世婆心而編輯之集大成以壽梓流通于六合寰中普使人人咸皆屬目惡知不有若干頑疲舊習被其打動去妄歸真而直躋于無上之域者乎其為功也詎不韙哉和尚著書百餘卷進意此為度人之妙術云賜進士出身奉政大夫修正庶尹吏部考功清吏司郎中加一級壬寅大計掌察補理驗封司郎中事前驗封司郎中文選司員外郎文選司主事庚子欽差典試陝西正主考兵部職方司督捕主事法弟子東湖尹源進頓首拜題解惑編目録卷上之上吳太宰嚭釋迦如來降誕釋迦如來滅度法流震旦漢桓帝楚王理惑論曹植闞澤東晉袁宏孫綽略録何尚之范泰北魏孝文帝南齊高帝蕭子良梁武帝梁昭明沈約家訓歸心篇陳武帝文帝隋高祖王通李士謙喻報說楊素唐高祖太宗高宗卷上之下中宗玄宗肅宗代宗德宗憲宗穆宗宣宗懿宗內德論虞世南吳道子張仲素魯山令孟簡答韓書柳宗元李翱庾承宣裴休丞相李商隱非韓篇吳越王趙王鎔五代宋太祖太宗真宗仁宗英宗徽宗孝宗呂蒙正楊億王安石司馬光學士李屏山卷下之上歐陽修周惇頤程皓杜衍李遵勗李覯劉安世護法論王十朋朱熹屏山李居士鳴道集說序三教平心論元世祖成宗王磐趙孟俯胡長孺韓性卷下之下明太祖高皇帝遊寺記祭寶志禪師文維摩居士讚禪海羅漢讚續原教論太宗文皇帝神宗顯皇帝尚直尚理編李卓吾簡諸宰輔敘佛教隆替狀三報論三報證驗現報生報後報解惑編目録終
