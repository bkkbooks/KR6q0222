body:
  text: 廣州南海寶象林沙門弘贊在犙編歐陽修字永叔出諸集傳嘉祐初參大政諡文忠晚年卜居於穎號六一居士遊廬山入東林圓通謁祖印禪師居訥修初至訥揖就坐相與論辯修慕韓子有攘斥佛老之言訥因謂曰退之以排佛為功自比孟子之距楊墨其好勝取名之甚退之斥佛為夷鬼者請略辯之佛聖人也降自兜率託生中天聖王之家何以夷稱佛之不生不滅曠劫常存人天宗仰何以鬼稱此非大慢之語乎退之七世祖諱耆當後魏永興自赫連屈丐來降於拓拔氏由西戎而歸北狄退之獨不為祖諱而敢訕佛聖人乎退之畏修史褒貶之禍而不知訕佛之過為尤可畏退之唱排佛老足下今又和之將使後世好名之士援韓氏歐陽氏以為法豈不為盛德之累諺曰善罵人者人亦善罵之足下著本論孳孳以毀佛為務安得眾口不毀公於天聽之前乎足下之言以蒐狩喪祭鄉社之禮為勝佛之本是猶退之作原道論而實未知道也修驚赧謝曰修胸中已釋然師將何以見教訥曰佛道以悟心為本足下屢生體道特以失念生東華為名儒偏執世教故忘其本誠運聖凡平等之心默默體會頓祛我慢悉悔昨非觀榮辱之本空了生死於一致則淨念常明天真獨露始可問津於此道耳修自此有省發及參大政每譽訥於公卿之前歲時書問未嘗絕出歐陽外傳韓琦以明教嵩禪師輔教編示公公覽其文謂韓公曰不意僧中有此郎不惟空宗通亦乃文格高即黎明當一識之琦同師往見公與語終日大喜出輔教編序公昔官洛中遊嵩山卻僕吏放意而往至一寺修竹滿軒風物鮮明公休於殿陛旁有老僧閱經自若與語不甚顧答公異之曰住山久乎僧曰甚久又問誦何經曰法華公曰古之高僧臨死生之際類皆談笑脫去何道致之曰定慧力耳又問今乃寂寥無有何哉老僧笑曰古人念念在定慧臨終安得散亂今人念念在散亂臨終安得定公大歎服出資治鑑嘉祐六年閏八月公為參政兼譯經潤文使既登三府多病嘗夢至一所十人冠冕環坐一人曰參政安得至此宜速返舍公出門數步復往問之君等豈非釋氏所謂十王者乎曰然因問世人飯僧誦經為亡人追福果有益乎曰安得無益既寤病愈自是深信佛法丹陽葛勝仲得此說於簡齋陳與義與義得於公之孫恕昭然也出歐公狀及韻語陽秋浮山法遠禪師號圓鑑時師住舒州歐陽修公聞師奇逸造其室未有以異之與客碁師坐其旁文忠遽收局請因碁說法師即令撾鼓陞座曰若論此事如兩家著碁相似何謂也敵手知音當機不讓若是綴五饒三又通一路始得有一般底秪解閉門作活不能奪角衝關硬節與虎口齊彰局破徒勞綽斡所以道肥邊易得瘦肚難求思行則往往失黏心麤而時時頭撞休誇國手謾說神仙贏局輸籌即不問且道黑白未分時一著落在甚麼處良久曰從來十九路迷悟幾多人文忠嘉歎久之從容謂同僚曰修初疑禪語為虛誕今見此老機緣所得所造非悟明於心地安能有此妙旨哉此僧寶傳并塔碑公居穎州捐酒肉徹聲色灰心默坐令老兵往近寺借華嚴經誦至八卷乃薨出王性之言性之名銍汝陰人其父從學于公故得其實斡音管轉也旋也運也南唐劉煦授司空平章事撰舊唐史凡佛祖異跡皆載之宋歐陽修撰唐書始皆刪去靜齋學士劉謐曰歐陽文忠公今之韓愈也後世經生學士不及詳考韓歐之是非而徒傚韓歐之詆佛凡唐人歸向佛教而欽從敬信者公則極其貶斥其名卿賢大夫多與禪衲遊有機緣事跡者公則憤憤削去而不書鎧菴曰君舉必書故曰史史者所以記當時失得之跡也以故惡如弒君必書醜如蒸母必書豈以其醜惡而不之記耶是知修史者不沒其當時善惡之事斯可為信史也昔范曄著漢書西域傳始論佛法陳壽志三國則忽而不錄唐太宗修晉書於沙門高行時有所取魏收於北史著佛老志李延壽於南史作顧懽傳凡帝王公卿毀讚佛老者莫不悉載其於二教之偏正優劣當年今日未嘗不明識所歸歐陽氏之修唐書五代史也於佛老之事則刪之夫唐書唐家之正史非歐陽之私書也假使不足法論之可也豈當以己所不好而悉刪之耶是知無通識者不足以當修史之任也夫佛法之取舍大較係乎人之好惡韓歐司馬始不好佛遇事立言必有詆訶及退之問道於大顛永叔聞法於圓通君實廣文中子之言而作解禪偈六首可見矣出統紀周惇頤字茂叔號濂溪諡元公出性理群書濂初扣黃龍南禪師教外別傳之旨南諭濂略曰只消向你自家屋裡打點孔子謂朝聞道夕死可矣畢竟以何為道夕死可耶顏子不改其樂所樂者何事但於此究竟久久自然有箇契合處濂一日扣問佛印元禪師曰畢竟以何為道元曰滿目青山一任看濂擬議元呵呵笑而已濂脫然有省有偈呈師濂聞東林總禪師得竹林壽涯禪師麻衣道者二師心傳易學窮神極性由是扣之總諭濂其略曰吾佛謂實際理地即真實無妄真而無妄即誠也大哉乾元萬物資始資此實理乾道變化各正性命正此實理天地聖人之道至誠而已必要著一路實地工夫直至于一旦豁然悟入不可只在言語上會云云橫渠曰東林性理之論惟我茂叔能之濂問太極總曰易在先天無形有理蓋太極即易也無形之理即無極也天地間只是一氣進退而為四時以一氣言之皆元之為也濂問太極圖之所由總曰竹林壽涯禪師得國一禪師之心傳其來遠矣非言事物而言至理當時建圖之意據吾教中依空立世界以無為萬有之祖以無為因以有為果以真為體以假為用故云無極之真妙合而凝濂諭學者曰吾此妙心實得啟迪於南老發明於佛印易道義理廓達之說若不得東林開遮拂拭斷不能表裏洞然該貫弘博矣濂往潮州靈山見韓子上大顛書累幅併存及留衣亭故題詩曰退之自謂如夫子原道深排釋老非不識大顛何似者數書珍重更留衣濂晚年悉屏文字依東林教人惟務靜勝終日端坐於是靜中有得道學性理之始實倡於涯師而至於總師總以授周子後村劉先生詩云濂溪學得自高僧又云始知周孔外別自有英豪濂傳太極圖於穆修修傳於种放放傳於陳摶此其學之師也蓋摶師於麻衣今正易心法是摶註麻衣涯公之傳東林總公廣之也總公門人弘益有書曰紀聞云性理之學實起於東林涯總二師總以授周子後虞伯生亦云宋儒惟濂溪康節二公於佛書早有所得出公行狀并指要程顥字伯淳弟頤字正叔號伊川出雲蓋寺石刻神宗朝為監察御史諡曰明道公深味華嚴合論自謂有所心融意會為喜以其所由書於雲蓋寺公每見釋子讀佛書端莊整肅乃語學者曰凡看經書必當如此今之讀書者形容先自怠惰了如何存主得出性學旨要明道以亡母壽安院君忌辰往西京長慶寺修冥福躬預齋席見眾僧入堂周旋步武威儀濟濟伐鼓敲鐘內外肅靜一坐一起並準清規公歎曰三代禮樂盡在是矣出弘益紀聞伊川元豐末以通直郎授崇政殿說書入侍經筵一日言聞陛下宮中盥而避蟻有是乎帝曰然深恐傷之耳頤曰推此心以及四海帝王之要道也嘗致書於靈源清禪師叩問禪要師答書略曰妄承過聽以知道者見期雖未一奉目擊之懽聞公留心此道甚久天下大宗匠歷叩殆遍乃猶以鄙人未見為不足頃年間有聞先師言公見處今覽法要後序深觀信入真實不虛也出靈源語錄紹聖二年六月九日韶州南華重辯禪師請蘇軾書柳宗元撰六祖禪師碑軾題其後曰釋迦以文設教其譯於中國必託於儒之能言者故大乘諸經至楞嚴則委曲精盡勝妙獨出者以房融筆受故也柳宗元南遷始究佛法作曹溪南嶽諸碑妙絕古今自唐以來頌述祖師者多矣未有通亮簡正如宗元者蓋推本其言與孟軻氏合其可不使學者晝見而夜誦之出稽古略杜衍出統紀衍字世昌越州山陰人慶曆中拜相時號清白宰相封祁國公以張方平好佛常笑怪之有醫士朱生游二公門一日公呼朱診脈朱謂使者曰往白公言看楞嚴經未了及到揖坐謂曰老夫以君疏通不意近亦闒茸聖人微言無出孔孟所謂楞嚴何等語耶朱曰公未讀此經何知不及孔孟因袖中出其卷公觀之不覺終軸大驚曰方平知之不以告我即命駕見之方平曰譬如失物忽已得之但當喜其得不必悔其晚也李遵勗字用和出傳燈錄探索宗要有年頓明大法偈曰參禪須是鐵漢著手心頭便判直趣無上菩提一切是非莫管又讚佛詩云仲尼推大聖老氏稱古皇天上及天下應更無比量老子西昇經云吾師古皇先生化遊天竺善入泥洹符子云老氏之師名釋迦文佛不出家為金轉輪王統四天下隨輪飛行名飛行皇帝故云古皇也李覯字泰伯陳師道瑩中文集覯旰江人時稱大儒皇祐間充太學說書嘗著潛書力於排佛嵩公攜護教編謁之覯方留心讀佛經乃悵然曰吾輩議論尚未及一卷心經佛道豈易知耶陳師道號後山居士元符三年詔治泰陵又修少林寺為記略曰孔氏之門顏閔冉皆無傳仲弓之後有荀卿曾參之後有孟軻端木賜之後有莊休而荀孟莊之後無聞焉李氏之傳關尹尹之傳復無聞焉釋自能仁二十八世而為達磨又六世為曹溪至於今又十有五世矣而儒老子之徒欲校源委誤矣出後山集劉安世字器之號元城鳴道集元祐中為中書舍人嘗曰古今大儒著論毀佛法者蓋有說也且彼尾重則此首輕今為儒佛弟子者各主其教猶鼎足也令一足失可乎世之小儒不知此理見前輩或毀佛教亦從而詆之以為佛法皆無足取非也今士大夫多以禪為戲此事乃佛究竟之法豈可戲而為一笑之資乎此亦宜深戒乃至云世事有大於生死者乎此事獨一味理會生死有箇見處則貴賤禍福輕矣護法論丞相張商英無盡居士撰孔子曰朝聞道夕死可矣以仁義忠信為道耶則孔子固有仁義忠信矣以長生久視為道耶則曰夕死可矣是果求聞何道哉豈非大覺慈尊識心見性無上菩提之道也不然則列子何以謂孔子曰丘聞西方有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉列子學孔子者也而遽述此說信不誣矣孔子聖人也尚尊其道而今之學孔子者未讀百十卷之書先以排佛為急務者何也或曰梁武一生奉佛後致亡國喪身何也無盡曰不明定業之人誠為可愍昔日嵩嶽珪禪師云佛有三能三不能佛能空一切相成萬法智而不能既滅定業佛能知群有性窮億劫事而不能化導無緣佛能度一切有情而不能盡眾生界是謂三能三不能也今有心憤憤口悱悱聞佛似寇讎見僧如蛇虺者吾末如之何也已矣且佛尚不能化導無緣吾如彼何哉議者皆謂梁武奉佛而亡國蓋不探佛理者未足與議也國祚之短長世數之治亂吾不知其然矣堯舜大聖而國止一身其禪位者以其子之不肖而後禪也其子之不肖豈天罪之歟自開闢至漢明帝以前佛法未至於此而國有遇難者何也唐張燕公所記梁朝四公者能知天地鬼神變化之事了如指掌而昭明太子亦聖人之徒也且聖者以治國治天下為緒餘耳豈無先覺之明而慎擇可行之事以告武帝哉蓋定業不可逃矣嗚呼定業之不可作也猶水火之不可入也其報之來若四時之無爽也如西土師子尊者此土二祖大師皆不免也又豈直師子二祖哉蓋修也者改往修來矣且宿業既還已則將來之善豈捨我哉今夫為女形者實劣於男矣遽欲奉佛而可亟變為男子乎必將盡此報身而願力有待於後世乎梁武壽高八十有六不為不多以至病卒不至大惡但捨身之謬以其先見禍兆筮得乾卦上九之變取其貴而無位高而無民以此自卑欲圖弭災召福者梁武自謬耳於佛何有哉但聖人創法本為天下後世豈為一人設也孔子曰仁者壽而力稱回之為仁而回且夭矣豈孔子之言無驗歟蓋非為一人而言也梁武之奉佛其類回之為仁乎抑又安知梁武前定之業禍不止此由作善以損之故能使若是之壽也帝嘗以社稷存亡久近問於誌公公自指其咽示之蓋讖侯景也公臨滅時武帝又復詢詰前事誌公曰貧僧塔壞陛下社稷隨壞公滅後奉敕造塔已畢武帝忽思曰木塔其能久乎遂命撤去改創以石塔貴圖不朽以應其記拆塔纔畢侯景兵已入矣至人豈不前知耶如安世高帛法祖之徒故來畢前世之對不遠千里自投死地者以其定業不可逃也如晉郭璞亦自知其不免況識破虛幻視死如歸者乎豈有明知宿有所負而欲使之避詎苟免哉徐俯字師川七歲能詩為其舅黃山谷所知靖康初為尚書員外郎跋護法論曰無盡居士護法之心可謂至矣於三教中皆有勸戒然苦口者是良藥逆耳者是忠言其實指歐陽修之過者余知無他亦罰一誡百之謂也覽者宜悉焉鐔津契嵩禪師云梁武之事吾原教雖順俗稍評之而未始劇論如較其舍身於俗則過於道則德非爾人情輒知唯天地神明乃知之耳故當梁武舍身之際而地為之振此特非常之事而史臣不書而後世益不識知梁武帝幽勝之意也其發志固不同庸凡之所為未可以奴胝之也胝音低視也武帝幸同泰寺講金剛經設無遮大會太子王侯百官六百九十八人義學沙門一千人其餘僧尼居士五眾及外國使人三十一萬九千六百四十二人又武衛宿值數萬人同心聽受先東儲請講止許七日諸僧欲罷不能更延二七而請益之眾喁喁不已乃終三七日解講之辰正殿大像忽放光明左右菩薩續復放光帝躬虔禮大眾咸矚帝復於華林園重雲殿講金字般若三慧經太子王侯宗室外戚百辟卿士外域雜使義學千僧外國僧眾莫不肅容觀聽凡二十三日宮中佛像悉放光明夜必澍朝則霽天地震動異香滿觸十種靈異具載廣弘明集此難詳錄釋迦如來往劫行菩薩道時多生皆作國王以十善化民至於捨國城妻子如棄涕唾有一生曾為長生國王被鄰國梵授王奪國害身臨終之際猶囑太子以怨報怨怨終不除唯有無怨而除怨耳後梵授王還國與長生太子武帝亦大菩薩故其講經感諸靈瑞又願生生為僧化度一切寧在正法長淪惡道不樂依老暫得生天豈希一身一國以失大願哉鑑史謂武帝講佛經於同泰寺老而餓死何不畏天刑人禍而乖剌之甚臨終口苦尚有蜜可索而無飲食可得耶時太子內宦侍側何不先餓死而至帝先死雖三歲豎子亦未之信也先齊明帝次子名寶卷字正嚴即位與潘妃奢佚後宮一年而庫匱倍價買金與妃作金步蓮花武帝在齊為大司馬和帝命司馬舉兵伐之太后令廢為東昏侯而武帝既與東昏侯有深冤若常人必有殺身之禍豈但亡國而已佛尚放光證其講經豈不能救其橫禍正以定業難逃故無盡居士曰安知梁武前定之業禍不止此由作善以損之故能使若是之壽誠哉是言也言定業不可逃者如來尚有金創馬麥之報目連位登羅漢被諸外道打身如淤麻歸寺眾僧謂曰佛記汝神通第一何不昇上虛空連曰業報既至爾時神尚不見何得有通又迦留陀夷尊者已證阿羅漢果誓化一千家夫婦俱證須陀洹果以報佛恩已化得九百九十九家最後一家其夫外出婦與賊通殺尊者藏屍於馬糞堆裏佛夜半入城命王臣取出其屍以香木焚之建塔供養豈佛知而不救正以其定業難逃尊者已證無生以此最後身償之如棄弊屣佛乃為僧俗說其宿因又西域曇無讖法師至北涼譯經畢三月知涼將滅固辭西歸蒙遜怒密遣刺客中路害之讖出關時謂送者曰業期至矣雖上聖不能逃也未幾遜白日見鬼以劍刺之四月遜卒國尋滅讖亦安世高之儔遠投死地故佛常誡惡不可作而說偈曰假使百千劫所作業不忘因緣聚會時果報還自受倘報未定作福可以禳之或有餘祉修善可以續之如晉簡文帝咸安年彗星現法曠法師勸帝勤修德政以賽天譴帝乃齋懺災星遂滅梁智藏法師初遊建康帝召見深加敬禮一日遇異人曰師壽止三十一歲藏乃竭精修道專誦金剛般若波羅蜜經至厄之年俄空中曰承般若力得倍壽矣果然壽終六十二歲敕葬獨龍山寶公寺之左由是江左道俗皆持誦金剛般若經又昔天台智者大師兄陳鍼路遇張果相其死在期月大師教修方等懺法後遇張果駭曰服何藥而至相易鍼曰惟修懺耳果曰若非法力所加安能超死竟延十五年而終臨終生天如沙彌渡蟻得越天年等也王十朋出資鑑十朋字龜齡永嘉人紹興中廷試第一號梅溪先生官至侍御史公嘗謁處州南明雪堂行禪師曾一夕夢遊天台石橋神僧數百出迎指公與眾曰彼前身嚴首座也曾寫此碑後親到石橋與夢中所見之境無異遂留詩云石橋未到已先知入眼端如入夢時僧喚我為嚴首座前身曾寫石橋碑朱熹號晦庵出朱子語錄并易解理宗朝贈太師封徽國公諡文公公少年不樂讀時文因聽一尊宿說禪直指本心遂悟昭昭靈靈一著十八歲請舉時從劉屏山屏山意其留心舉業暨搜其篋只大慧禪師語錄一帙耳公於竹林小軒誦佛經作詩曰端居獨無事聊披釋氏書暫息塵累牽超然與道俱云云公嘗致書於開善道謙禪師云向蒙妙喜開示應是從前記持文字心識計校不得置絲毫許在胸中但以狗子話時時提撕願受一語警所不逮師答曰某二十年不能到無疑之地後忽知非勇猛直前便自一刀兩斷把者一念提撕狗子話頭不要商量不要穿鑿不要去知見不要強承當公有省師卒公祭以文略曰我昔從學讀易語孟究觀古人之所以聖既不自揆欲造其風道絕徑塞卒莫能通下從長者問所當務皆告之言要須契悟開悟之說不出於禪我於是時則願學焉師出仙洲我寓潭上一嶺聞之但有瞻仰丙寅之秋師來拱辰乃獲從容笑語日親一日焚香請問此事師則有言決定不是始知平生浪自苦辛去道日遠無所問津未及一年師以謗去我以役行不得安住往還之間見師者三見必款留朝夕咨參師亦喜我為說禪病我亦感師惟不速證別其三月中秋一書已非手筆知疾可虞前日僧來為欲往見我喜作書曰此良便書已遣矣僕夫遄言同舟之人告以訃傳我驚使呼問以何故於戲痛哉何奪之遽恭惟我師具正遍知惟我未悟一莫能窺揮金辦供泣於靈位稽首如空超諸一切出資鑑或問朱子曰今士大夫晚年都被禪家引去者何故答曰是他高似你你平生讀許多書記誦文章所藉以取功名利祿之計者到者裡都靠不得所以被他降下他底且省力人誰不悅而趨之乎王介甫平生學許多道理臨了捨宅為寺又云只緣他打併得心下清潔所以本朝李文靖公王文正公楊文公劉元城呂申公都是甚麼人也都去學他又云佛書說六根六識四大十二緣生之類皆極精妙故前輩謂此孔孟所不及又曰四大即是魂魄十二緣生出華嚴合論佛說本源盡去世間萬事後卻說出實際理地不受一塵萬事門頭不捨一法熹又曰金剛經大意只在須菩提問云何住云何降伏其心兩句上故說不應住法生心不應住色生心應無所住而生其心此是答云何住又說若卵生胎生溼生化生我皆令入無餘涅槃而滅度之此是答云何降伏其心所謂降伏其心者非謂欲遏伏此心謂盡降伏世間一切眾生之心入無餘涅槃只是一無字自此以後只是者意若見諸相非相即見如來此謂離相即名為佛又曰釋氏之學與吾儒有甚相似處如有物先天地無形本寂寥能為萬象主不逐四時凋又曰撲落非也物縱橫不是塵山河并大地全露法王身又曰若人識得心大地無寸土看他是甚麼見識今區區小儒怎生出得他手宜為他揮下也葉適號水心先生與朱文公書曰適在荊州無事讀佛書乃知世外環奇之說本不與道相亂良由學者不深考也出資鑑今時學者盡被鑑史宋儒知見而牢籠住孰能出得其範圍乎所謂盡信書不如無書然則古之淳儒碩學不及歐陽數人之知見耶惟有智士深察其病始不墮彼坑塹失卻千生福善也屏山李居士鳴道集說序中書真卿湛然居士撰屏山居士年二十有九閱復性書知李習之亦二十有九參藥山而退著書大發感歎日抵萬松深攻亟擊退而著書會三聖人理性蘊奧之妙要終指歸佛祖而已江左道學假於伊川昆季和之者十有餘家涉獵釋老膚淺一二著鳴道集食我園椹不見好音竊香掩鼻於聖言助長揠苗於世典飾游辭稱語錄學禪惠如敬誠誣謗聖人聾瞽學者噫憑虛氣任私情一讚一毀獨去獨取其如天下後世何屏山哀矜作鳴道集說廓萬世之見聞正天下之性命張無盡謂大孔聖者莫如莊周屏山擴充渺無涯涘豈直不叛于名教其發揮孔聖幽隱不揚之道將攀附游龍駸駸乎張無盡又謂小孔聖者莫如孔安國鳴道諸儒又自貶屈附韓歐之隘黨其計孰愈乎尊孔聖與釋老鼎峙也耶鳴道諸儒鑽仰藩垣莫窺戶牖輒肆浮議不亦僭乎余忝歷宗門堂室之奧懇為保證固非私心昧誠之黨如謂不然報惟嚮影耳屏山臨終出此書付敬鼎臣曰此吾末後把交之作也子其祕之當有賞音者鼎臣聞余購屏山書甚切不遠三數百里徒步之燕獻的稿于萬松老師轉致於余余覽而感泣者累曰昔余嘗見鳴道集甚不平之欲為書糾其蕪謬而未暇豈意屏山先我著鞭遂為序引以鍼江左書生膏肓之病為中原之士大夫有斯疾者亦可發藥矣念常曰諸儒鳴道集二百一十七種之見解是皆迷真失性執相循名起鬥諍之端結惑業之咎蓋不達以法性融通者也屏山居士深明至理憫其瞽智眼于昏衢析而論之以救末學之蔽使摩詰棗柏再世亦無以加矣姑錄一十九篇附於通載之左文備通載三教平心論宋靜齋學士劉謐撰孝宗皇帝製原道辨曰以佛治心以道治身以儒治世誠知心也身也世也不容有一之不治則三教豈容有一之不立無盡居士作護法論曰儒療皮膚道療血脈佛療骨髓誠知皮膚也血脈也骨髓也不容有一之不療也如是則三教豈容有一之不行焉世之學儒者到收因結果處不過垂功名也世之學道者到收因結果處不過得長生也世之學佛者到收因結果處可以斷滅生死究竟涅槃普度眾生俱成正覺也其優劣豈不顯然可見哉故嘗試譬之儒教之所行者中國也道教之所行者天上人間也佛教之所行者盡虛空遍法界也儒猶治一家威令行於藩墻之內若夫藩墻之外則不可得而號召也道猶宰一邑政教及於四境之中若夫四境之外則不可得而控制也佛猶奄有四海為天下君溥天率土莫非臣民禮樂征伐悉自我出也此三教廣狹之辨也學儒者死而後已蓋百年間事也學道者務求長生蓋千萬年也學佛者欲斷生死湛然常住蓋經歷塵沙劫數無有窮盡也儒猶一盞之燈光照一夕鐘鳴漏盡則油竭燈滅也道猶阿闍世王作百歲燈照佛舍利經百歲已其燈乃滅也佛猶皎日照耀萬古常明西沒東升循環不息也此三教久近之辨也明道曰佛老其言近理又非楊墨之比所以為禍害甚於楊墨之害抑不思萬形皆有弊惟理獨不朽既曰近理而復謂其為害可乎明道曰釋氏之說若欲窮其說而去取之則其說未能窮固已化而為佛矣明道於此始知釋氏之說非儒者所能窮也晦菴曰就使其說有實非吾儒之說所及者是乃過乎中正而與不及者無以異晦菴於此始知釋氏之說非儒者所能發也夫釋氏之說既非儒者所能窮亦非儒者所能及孰謂其可毀哉韓愈毀之不知佛者也先儒毀之傚韓愈者也嘗於韓愈別傳見其與大顛答問甚詳不知何者為可非何者為可毀乎見聞不廣而妄肆非毀是不免為舜犬妾婦而已矣張無盡曰韓愈謂作史者不有人禍則有天刑豈可不畏懼而輕為之夫作史者採摭人之實跡設或褒貶不公尚有刑禍況無故輕薄以毀大聖人哉一切重罪皆可懺悔謗佛法罪不可懺悔故法華經中載謗法之罪至極至重今人只是謗佛已種無量罪因況佛以善道化人信佛者必為善不信佛者必為惡惡積則滅身身沒之後罪報愈重天作孽猶可違自作孽不可逭此之謂也愈又曰其身死已久枯朽之骨凶穢之餘豈宜以入宮禁蓋以佛身之舍利而比凡庶之朽骨何其無忌憚一至此哉涅槃經曰爾時世尊以大悲力從心胸中火湧棺外漸漸闍維焚化碎金體成末舍利以是知佛骨者佛之舍利也秀州精嚴院有一舍利一日行道一日入定行道者旋轉不息入定者寂然不動嵩祖師作行道舍利記蓋以其道之驗也九流百家紛然謂之道則與佛未始異也稽其驗則天下無有也競尊其師謂佛不足與其聖賢校及其死也不數日而形腐不百年而骨朽其神則漠然烏有乎恍惚豈其道亦有未臻於佛者乎然舍利之見乎天下者古今多矣有盤空而翔者有無端而至者發光而並日月者不可聞者不可碎者若此行道晝夜振之而不息天下未始見也捧其塔而敬之則金鐸益轉若與人意而相應異乎美哉然則舍利之神奇若此而以之比凡骨可乎列子曰生則堯舜死則腐骨故雖褒稱嘉美以為大而化聖而不可知者俱不免乎腥臊臭穢與草木同腐也其能若佛骨之更數千載而神奇特異與世為祥為福者耶張無盡居士初問大慧禪師曰堯舜禹湯皆聖人也佛竟不言之何耶師曰堯舜禹湯比梵王帝釋有優劣否士曰堯舜禹湯豈可比梵王帝釋師曰佛以梵王帝釋為凡夫餘可知矣公乃擊節以為高論由是觀之則堯舜禹湯不及梵王帝釋遠矣而梵釋猶為凡夫自堯舜禹湯至於文武周公孔子儒家皆以聖稱也彼伯夷伊尹柳下惠各以一善自著者亦謂之聖也而群聖之中必有大者焉宰我曰以予觀於夫子賢於堯舜遠矣子貢曰自有生民以來未有盛於孔子也是孔子者儒家之大聖人也然佛又聖中之聖也佛自修因於億劫而證果於今生六度萬行罔不齊修恒沙功德皆悉圓滿列子援孔子之言曰丘聞西方有大聖人不治而不亂范蔚宗著西域論曰彼土靈聖之所降集賢懿之所挺生裴休曰佛為大聖人其教有不思議事疊而觀之則世之所謂聖人者孰有過於佛哉彼不信佛而謗佛者生為愚人死為愚鬼捨身受身愈趨愈下善擇術者果如是乎程頤儒者也其論佛也則以為邪誕妖異之言塗生民之耳目蓋佛之說無涯而頤之見有限對醯雞而談浩劫宜其以邪誕妖異目之也然頤亦嘗反而思之乎邪誕妖異於儒教則有之易曰見豕負塗載鬼一車詩曰天命玄鳥降而生商史曰甲申乙酉魚羊食人傳曰齊侯見豕人立而啼至于神降于莘石言於晉魏顆見老人狐突遇申生謂之邪可也謂之妖可也謂之異可也詩曰帝謂文王予懷明德夫天不言也久矣偶有言焉人烏得而聞之今也予懷之語若見其口耳之相接不謂之誕可乎因程頤邪誕妖異之謗而求儒家邪誕妖異之實蓋有不可得而掩者今取議佛者觀之唐有傅奕者精術數之書掌司天之職前後七上疏謗褻佛教時有李師政者著內德論夫以傅奕而肆誣謗之言以師政而著辨惑之論是非曲直坦然明甚萬世之下可以觀矣厥後有韓愈者其見猶傅奕也原道佛骨其作奕之章疏也奕謗佛於前即有師政以辨其惑愈謗於後曷為無人以議其非蓋奕為太史令特藝者耳愈以文章顯乃儒者也藝者之言夫人固得與之辨是非儒者之論世俗每不敢以致可否吾則曰言之而當理雖非儒而可遵言之而涉誣雖果儒而可辨愈不明吾道一貫之理可不明而辨之使其言之誤後世乎愈又曰臣雖至愚必知陛下不惑於佛孔子曰智者不惑謂天下之可惑者皆愚者也智者既明且哲洞屬是非凡所作為必真見其理之可為而後為之以明主而奉佛謂之受惑不可也若憲宗者聰明果決得於天性是豈愚者豈是易惑者乎非特憲宗為然也唐世人主如太宗之聰明英武由漢以來未之有也而其篤信佛教始終如一而太宗之奉佛尤不止如憲宗之迎骨也是豈為佛所惑乎使太宗果愚而受惑則當時房杜王魏直言無隱胡為不諫不惟不諫其奉佛也若房梁公玄齡則相與命玄奘譯經杜萊公如晦則以法尊京兆玄琬法師其欽崇歸向之心君臣同一德又不惟房杜二公為然也宋璟剛介為唐朝第一則以佛法師于曇一裴晉公以身繫天下安危則執弟子禮於徑山法針抱大節忠於國家死而不變者孰若顏魯公則以戒稱弟子于湖州慧明問道於江西嚴峻至于張說撰心經之序孟簡結塵外之交杜鴻漸參無住之禪權德輿著草衣之記彼諸聖賢皆表表然不世出者使佛教果能惑人亦安能惑如是之聖賢耶唐之君臣決非受惑而愈之惑亦甚矣雖然愈之惑不足論也而其惑天下後世則非細故也蓋愈以儒自負經生學士視之如泰山北斗愈之所是從而是之愈之所非從而非之誰復詳審諦察雖其文章高天下何足道乎周子通書曰不知務道德而以文辭為能者藝焉而已矣由是言之則愈與奕等皆藝者耳孰謂愈得為儒哉愈曰佛者夷狄之一法彼徒見佛法來自西域遂從而夷之殊不知佛生於天竺而中天竺為南贍部洲之正中是佛家固以彼為中也後漢書曰佛道神化興自身毒其國則殷乎中土玉燭和氣是儒家亦以彼為中國也由是知此固一中國也反彼亦一中國也而謂之夷可乎愈之見但知四海九州之內為中國四海九州之外為四夷外此更無去處矣豈知四夷之外復有非夷者哉愈之見坐井觀天之見也不然北史所載大秦國者去幽州數萬里而居諸夷之外其國衣冠禮樂制度文章與中華同一殷盛故號曰大秦而與大漢齒由是觀之則四夷之外固有中國而漢書以身毒為中國信不誣也井蛙不足以語海固非愈之所能知也大秦身毒即天竺也原道謂老子道其所道非吾之所謂道其師說乃謂孔子師老聃審如是則孔子之道乃出於老氏之道亦可謂之道其所道也與孟簡書謂群聖之道大壞其禍出於楊墨其讀墨子乃謂孔墨相為用審如是則孔子之道本同乎墨氏之道亦可謂之壞群聖之道乎夫老也墨也異端之道也愈既詆排之矣而乃指孔子以為老又指孔子以為墨不亦叛孔子之甚乎學孔子而叛孔子猶陳相之背師逢蒙之射羿也後世經生學士以愈詆佛為可傚則愈之叛孔子亦可傚乎抑愈雖詆佛而又取於佛其作馬彙行狀也則取其刺血寫佛經且詆之而且取之既非之而又是之愈可謂不常其德者矣蓋愈之中心初無定見是非取捨莫知適從故肆口所言隨時遷就前不顧後後不顧前而不復慮其遺臭於萬世也識者於此毋以私心論毋以愛憎之心論試乎其心而評之則愈之為人也果君子乎抑小人乎果儒者乎抑非真儒乎傅奕本是道門起家貧賤投僧乞貨不遂所懷蓄憤致嫌故七上疏大慧禪師答無盡居士可謂言簡而義彰矣宗本禪師曰書云士希賢賢希聖聖希天天中至尊無非玉帝玉帝比聲聞羅漢猶吏比狀元況佛乎佛乃菩薩緣覺聲聞之師是為諸聖之師也或問仙道比佛道何如答神仙尚受玉帝控制豈可比於佛也況以仙道難修又有墮落之日佛道易學永無退轉之時楞嚴經有十種仙報盡還墮諸趣故洞賓棄卻瓢囊而歸依於黃龍禪師也帝釋儒云上帝道云玉帝俗云天帝是欲界忉利天主梵語具云釋提桓因華言能天主謂能為三十三天主昔姓憍尸迦建迦葉佛舍利塔三十二人助修俱生忉利天帝釋為君三十二為臣共為三十三天梵王是色界天主居欲界之上菩薩是大乘聖人緣覺是中乘聖人聲聞羅漢是小乘聖人元世祖弘教集并通載庚申即位大赦普度僧尼二年賜僧子聰并懷孟刑州田各五十頃賜慶壽寺陸地五百頃三年大作佛事於昊天寺七晝夜賜銀一萬五千兩至元元年都燕設會度僧詔國師扮彌登座授秘密戒帝印大藏經三十六藏遣分賜天下普令得瞻佛日帝自有天下寺院田產二稅盡蠲免普令緇侶安心辦道帝召群臣曰朕以本覺無二真心治天下如觀海東青取天鵝心無二故一日上問帝師曰施食至少何能普濟無量幽冥帝師曰佛法真言力猶如飲馬珠上問帝師云修寺建塔有何功德答云福廕大千由是建仁王護國寺帝命帝師齋竟天雨金花繽紛而下帝曰何故有此祥瑞答云陛下心花內發天雨金花讚歎蜀僧元一遊西天回持佛鐵缽獻帝帝悅寶之帝詔遍天下每歲中行布施度僧讀大藏經隨處放光現瑞禎祥不一帝一日問眾臣每日還有放閒也無眾臣無對帝乃袖中出數珠示之由是內外百官皆歸至善帝見僧有過不加王法止令閱經懺悔帝禦北征護神現身陣前怨敵自退宋主以王位來歸學佛修行帝大悅命削髮為僧寶焉宋太后削髮為尼誦經修道帝深加敬仰四事供養帝以金為泥命僧儒繕寫大藏經一藏貯以七寶琅𪻱流傳後世一日帝以佛鐵缽取食前珍味碎置缽中內外侍臣數滿千人各賜一粒普令得沾如來缽中之禪悅又外邦貢佛舍利至帝曰不獨朕一人得福乃令於城南彰義門建塔普使往來皆得頂戴初帝居潛邸時聞西國有綽理僧道德願見之遣使往請于廓丹大王王謂使者曰師已入滅師有姪癹思巴此云聖壽深通佛法請以應命既至都旬日即乞還西帝曰願為朕留當求戒法尋禮為國師王公咸稟妙戒詔居五臺壽寧寺壬申留京師初天兵下襄城居民請真武降筆云有大黑神領兵西北方來吾亦當避於是列城望風款附兵不血刃至於破常州多見黑神出入居民罔知故實詢知乃摩訶葛剌神也蓋師祖父七世事神甚謹隨禱而應此助國之驗也有旨建神廟于涿水之陽神像威嚴凡水旱蝗疫民禱響應壬申年遣使詔師問曰海都軍馬犯西番界師於佛事中能退降否奏曰但禱摩訶葛剌自然有驗復問曰於何處建壇對曰高梁河西北甕山有寺僻靜可習禪觀敕省府供給嚴護於是建曼拏羅依法作觀未幾捷報至上大悅世祖在位三十五年壽八十有實錄百餘篇字字句句以弘教為己任國語曰薛禪皇帝摩訶葛剌亦作摩訶迦羅此云大黑神斯乃大天之將手把金囊事之能令財寶豐盈故天竺僧寺庫中塑像奉事余今令鼎湖象林二處皆塑像事之剌音辣囉轉舌道之二字同一音也曼拏羅此云壇成宗世祖之孫裕宗第三子元史并通載帝即位詔悅堂禪師至闕入對稱旨賜號通慧并金襴法衣於五臺山建寺賜曰萬壽祐國寺武宗順宗長子即位發軍千五百人修五臺佛寺又施銀七百五十兩鈔二千二百錠幣帛三百疋於昊天寺作水陸大會賜元叟端禪師號慧文正辯并金襴法衣出元史并塔銘仁宗順宗次子以西僧班八為國師敕建栴檀瑞像殿三年設水陸大會於金山命元叟禪師昇座說法竣事入便殿奏對深契帝衷賜號并金襴袈裟帝聞天目中峰之道聘之不至製金紋袈裟賜之號曰佛慈圓照廣慧禪師出元史并塔銘英宗仁宗嫡子即位作佛事于光天殿鑄銅佛像作金塔藏佛舍利敕各寺作水陸勝會七晝夜詔僧儒書金字藏經帝重天目中峰之道封香製衣遣使即其居修敬出廣錄并塔銘王磐字文炳封洛國公通載并金湯編世祖至元十八年十月二十日焚毀道藏偽經敕磐等撰碑文略曰昔憲宗朝道家者流出一書曰老君化胡成佛經及八十一化圖鏤板傳布其言鄙陋誕妄意在輕蔑釋門而自重其教時世祖居潛邸憲宗有旨令僧道二家詣上辯析二家自約道勝則僧冠首而為道僧勝則道削髮而為僧僧問道曰汝書化胡成佛且佛是何義道曰佛者覺也覺天覺地覺陰覺陽覺仁覺義之謂也僧曰所謂覺者自覺覺他覺行圓滿三覺圓明故號佛陀豈特覺天地陰陽仁義而已耶上謂侍臣曰吾亦先知仁義是孔子之語謂佛為覺仁義其說非也道士又持史記諸書以進而欲取勝帝師達癹問曰此是何書道曰前代帝王之書帝曰汝今特論教法何用攀援前代帝王帝師曰史記有化胡之說否道曰無又問老子所傳何經答曰道德經問曰道德經中有化胡否曰無帝師曰史記中既無道德經中又無其為偽妄明矣道士辭屈尚書姚樞曰道者負矣帝命如約行罰遣近臣將道士樊志應等十七人詣龍光寺削髮為僧焚偽經四十五部天下佛寺為道流所據者二百三十七所悉命歸寺有道家偽經化圖尚存多隱匿未毀帝命樞密副使等暨諸道流考證真偽曰雖卷帙數千究其本末惟道德二篇老子所著餘悉漢張道陵後魏寇謙之唐吳筠杜光庭宋王欽若輩撰造演說鑿空架虛詆毀釋教假陰陽術數以示其奧裒諸子醫藥以誇其博所載符咒妄謂佩之令人商賈倍利子嗣蕃息伉儷和諧如鴛鴦之有偶將以媒婬亂而規財賄至有教人佩符在臂則男為君相女為后妃入水不溺入火不焚刀劍不傷徒以誑惑愚俗自道德外宜悉焚去臣等同辭以聞帝曰道家經文傳訛踵謬非一日矣若遽焚之其徒未必心服彼自言水火不能焚溺可姑以是端試之俟其無驗焚之未晚也遂命樞密副使等諭道士張宗演祁志誠李德和杜福春等俾各推擇一人佩符入火自試其術四人奏言此皆誕妄之說臣等入火必為灰燼實不敢試但乞焚道藏庶幾澡雪臣等帝可其奏遂詔天下道家諸經留道德二篇其餘一切焚毀隱匿者罪之今後道士不遵老子之法如好佛者削髮為僧不願為僧者聽其為民命百官於憫忠寺焚道藏偽經諸路俾遵行之臣磐等聞老氏之道也以清淨為宗無為為本謙沖以處己捐抑以下人非有欲好勝之事厥後支分派列徒屬寖盛襲訛成偽誇誕百出清淨一變而為污穢無為一變而無所不為如漢之文成五利致身求仙恍惚誕妄帛書飯牛之詐黃金可成之妄一旦敗露為武帝所誅三張之徒以鬼道惑眾倡亂天下晉王浮居寶籙宮與女冠為奸林靈素自稱神霄紫府仙敕禳大水不驗並為徽宗誅竄而死迨今末年復有麻被鐵笠李二人以奸謀秘計出入時貴之門肆為婬污之行咸受顯戮歷代以來若此之類不可勝數固已悖老氏不爭不盜之禁矣及陷刑辟皆是孽自內作愎將誰咎哉且釋氏之教宏闊勝大非他所擬倫歷百千世聖帝明君莫不尊崇東冒扶桑西極昧谷冰天桂海山河大地昆蟲草木胎卵溼化有情無情百千萬類皆依佛蔭生息動止于天地之間故天上天下惟佛為尊超出乎有生之表歸極乎無礙之真智周法界神妙諸方澤及大千功用不宰其大有如此者慈航所至無溺不援法雨所霑有生皆潤臣磐等敬為之書俾學老氏者有所警焉道士胡提點等捨邪歸正罷道為僧七八百人挂冠于上永寺帝師殿之梁拱間昔唐太宗高宗敕搜聚天下化胡經盡火其書矣由古而今歷代帝王制之時祥邁禪師奉敕撰辯偽錄五卷詳出通載按甄鸞笑道論云道家妄註諸子三百五十卷為道經如此詳之代代穿鑿人人妄制採他佛教標為道書試問當今道士推勘後所出經為是老子別陳為是天尊更說若也更說應有時方師資傳授為是何年何月何邦何代若在上天而說何人傳來若西域而談何人譯出如其有據容可流行若也妄言理須焚剪欽奉聖旨收取道藏偽經三十九種卷有數千經目附後就大都大憫忠寺命報恩禪寺林泉從倫禪師下火焚道藏偽經舉火法語出通載文多不錄二教論云按蜀記漢獻帝末張道陵避瘧丘社中得咒鬼之術自造符書作靈寶經及醮章等道書二十四卷以誑百姓受其道者輸米肉布絹器物紙筆薦蓆五彩後生邪濁增立米民令畏鬼帶符曰左佩太極章右佩昆吾鐵指日即停暉擬鬼千里血妄造黃書咒癩等事自稱天師若受黃書赤章即是靈仙又造方術穢濁不清乃以扣齒為天鼓咽唾為醴泉三五七九日天羅地網男女合氣不異禽獸以此用消災禍毒流漢室惑亂民間後道陵入鵠鳴山為蟒蛇所吞其子衡奔入尋屍無所畏人恥之乃妄云白日昇天衡即遣使告民曰正月七日天師昇玄都米民山獠遂因妄傳販死利生逆莫過此衡之子名魯三代皆自稱天師以鬼道化人三張鬼法自此始時有諺言黃衣當王魯遂令其部眾改著黃衣巾帔代漢之徵黃帔橫披竊僧袈裟法服之像前加兩帶結寇數十萬眾謀叛世號黃巾賊自青徐幽冀荊楊兗豫八州之人莫不畢應凡三十六方大方萬餘大小方六七千人並為曹操皇甫嵩討滅餘潛不滅今猶披之珠林云道家真步虛品經六十四卷齊永泰間道士陳顯明妄造太清經及眾醮儀十卷梁天監年陶弘景偽造周武時張賓之焦子順馬翼李運挑攬佛經一千餘卷為道書廣弘明集云太玄經楊雄所造洞玄經前漢王褎所製又隋末道士輔惠祥改佛涅槃經為長安經後事發被誅三皇經晉鮑靜所撰十四紙永康年中被誅後人諱之改為三洞至唐二十年貞觀間敕追諸道士及百姓有此文者並集得之遂於禮部廳前悉焚之指歸經嚴君平造黃庭元陽上清等經及三皇之典並改換法華及無量壽等經而作或取盤古之傳或取諸子之篇假認俗書以為道教偷竊釋典特作老經唐麟德年道士造偽經天皇甲子西京諸觀道士郭行真等東明觀李榮姚義劉道合會聖觀田仁惠郭蓋宗等將隱沒道書重更修改私竊佛經改換文句人法名教三界六道五陰十二入十八界三十七品大小法門並偷安道經改為太上靈寶元陽經改餘佛經別號勝牟尼經或云太平經等及改酒脯祭祀用乾棗香水以惑後人按盧景裕戴詵韋等集及梁元帝周弘政等義類云太上有四謂三皇五帝及堯舜是也言上古有此大德之君臨萬民之上故云太上也郭莊云時之所賢者為君材不稱世者為臣老子非帝非皇不在四種之限有何典據輒稱太上耶二教論云救形之教教稱為外濟神之典典號為內釋教為內儒教為外備彰聖典非為誕謬詳覽載籍尋討源流教唯有二寧得為三何則昔玄古朴素墳典之誥未弘淳風稍離丘索之文乃著故包論七典統括九流咸為治國之謨並是修身之術故藝文志曰儒家之流蓋出於司徒之官助人君順陰陽明教化者也遊文於六經之中留意於五德之際祖述堯舜憲章文武宗師仲尼其道最高者也道家者流蓋出於史官清虛以自守卑弱以自持此君人者南面之術合於堯之克讓易之謙謙若有位無才猶虧弘闡有才無位灼然全闕昔周公攝政七載乃制六官孔老何人得為教主孔雖聖達無位者也自衛迴輪始弘文軌正可修述非為教源柱史在朝本非諧贊出周入秦為尹言道無聞諸侯何況天子既是仙賢固宜雙缺道屬儒宗已彰於前矣按燉煌實錄云漢桓帝二十九年幸閒豫庭與群臣對論古今帝曰老聃父何如人也天水太守索綏對曰老聃父姓韓名虔字元卑胎生無耳一目不明癃跛孤單年六十二無妻與鄰人益壽氏宅上老嫗合懷胎八十年而生生時皓首故曰老子此本實跡也今道士偷竊他能欲張老聖家有弊帚享之千金斯言信歟老子生於李樹下故改姓李敬王元年老子年八十四時當七雄分霸天下紛擾老子聞天竺佛聖人教不治而不亂欲適天竺而處之胡曾先生詠其詩曰七雄戈戟亂如麻四海無人得在家老氏卻思天竺住便將徐甲過流沙出關未至流沙死於扶風之槐里即而葬之秦佚往弔三號而返故莊子內篇云老聃死秦佚弔之三號而出怪問非夫子之徒歟佚曰向吾入見少者哭之如哭其父老者哭之如哭其子古者謂之遁天之形始以其為人也而今非也遁者隱也天者免縛也形者身也言始以老子為免縛隱形之仙今則非也嗟其諂曲取人之情故不免死非我友又考梁陳齊魏之前道士唯以匏盧盛經本無天尊形像按任子道論及杜氏幽求云道無形質蓋陰陽之精也陶隱居內傳云在茆山中立佛道二堂隔日朝禮佛堂有像道堂無像王淳三教論云近世道士取活無方欲人歸信乃學佛家制立形像假號天尊及左右二真人置之道堂以憑衣食宋陸修靜亦為此形遼陽高憲字仲常遊東京白鶴觀見三清像指其右曰此何像也觀主對曰老君像曰何代人曰周定王時又指左曰此何像也主曰道君像曰此何代人主倉惶未答憲指中像曰且饒者元始天尊聞者傳以為笑又漢晉之代譯經稱佛為天尊由佛生七日父王抱往禮大自在天王廟天像倏起頂禮佛足父王讚曰我子天中天因號天尊今道士竊安老子之號後來譯經法師見其渾稱故棄天尊而稱世尊謂天上人間所共尊敬故又古來譯經僧稱道士寇謙得志僭冒道士之名故後譯經棄道士而稱沙門今道士又稱為法師愈為矯飾法師之號原出佛經萬卷百家本無此語且為法之師名為法師法即是師名為法師名義不知妄安己號如山羌偷王衣不解披著誠可笑也出通載言三清者初道士立玄清元清始清妄擬太極太初太始為三清以一清生三天三清生九天不解天名乃竊佛經欲色二界天名增減字號矯安道書然三界共有二十八天云九天者謬也後張道陵以三清為精氣神解精為婬泆之精氣為呼吸之氣神為念慮之神誑惑男女以色身臭皮囊為精氣神張紫陽曰先天地之元精元氣元神也玄宗直指云戒以養精定以養氣慧以養神是則以戒定慧養本元之心性也今道士不達本立三清之義而妄裝塑三清為像故王淳謂其立形像以憑衣食高憲誚之而倉惶結舌足見其謬也矣餘詳歸元直指諸書此不繁錄稽夫歷代已來至於元世並無玉皇寶誥北斗經受生經三官經等文此皆明初道士貪利惑俗偽撰之者其南斗經在三十九種內已盡焚之言三官者子史無文不審出何年代何邦人氏又非西域之人奚作梵語而云閻浮提乃偷佛經文雜以俚語智人閱之自知其謬如羅祖無為教五部六冊亦竊佛經及諸語錄參以魔言復妄造法華經後三卷言詞鄙陋如山歌野語又造金剛纂金剛經議論安文殊菩薩之名在內用人取信復有血盆經救苦經妙沙經皆不畏罪福無知之徒妄造不足信也尚直編云世有後三卷蓮華經此是妄無知匹夫所造樵歌牧唱也金剛經議論是金天教之人偽造魔語也復有一卷註解金剛經題名曹溪六祖大師解義口訣此是宋神宗元豐間天台羅適所註假聖師之名也無深理有淺義蓋因淺俚之故世人多愛之謬矣六祖大師法寶壇經第十付囑章曰師一日喚法海轉相教授勿失宗旨共計七百七十七字此是金天教之人偽造邪言增入刊板未革之弊也嗚呼妄談性理壞人心法玷辱佛祖罪莫大焉羅祖謀叛改名無為無為復叛改為青蓮青蓮又叛改為白蓮白蓮復叛改為圓通大乘等教其名不一閉門發誓傳授不許外知愚俗受惑智者自不受其瞞也趙孟頫字子昂元史并廣錄本傳宋太祖秦王德芳之後也頫才氣英邁神彩煥發如神仙中人至元二十三年御史程鉅夫奉詔搜訪遺逸於江南得頫入見世祖甚喜累官至翰林學士至治元年卒年六十九追封魏國公諡文敏頫四五歲聞母丘夫人說臨月夢一僧入寢室覺而生頫故年十二三歲便好寫金剛經後但與僧語便若眷屬至年六十五日擾擾人事不能有所悟入恒以自歎重天目中峰之道每受師書必焚香望拜與師書必自稱弟子叩師心要師與說防情復性之旨遣問金剛經大意師答以略義一卷中峰淨業偈一百八首頫作贊復作偈重讚之曾跋華嚴經合部云云胡長孺號石塘常與子昂韓明善段吉甫郭斯道諸公論道齋中大同論著大同論有曰孟子沒一千四百年道潛統絕子周子出然後潛者復光絕者復續程氏二子得周子傳周子之傳出於北固竹林寺壽涯禪師程子四傳而得朱文公文公後得張欽夫講究此道方覺脫然處前日所聞於竹林而未契者皆不我欺矣元來此事與禪學十分相似學不知禪禪不知學互相排擊都不曾劄著病處亦可笑也臨終坐逝韓性字明善性學指要性隱居不仕諡莊節淹貫經史精通內典嘗曰佛居西土風教有異然極能勸化得人觀今凡修佛事未有不端心正念者雖愚夫愚婦欲聞經禮像必預齋戒持敬捐欲然後從事雖吾聖人復生勸人為善不過如此正恐未能也嘗謂門人朱仲弘曰佛去世已久後人如此恭敬他誦他的言語汝道佛要人如此耶教人如此耶若強人從己誰人肯從如今人一句言語要行一鄉亦不可得且佛之言語奚翅數百萬里凡日月光臨所及處無不信服仲弘聞之默然音釋蒐音搜獵也徹聲色徹同撤除去也闒茸上音塔下音冗闒茸猥賤也史賈誼傳云闒茸尊顯兮讒諛得志虺音毀蛇細頸大頭大者長七八尺喁音顒喁喁然謂眾口向上延頸舉踵也阿羅漢此云無生謂其已斷九十八種煩惱惑不受三界生死矣正遍知是佛十號之一印度此乃天竺之稱舊云身篤又云身毒亦云賢豆皆取音不真今從正音宜云印度印度者唐言月月有多名斯其一稱良以其土聖賢繼軌導凡御物如月照臨由是義故謂之印度諸國皆稱云聖方謂彼土聖賢多所產生也五印度之境周九萬餘里三垂大海北背雪山北廣南狹形如半月劃野區分七十餘國成光子曰中天竺國東至震旦五萬八千里南至金地國西全阿拘遮國北至小香山亦各五萬八千里則知彼為中國矣宋沙門慧嚴與校尉何承天共論華梵中邊之義承天問曰佛國將用何曆嚴云天竺夏至之日日正中時豎晷無影所謂天中後婆利國人來果同嚴說乃引周公測影之法謂此土夏至之日猶有餘陰天竺則無也周公攝政四年欲求地中而營王城故以土圭測影得穎川陽城於是建都土圭長尺有五寸夏至日晝漏半立八尺之表表北得影尺有五寸影與土圭等此為地中鄭司農云凡日影於地千里而差一寸當知陽城蓋就此土自為中耳既有表影豈求餘陰耶況此土東垂大海三方且非由是觀之邊義彰矣海東青女真國東北鄰於五國五國之東接大海出名鷹自海東來者謂之海東青小而俊健能擒鵝鶩白爪者尤以為異遼人酷愛之鶩音務野鴨涿音捉徐甲昔老子過關僱徐甲御薄板軬之車也軬音盤上聲車上篷九天道士偽造化胡經云天地有形之大者太上老君乃混沌之祖宗天地之父母故能分布清濁開闢天地連玄元始三氣而成天上為三清三境即始氣為玉清境元氣為上清境玄氣為太清境又以清之氣各生三氣合成九氣而為九天一鬱單天二上神壽無量壽天三梵藍須延天四寂然兜術天五波羅尼蜜不憍樂天六洞玄化應聲天七靈化梵輔天八高虛明天九無想無愛天此之九天各生三氣每氣為一天合二十七天通此九大為三十六天則三界四民上極三清是其數也道士既無才能自立天號乃偷竊佛經欲色二界天名妄加增減鬱單乃是北俱盧洲亦名鬱單越此云勝生色界二禪無量光天無量淨天而改為無量壽天梵藍竊梵音之不真初禪梵輔天而加靈化二字欲界第四天名兜術陀天亦名兜率陀華言喜是而加寂然二字不憍藥天亦名化業天是欲界第五天梵語波羅尼蜜華言他化自在天是欲界第六天而牽為第五天華梵既乖穿鑿失次復加洞玄二字化應聲天即是他化自在天此是欲界頂天無想天乃四禪天之無想天是外道修無想定得生彼天壽五百劫而加無愛二字如此無智偷竊雜亂安置鄙拙以誑愚俗老君既是周定王柱下史官孰不知之何云混沌祖宗開闢大地運成九天復為三十六天妄誇罔談真無恥矣附林泉倫禪師欽奉聖旨焚道藏偽經目化胡經王浮撰猶龍傳聖紀經西昇經出塞經九天經赤書經上清經南斗經玉緯經紀勝賦辨仙論梁日廣撰齕邪論三破論齊人張融段託他姓撰明真辨偽論吳筠撰太上實錄十山論青陽宮記玄九內傳帝王師錄三天列記十異九迷論傅奕呂玄卿撰歷代應現圖佛道先後論欽道明證論唐員半子撰輔正除邪論吳筠撰辟邪歸正論杜光庭撰十二虛無經藏天隱月經赤畫度命經樓觀先生內傳謗道釋經林靈素杜光庭撰造破大藏經三教根源圖金天長觀李大方撰歷代帝王崇道記高上老子內傳靈寶二十四生經混元生三清經五公問虛無經混元皇帝實錄今俗言杜撰者杜光庭也
