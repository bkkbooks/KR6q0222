body:
  text: 廣州南海寶象林沙門弘贊在犙編吳太宰嚭楚臣奔吳為太宰列子仲尼篇太宰問孔子曰夫子聖人歟對曰丘也博識強記非聖人也又問三王聖人歟對曰三王善用智勇聖非丘所知又問五帝聖人歟對曰五帝善用仁義聖非丘所知又問三皇聖人歟對曰三皇善用時政聖非丘所知太宰駭曰然則孰為聖人乎夫子動容有間曰丘聞西方有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉據斯以言孔子深知佛為大聖也時緣未升故默而識之有機故舉然未得昌言其致矣尚直篇云不治不亂不言自信不化自行實太古之聖道孔子發明此道而無私心推此一節亦足以見孔子之聖德也佛法苟非大道則孔子已指其非矣安得稱為聖乎佛法教人為善沮惡之言與三綱五常若合符節實為世人之福田明道之大本也陰翊皇度補于政教之功可謂至矣釋迦如來降誕佛經并周書異記迦葉佛人壽二萬歲時出世釋迦如來欲人壽一萬歲時出世以衆生根緣未熟故人壽百歲時御世然佛佛出世皆先在兜率天教化諸天子已降生南贍部洲故釋迦如來在兜率天時名護明菩薩七月十五日自兜率天乘六牙白象王下中天竺迦毗羅國淨白聖王宮中從母摩耶夫人右脅入胎住於右脅次年四月八日平旦時夫人與諸婇女入嵐毗尼園遊觀夫人見無憂花鮮好舉右手攀摘佛即從右脅墮下七寶蓮花捧足四方周行七步右手指天左手指地曰天上天下惟吾獨尊周書異記云昭王二十四年甲寅之歲四月八日江河泉池忽然泛漲井皆溢出宮殿人舍山川大地咸悉震動其夜即有五色祥光入貫太微遍於西方盡作青紅色日有重輪王問群臣曰是何祥耶群臣莫測太史蘇由筮之得乾之九五由曰有大聖人生於西方故現此瑞王曰於天下何如由曰此時無他至千年外聲教被此昭王即遣鐫石記之置於南郊天祠前至穆王即位二十三年數有光明來照王都王疑寇至遣相國呂侯出師防之乃曰西方聖人說法度人光流及此王聞先蘇由所記知西方有聖人處世王遂乘驊騮八駿馬西行求道故天人陸玄暢答道宣律師云周穆王身遊天竺佛告穆王彼土現有迦葉佛舍利古塔可返禮事王問何方佛言在鄗京之東南也迦毗羅亦名迦維羅衛釋迦如來滅度周書異記并白馬寺記佛告諸弟子如來於今中夜當入涅槃時諸天龍神國王臣民他方菩薩雲集佛為說法辭滿四十卷名大涅槃經遂於中夜入諸禪定寂然而般涅槃涅槃經後分云如來三反入諸禪定三反示誨衆已即於中夜而入涅槃時大地所有諸山一時振裂悉皆崩倒出大音聲振吼世界唱言苦哉大地虛空寂然大暗日月精光悉無復照忽然黑風鼓怒驚振吹扇塵沙彌暗世界一切卉木藥草諸樹悉皆摧折碎落無餘江河溪澗流泉悉皆傾覆枯涸云云周書異記云周穆王即位五十三年壬申之歲二月十五日平旦暴風忽起損舍折樹山川大地宮殿皆悉震動鳥獸悲鳴日午天陰雲黑西方有白虹十二道南北通貫連夜不滅王問太史扈多曰是何徵也扈多卜曰西方大聖人入滅衰相現耳此即如來入涅槃之相也梵語涅槃此云圓寂謂德無不備名圓障無不盡名寂亦云滅度謂滅煩惱度生死也三教法頌云周昭甲寅第四帝釋迦降生迦維衛穆王壬申五十三如來八十歸真際滅度一千八十年教流漢明永平世佛先四百二十二老子方生定王世佛先四百七十七孔子靈王時誕質法流震旦法本內傳史官傅毅撰東漢明帝永平三年庚申四月八日帝寢南宮夢金人長丈六項佩日光胸題卍字飛至殿前去來無礙旦問群臣時太史傅毅進曰臣聞西域有神其名曰佛陛下所夢將必是乎國子博士王遵對曰臣按周書異記云周昭王甲寅四月八日有聖人生西方今陛下所夢是也帝乃遣將軍蔡愔中郎將秦景博士王遵等十八人使西域訪求六年癸亥愔等於天竺鄰境月支國遇摩騰竺法蘭二法師得白疊像并梵本經六十萬言載以白馬相與東還八年乙丑達洛陽法師入闕獻經像帝大悅館於鴻臚寺十年丁卯敕於洛陽城西立白馬寺以居之以白馬馱經遂名白馬寺震旦佛寺始此是年騰蘭譯出四十二章經十一年戊辰帝幸寺騰進曰寺東何館帝曰昔有阜夷之復起夜有異光民呼聖冢騰曰按天竺金藏詮所志昔阿育王藏佛舍利於天下凡有八萬四千所震旦之境有十九處此其一也帝與俱往禮拜忽有圓光現冢上光中有三佛帝大悅曰不遇二大士安知大聖遺祐哉詔塔其上九層高二百尺明年光又現有金色手出塔頂帝幸禮拜光隨步武旋繞自午及申而滅十二年詔以佛像奉安顯節陵清涼臺二處供養帝問騰曰法王出世何以化不及此答曰迦毗羅國三千大千世界百億日月之中心也三世諸佛皆在彼生乃至天龍鬼神有願行者皆生於彼受佛正化咸得悟道餘處衆生無緣感佛佛不往也佛雖不往光明及處或五百年或一千年皆有聖人傳佛聲教而化導之廣說教義文廣故略之十四年正月一日朝正之次五嶽并諸山道士七百餘人自相命曰天子棄我道法遠求胡教今可以表抗之其表略曰五嶽十八山觀泰山三洞弟子褚善信等死罪上言臣聞太上無形無名無極無上虛無自然大道出於造化之前上古同遵百王不易今陛下道邁羲皇德高堯舜竊承陛下棄本追末求教西域所事乃是胡神所說不參華夏願陛下恕臣等罪聽與試驗臣等諸道士多有徹視遠聽博通經典從元皇已來太上群籙太虛符咒無不綜練達其涯極或策使鬼神吞霞飲氣或入火不燒或履水不溺或白日升天或隱形不測至於方術無所不能願得與其比校一則聖上意安二則得辨真僞三則大道有歸四則不亂華俗臣等若比對不如任聽重決如其有勝乞除虛妄敕遣尚書令宋庠引入長樂宮以今月十五日可集白馬寺道士等便置三壇壇別開二十四門褚善信等各齎靈寶真文太上玉訣三元符籙等五百九卷置於西壇茅成子許成子黃子老子等二十七家子書三百三十五卷置於中壇饌食奠祀百神置於東壇帝御行殿在寺南門佛舍利經像置於道西十五日齊訖道士等以柴荻和檀沉香為炬繞經泣曰臣等上啓太極大道元始天尊衆仙百靈今胡神亂夏人主信邪正教失蹤玄風墜緒臣等敢置經於壇上以火取驗欲使開示蒙心得辨真僞便縱火焚經經從火化悉成灰燼道士等相顧失色大生怖懼將欲升天隱形者無力可能禁效鬼神者呼策不應各懷愧恧南嶽道士費叔才褚善信二人自撼而死太傅張衍語褚信曰卿等所試無驗即是虛妄宜就西來真法褚信曰茅成子云太上者靈寶天尊是也造化之作謂之太素斯豈虛妄乎衍曰太素有貴德之名無言教之稱今子說有言教即為妄也信默然次將梵本佛經火然之赫奕宛如鼎新更增光潔時佛舍利光明五色直上虛空旋環如蓋遍覆大衆映蔽日光摩騰法師踴身高飛坐臥空中廣現神變於時天雨寶花在佛僧上又聞天樂感動人情大衆咸悅歎未曾有皆繞法蘭聽說法要并吐梵音歎佛功德亦令大衆稱揚三寶說諸法相不一又說出家功德最高帝於是彌加崇敬時司空陽城侯劉峻與諸官人士庶等千餘人出家四嶽諸山道士呂惠通等六百二十人出家陰夫人王婕妤等與宮人婦女二百三十人出家帝立十所寺七所城外安僧三所城內安尼自斯已後廣矣傳有五卷略不備載也騰卒蘭自譯十地斷結佛本生法藏海佛本行等五經費長房三寶記并義楚六帖云西漢光祿大夫劉向校書天祿閣往往見有佛經白馬寺記云秦始皇三十年甲申西域沙門室利防等十八人齎梵本經至咸陽有司以聞帝以其異俗囚之利防等念摩訶般若波羅蜜光明照耀瑞氣盤旋滿於囹圄有金神長丈六持杵揚威擊碎其獄出之帝驚悔即厚禮之而去魏略及西域傳云臨猊國有神人名曰沙律年老髮白常教人為浮圖有殃禍及無子者勸行浮圖齊戒令捨財贖愆猊王久無太子其妃莫耶因祀浮圖而生太子遂名其子為浮圖焉前漢哀帝時景憲使月氏國王令太子口授經於景所以浮圖經教前漢早行六十三年之後明帝方感瑞夢也如來涅槃已王臣以香積成樓安金棺於樓上焚七日夜天帝釋持寶瓶瀉乳息火開金棺得舍利八斛四斗天帝取佛右邊大牙歸忉利天歡喜園中建塔時八大國王分舍利回本國建塔龍王取一塔舍利歸宮供養過百年後有鐵輪王出世名阿育統南贍部洲役鬼神一日造八萬四千寶塔遍於南贍部洲此東震旦十九所今現見者惟五六處寧波府鄮山阿育王寺塔高尺餘非木非香又非土石而甚輕四面玲瓏皆菩薩及護法神像記云是鬼神鍊七寶末作者云云漢桓帝漢書并三寶記建和二年月氏國沙門支婁迦讖至洛陽譯佛經凡二十部計六十三卷永興二年帝於宮中鑄黃金浮圖太子像覆以百寶華蓋身自奉之由是百姓向化事佛彌盛震旦鑄金銀像始此西天竺國王名得度勤行佛道一日行道處見一小塔高一尺四寸其色青玄衆莫能舉王問衆僧塔之所因衆莫能辨二十二祖摩拏羅大士謂王曰此阿育王所造佛舍利塔也四面示相前則尸毗王割身肉飼鷹救鴿後則慈力王剜身然燈左則薩埵王子投崖飼虎右則月光王捐捨寶首四面皆是釋迦世尊宿世修道之跡今王有緣故出現耳言已舉之王即傳位太子投祖出家當此桓帝之世也出正宗記靈帝光和三年帝遣中使洛陽佛塔寺飯諸沙門懸繪燒香然燈散花楚王諱英明帝弟出漢書王最先奉佛喜為浮圖齊戒永平九年奉黃縑白紈詣相國曰託在藩輔過惡纍積奉送縑帛以贖罪愆相國以聞詔報曰楚王誦黃老之微言尚浮圖之仁祠何嫌何疑其還之以助伊蒲塞桑門之盛供王公貴人遂爭效之伊蒲塞即優婆塞桑門即沙門助者佐也理惑論共三十七篇今略録數章漢牟融著牟子既修經傳諸子書無大小靡不好之雖不樂兵法然猶讀焉雖讀神仙不死之書抑而不信以為虛誕是時靈帝崩後天下擾亂獨交州差安北方異人咸來在焉多為神仙辟穀長生之術時人多有學者牟子常以五經難之道家術士莫敢對焉時牟子年方盛志精於學又見世亂無仕宦意竟遂不就乃歎曰老子絶聖棄智修身保真萬物不干其志天下不易其樂天子不得臣諸侯不得友故可貴也於是鋭志於佛道兼研老子五千文含玄妙為酒漿玩五經為琴簧世俗之徒多非之者以為背五經而向異道欲爭則非道欲默則不能遂以筆墨之間略引聖賢之言證解之名曰牟子理惑云或問曰何以正言佛佛為何謂乎牟子曰佛者諡號猶名三皇神五帝聖也佛乃道德之元祖神明之宗緒佛之言覺也恍惚變化分身散體或存或亡能小能大能圓能方能老能少能隱能彰蹈火不燒履刃不傷在汙不染在禍無殃欲行則飛坐則揚光故號為佛也問曰何謂之為道道何類也牟子曰道之言導也導人致於無為牽之無前引之無後舉之無上抑之無下視之無形聽之無聲四表為大綩綖其外毫釐為細間關其內故謂之道問曰佛道至尊至大堯舜周孔曷不修之乎七經之中不見其辭子既耽詩書悅禮樂奚為復好佛道喜異術豈能踰經傳美聖業哉竊為吾子不取也牟子曰書不必孔丘之言藥不必扁鵲之方合義者從愈病者良君子博取衆善以輔其身子貢云夫子何常師之有乎堯事尹壽舜事務成旦學呂望丘學老聃亦俱不見於七經也四師雖聖比之於佛猶白鹿之與麒麟燕鳥之與鳳凰也堯舜周孔且尤之而況佛身相好變化神力無方焉能捨而不學乎五經事義或有所闕佛不見記何足怪疑哉問曰云佛有三十二相八十種好何其異於人之甚也殆富耳之語非實之云也牟子曰諺云少所見多所怪睹馲駝言馬腫背堯眉八彩舜目重瞳皋陶鳥喙文王四乳禹耳三漏周公背僂伏羲龍鼻仲尼反頨老子日角目玄鼻有雙柱手把十文足蹈二五此非異於人乎佛之相好奚足疑哉問曰佛道言人死當復更生僕不信此言之審也牟子曰人臨死其家上屋呼之死已復呼誰或曰呼其魂魄牟子曰神還則生不還神何之乎曰成鬼神牟子曰是也魂神固不滅矣但身自朽爛耳身譬如五穀之根葉魂神如五穀之種實根葉生必當死種實豈有終亡得道身滅耳老子曰吾所以有大患以吾有身也若吾無身吾有何患或曰為道亦死不為道亦死有何異乎牟子曰所謂無一日之善而問終身之譽者也有道雖死神歸福堂為惡既死神當其殃愚夫暗於成事賢智預於未萌道與不道如金比草善之與惡如白方黑焉得不異而言何異乎問曰孔子云未能事人焉能事鬼未知生焉知死此聖人之所紀也今佛家輒說生死之事鬼神之務此殆非聖哲之語也夫履道者當虛無淡泊歸志質朴何為乃道生死以亂志說鬼神之餘事乎牟子曰若子之言所謂見外未識內者也孔子疾子路不問本末以此抑之耳孝經曰為之宗廟以鬼享之春秋祭祀以時思之又曰生事愛敬死事哀戚豈不教人事鬼神知生死哉周公為武王請命曰旦多才多藝能事鬼神夫何為也佛經所說生死之趣非此類乎老子曰既知其子復守其母沒身不殆又曰用其光復其明無遺身殃此道生死之所趣吉凶之所住至道之要實貴寂寞佛家豈好言乎來問不得不對耳鐘鼓豈有自鳴者桴加而有聲矣問曰吾子以經傳理佛之說其辭富而義顯其文熾而說美得無非其誠是子之辨也牟子曰非吾辨也見博故不惑耳問曰見博其有術乎牟子曰由佛經也吾未解佛經之時惑甚於子雖誦五經適以為華未成實矣吾既睹佛經之說覽老子之要守恬惔之性觀無為之行還視世事猶臨天井而窺溪谷登嵩岱而見丘垤矣五經則五味佛道則五穀矣吾自聞道已來如開雲見白日炬火入冥室焉問曰子以經傳之辭華麗之說褒讚佛行稱譽其德高者陵青雲廣者踰地坼得無踰其本過其實乎而僕譏刺頗得疹中宜其病也牟子曰吁吾之所褒猶以塵埃附嵩岱收朝露投滄海子之所謗猶握瓢觚欲減江海操耕耒欲損崑崙側一掌以翳日光舉土塊以塞河衝吾所褒不能使佛高子之毀不能令其下也詳如弘明集曹植字子建武帝第四子廣弘明集植精通書藝時稱為天人每讀佛經輒留連嗟玩以為至道之宗極嘗遊漁山聞空中梵天之響清揚哀婉因倣其聲寫為梵唄今法事有漁山梵即其餘奏也嘗著辨道論言仙道虛妄闞澤字德潤山陰人廣弘明集并宗炳明佛論吳主孫權問尚書令闞澤曰孔丘李老得與佛比對否澤曰臣聞魯孔君者英才誕秀聖德不群世號素王制述經典訓獎周道教化來葉師儒之風澤潤今古亦有逸民如許成子原陽子莊子老子等百家子書皆修自玩放暢山谷縱佚其心學歸淡泊事乖人倫長幼之節亦非安俗化民之風至漢景帝以黃子老子義體尤深改子為經始立道學敕令朝野悉諷誦之若以孔老二教比方佛法遠則遠矣所以然者孔老二教法天制用不敢違天諸佛設教諸天奉行不敢違佛以此言之實非比對吳主大悅以澤為太子太傅東晉袁宏廣弘明集宏有逸才嘗著漢紀云西域天竺有佛道焉佛者覺也將覺悟群生也其教以修善慈悲為主專務清淨其精者號沙門漢言息心蓋息意去欲而歸於無為也又以為人死精靈不滅隨復受形生時行善惡皆有報應故所貴行善修道以鍊精神以至為佛也世俗之人或以為虛誕然歸於玄微深遠難得而測故王公大臣現生死報應之際莫不矍然而自失焉孫綽廣弘明集哀帝朝為著作郎撰喻道論略曰夫佛也者體道者也道也者導物者也應感順通無為而無不為者也無為故虛寂自然無不為故神化萬物或難曰周孔適時而教佛欲頓去殺將何以懲暴止奸哉答曰不然周孔即佛佛即周孔故在皇為皇在王為王佛者覺也猶孟軻以聖人為先覺其旨一也周孔救弊佛教明本共為首尾其致不殊難曰周孔以孝為首而沙門之道棄親即疏利剔鬚髮生廢色養終絶血食而云弘道敦仁廣濟群生答曰故孝之為貴貴能立身行道永光厥親若匍匐懷橘日御三牲而不能令萬物尊己非養親之道昔佛為太子棄國學道道成號佛具三十二相八十種好游步三界之表恣化無窮之境天清地潤品物咸亨蠢蠕之生枯槁之類改悴為榮還照本國廣敷法音父王咸悟亦升道場以此榮親何孝如之佛有十二部經其四部專以勸孝為事殷勤之旨可謂至矣而俗人不詳其源便瞽言妄說輒生攻難以螢燭之見疑三光之盛芒隙之滴怪淵海之量以誣罔為辨以果敢為明可謂狎大人而侮天命者也略録晉至劉宋西晉武帝大崇佛事廣造伽藍惠帝於洛下造興聖寺常供百僧出方志東晉元帝詔沙門竺潛入內講經帝敬其德令著屐登殿中人聚觀歎道德高風之盛帝造瓦棺龍興二寺以集丹陽建業千僧供養明帝手御丹青圖釋迦佛像于大內樂賢堂造皇興道場二寺集義學沙門百員講論佛道出六帖并統紀成帝詔會稽寶山法義法師入禁中傳授五戒建中興塵野二寺以居義學千僧出六帖簡文帝幸瓦棺寺聽竺法汰講放光般若經敕長干寺造塔壯麗殊偉工畢光照簷宇帝每讀佛經以為陶鍊精神即聖可至出釋鑑孝武帝聞道安法師名詔曰法師以道德照臨人天使大法流行為蒼生依賴宜日食王公祿所司以時資給廬山遠公師安安師佛圖澄秀紫芝編年論曰佛教之盛由佛圖澄而得安由安而得遠公是三大士化儀全偉帝於內殿立精舍奉佛召名德沙門居中講道造皇泰本起二寺王羲之於廬山建歸宗寺請西天達磨多羅居之羲謁沙門支遁于會稽觀其風力謂曰逍遙可得聞乎遁作數千言與之羲遂披襟解帶留連不能已乃請住靈嘉寺意存相近也出晉史并僧傳郗超字景興為桓溫府椽嘗著五戒文自行五戒年三長齊月六齊凡齊日不嘗魚肉不御妻妾過中不食洗心念道歸依三寶東晉羅含徵為尚書郎著更生論略曰萬物有數天地無窮萬物不更生則天地有終天地無終則更生可知矣出弘明集謝尚晉為鎮西將軍嘗夢其父告之曰西南有氣至人當必死汝宜修福建塔造寺可禳之若未暇造塔寺可於杖頭刻作塔形見氣來可擬之尚寤遂刻小塔施於杖頭恆置左右後果有異氣從天而下始如車輪而漸彌大直衝尚家尚以杖頭指之氣即回散闔門獲全氣所經處數里無復孑遺尚遂捨宅為莊嚴寺出建康録後秦姚興少敬三寶迎羅什法師歸秦奉之若神講經於草堂寺興及朝臣沙門千餘人肅容觀聽由是公卿以下皆奉佛法州郡受化事佛者十室而九僧尼萬數師譯經律三百八十卷大營塔寺坐禪者常以千數師於弘始十五年四月十三日入滅壽七十歲入滅日謂衆曰所譯惟十誦律未及刪繁義契佛心焚身之日舌不焦壞言訖而逝荼毗舌果不壞若紅蓮色出高僧傳及北史魏太祖下詔曰佛法之興其來遠矣濟益之功冥及存歿神蹤遺法信可依憑敕有司於京城建飾容範修整寺舍令信向之人有所依止出魏史太祖於虞地造十五級浮圖又造開泰定國二寺寫佛經論造千金佛像每日法集三百名僧講道出弘明集魏太武廢釋教遘癘疾兩年為中常侍宗愛所弒皇孫濬即帝位群臣多請帝復釋教詔曰夫為帝王者必祗奉明靈顯彰仁道其能惠著生民濟益群品雖在往古猶序其風烈是以春秋喜崇明之禮祭典載功施之族況釋教如來功濟大千惠流塵境尋生死者歎其達觀覽文義者貴其妙門助王政之禁律益仁智之善性排撥群邪開演正覺故前代已來莫不崇尚亦我國家常所尊事今制諸州郡縣衆居之所各聽建佛寺塔其有好樂佛法欲為沙門者聽出家大州五十人小州四十人於是嚮所毀佛寺率皆修復又敕有司於五級大寺為太祖已下五帝鑄銅佛像各一丈六尺帝親為沙門師賢等五人下髮以師賢為道人統出魏書并僧史略獻文帝聰慧夙成剛毅有斷雅好浮圖之學常有遺世之心傳位太子宏徙居崇光宮宮在北苑建鹿野寺於苑中之西山與僧居之時談禪理出魏史帝紀帝嘗造四方諸寺一千餘所度僧尼七萬七千人出北史并弘明集宋武帝姓劉以京口故宅為普照寺設齊內殿施嚫資三萬帝手書戒經口誦梵本造寺五所出帝紀并稽古略文帝元嘉五年造禪靈寺常供千僧九年幸大莊嚴寺設大會帝親同四衆坐地及齊衆以過午不食帝曰日才中耳道生法師曰白日麗天天既云中何得非中舉鉢便食衆隨之帝大悅元嘉八年帝詔求那跋摩尊者中天竺人赴京帝迓勞殊勤問以佛道稱旨帝悅尊之為師命居祗洹寺供給隆厚於寺講法華經并十地品帝率公卿日集座下以聽法法席之盛前未有也十九年西域獻帝火浣布袈裟帝時自衣之出宋史并弘明集孝武帝於中興寺建八關齊戒中食竟從臣袁敏孫等更進魚肉帝怒並與免官帝詔曇宗法師懺罪帝因曰朕有何罪而勞師為懺宗曰舜稱豫違汝弼禹曰萬方有罪在豫一人陛下履道思沖寧得獨異帝大悅出高僧傳明帝嘗造佛丈六金身旦食常齊日誦般若爰感舍利造普光寺帝謂道猛法師曰師非直道益蒼生亦乃有光世望敕講成實論公卿畢集帝親臨聽出高僧傳帝問志公曰牛首山有何神聖志曰文殊領一萬菩薩夏居五臺冬居牛首云云出六帖四衆比丘比丘尼五戒男五戒女何尚之出宋史元嘉十二年文帝謂侍中尚之曰范泰謝靈運常言六經本在濟俗若求性靈真要則必以佛理為指南近見顏延之折達性論宗炳難黑白論並明達至理開獎人意若率土皆敦此化則朕坐致太平矣尚之曰渡江已來王導周顗庾亮謝安戴逵許詢王蒙郗超謝尚王坦之臣高祖兄弟何充兄弟莫不稟志歸依夫百家之鄉十人持五戒則十人淳謹千室之邑百人修十善則百人和睦人能行一善則去一惡去一惡則息一刑一刑息於家萬刑息於國此明旨所謂坐致太平者也故圖澄適趙二石減暴靈塔放光符揵損虐神道助化昭然可觀至於土木之功雖若巨費然值福報恩不可頓絶羊玄保進曰此談蓋天人之際豈臣所宜預竊謂秦楚強兵孫吳吞併將無取於此也尚之曰夫禮隱逸則戰士息貴仁德則兵氣銷以孫吳為志動期吞併則將無取乎堯舜之道豈特釋教而已哉帝悅曰釋門之有卿猶孔門之有季路惡言不入於耳也范泰子作出漢書泰博覽群籍好為文章暮年事佛甚精子曄撰東漢書其西域論略曰佛道神化興自身毒其國則殷乎中土玉燭和氣靈聖之所降集賢懿之所挺生神跡詭異則理絶人區感驗明顯則事出天外而張騫無聞者豈其道閉往運數開叔葉乎身毒梵語即天竺也北魏孝文帝釋鑑并北史正宗記帝改姓元氏上皇敕自今祭天地宗社勿用牲唯薦以酒脯造建明寺詔每年四月八日七月十五日聽大州一百人為僧中州五十下州二十五著令以為常詔懿德法師聽一月三入殿俾朕餐稟道味光飾朝廷帝在位二十九年手不釋卷暇則自講六宮侍女皆持六齊度僧造寺甚衆宣武帝孝文帝次子詔西域菩提流支於紫極殿譯楞伽經帝親筆受又於式乾殿講維摩經國家大寺四十七所三公等建寺八百四十所百姓造寺院三萬一千所僧至二百萬時自西域來者三千餘人帝別立永明寺房舍千餘間以處之遠近承風無不事佛孝明帝宣武次子詔諸郡立五級浮圖胡太后敕宋雲與沙門慧生等往西天求經四年宋雲等使西域還得佛經一百七十部太和十八年帝幸徐州白塔寺寺有道登法師入滅下詔傷悼施絹千匹齊一切僧京城七日行道中天竺佛陀禪師志愛嵩嶽帝敕就少室山立少林寺居之師度弟子僧稠慧光孝明帝正光二年達磨自梁入魏至嵩山少林寺面壁而坐帝三詔不至就賜摩衲袈裟金鉢銀水瓶繒帛師不受三返然後受之胡太后建永寧寺在宮側鑄金像高一丈六尺者一如中人者十王像二造九層浮圖高十九丈上剎竿高十丈塔金鈴鐸如甕大靜夜聲聞十里自佛法入中國塔寺之盛未之有也魏國通有佛經四百十九部合一千九百一十九卷南齊高帝方志并弘明集帝在位持齊修十善誦持般若經書寫法華經四月八日鑄一千金佛像七月十五日普寺供僧造陟屺正觀二寺蕭子良廣弘明集蕭子良封竟陵王與文慧太子並精佛理每招致名僧講論佛乘尊法之盛江左未有或親為衆僧賦食行水子良嘗夢東方普光世界天王如來說淨住淨行法門因注淨住子二十卷謂淨身口意如戒而住也淨行者以諸業淨則化行於世也齊永明八年感夢乃注法門三十一條備載廣弘明集三十二卷梁武帝出南史天監二年癸未侯景生即齊東昏侯後身是日志公在便殿賜坐忽顰蹙引頸歎曰仇敵生也帝罔測三年四月八日帝捨道奉佛親製疏文曰弟子蕭衍在昔耽事老子歷葉相承染此邪法今捨舊習歸憑正覺願使未來生世童男出家廣化衆生共取成佛寧在正法長淪惡道不樂依老暫得生天陟大乘因永離邪見云云天監十八年四月八日帝延慧約法師於等覺殿受菩薩戒設無遮大會帝自受戒後過午不食膳無鮮腴唯豆羹糲飯而已或遇事冗不暇就食日才過中便漱口而坐大同元年法師入滅帝素服臨喪哭之輟朝七日詔葬獨龍山從師受戒者萬八千人皆服緦麻哭送葬所太清三年夏四月逆賊侯景陷臺城以甲士五百人自衛帶劍上殿拜訖帝神色自若使引向三公坐榻謂曰卿在戎日久無乃為勞乎景惶懼不能對出謂左右曰吾每據鞍臨敵矢石交下了無所怖今見蕭公使人畏懾豈非天威難犯吾不復見之矣及景自稱大丞相而徵求無已帝惡後寢疾安臥不動齊戒不衰日夕念佛不絶於口時皇子侍側五月丙辰大漸不能進膳久而口苦索蜜未至而舉手曰荷荷荷即蓮花鑑以荷荷為憤怒之聲何毀之太過耶遂崩於淨居殿年八十有六在位四十九載帝日角龍顏舌紋八字項有浮光身映日無影右手紋成武字幼嘗蹈空而行所居之室常若雲氣人或遇者體輒肅栗前後受命符瑞凡六十餘事及即位太極殿常有六龍各守一柱其神奇異瑞自書契以來人君皆所未有幼而好學六藝備閒棋登逸品至於陰陽緯候卜筮占決草隸尺牘騎射並洞精微雖登大位萬機多務猶手不釋卷然燭測光常至戌夜撰通史六百卷金海三十卷五經義注講疏等合二百餘卷贊序詔誥銘誄針頌箋奏諸文凡一百二十卷製涅槃大品淨名三慧諸經義記數百卷聽覽餘暇即於重雲殿同泰寺講說名僧穎學四部聽衆常萬餘布衣木綿皂帳一冠三載一被二年五十外便斷房室不食酒肉不取音樂非宗廟祭祀大會饗宴及諸法事未嘗舉樂勤於政事每冬月四更竟即敕把燭看事執筆觸寒手為皴裂然仁愛不斷每決死罪常矜哀流涕然後可奏性方正雖居小殿暗室常理衣冠小坐暑月未嘗褰袒雖見內豎小臣如遇嚴賓焉諡曰武帝廟號高祖四部即四衆釋鑑曰因果之故嚴矣哉仁慈之德大矣哉東昏以武帝為仇終必致報武帝道隆德重東昏但能使其失國不能復害其身帝其以身示現令兩義雙彰為天下萬世法者乎元帝承聖元年壬申四月景敗尋伏誅傳首江陵暴尸於市士民爭食之并骨皆盡史官魏徵曰高祖固天攸縱聰明稽古道亞生知學為博物允文允武多藝多才爰自諸生不羇之度屬昏凶肆虐天倫及禍紏合義旅將雪家冤曰紂可伐不期而會龍躍樊漢電擊湘郢剪離德如振槁取獨夫如拾遺其雄才大略固不可得而稱矣既懸白旗之首方應皇天之眷而布澤施仁悅近來遠開蕩蕩之王道革靡靡之商俗大修文學盛飾禮容鼓扇玄風闡揚儒業介胄仁義折衝樽俎聲振寰區澤周遐裔干戈載戢凡數十年濟濟焉洋洋焉魏晉以來未有若斯之盛也念常曰魏徵公論梁武帝可謂天下仁人之言也而新唐史蕭瑀傳贊亦曰梁蕭氏興江左實有功在焉厥終無大惡以浸徵而已故餘祉及其後裔以此驗徵公之論益可詳矣然韓退之嘗曰梁武餓死臺城蓋謂其屏嗜欲絶午後食至臨終齊戒不衰在恣情豐美享用者視之近乎餓死耳猶孔子稱伯夷叔齊餓死首陽其徵意乃所以成其美焉豈謂不得食而餓死哉凡謂得失成敗如魏徵公之言乃春秋責備賢者之旨得不為萬世之公道哉梁昭明出梁史名統武帝長子卒諡昭明五歲遍誦五經天性好佛於東宮立慧義殿招天下名僧居之凡佛經論披覽略遍撰諸注述自出宮二十年不畜聲樂唯以法為樂沈約廣弘明集約字休文不飲酒少嗜欲居處儉素仕至尚書僕射嘗著懺悔文對三寶前懺悔其詞懇切追自愧責又著中食論一卷謂一則勢利榮名二則妖妍靡曼三則甘旨肥濃皆使心神昏惑不能得道故聖人禁此三事復有千僧會願文慈悲論禮佛願疏捨身等文備載廣弘明集家訓歸心篇北齊顏之推撰三世之事信而有徵家素歸心勿輕慢也其間妙旨具諸經論不復於此少能讚述但懼汝曹猶未牢固略重勸誘耳原夫四塵五陰剖析形有六舟三駕運載群生萬行歸空千門入善辨才智慧豈徒七經百氏之博哉明非堯舜周孔老莊之所及也內外兩教本為一體漸極為異深淺不同內典初門設五種之禁與外書仁義五常符同仁者不殺之禁也義者不盜之禁也禮者不邪之禁也智者不酒之禁也信者不妄之禁也至如畋狩軍旅宴饗刑罰因民之性不可卒除就為之節使不淫濫耳歸周孔而背釋宗何其迷也俗之謗者大抵有五其一以世界外事及神化無方為迂誕也其二以吉凶禍福或未報應為欺誑也其三以僧尼行業多不精純為姦慝也其四以糜費金寶減耗課役為損國也其五以縱有因緣而報善惡安能辛苦今日之甲利益後世之乙乎為異人也又戒殺家訓云儒家君子尚離庖廚見其生不忍其死聞其聲不食其肉高柴曾皙未知內教皆能不殺此皆仁者自然用心也含生之徒莫不愛命去殺之事必勉行之見好殺之人臨死報驗子孫殃禍其數甚多不能具録耳陳武帝諱霸先字興國仕梁滅侯景有功進位相國封陳公進爵為王受梁禪辨正録永定元年詔迎佛牙於杜姥宅設四部無遮大會二年於楊州造東安興皇天宮等寺五月帝幸大莊嚴寺捨身翌日表請還宮設會供僧布施放生金陵七百餘寺侯景焚蕩幾盡帝悉令修復譯經講道詔寫藏經造金銅佛像度僧尼各若干金陵戰國楚威王時以其地有王氣埋金以鎮之故曰金陵文帝諱蒨字子華武帝兄昭烈王長子廣弘明集天嘉四年於太極殿設無礙大會行捨身法修治故寺寫經度僧倍於前朝出六帖嘗製法華懺文略曰竊以前佛後佛種種因緣已說當說各各方便莫非真語悉為妙法理無二極趣必同歸但品位分淺深覺悟有遲速法雨一味得之者參差法雷一音聞之者差別是以小乘頓教由此各名聲聞菩薩因斯分路至如鹿苑初說羊車小乘灰斷涅槃分段解脫以諸佛之善巧會衆庶之根機是曰半字未稱三點及夫會三歸一返本還源說大乘經名無量義滅化城於中路駕寶車於四衢衣裏明珠隱而還現髻中珍寶於焉始得出寶塔於虛空涌菩薩於大地現希有事證微妙法最勝最尊難逢難值弟子以因地凡夫屬符負荷欲憲章古昔用拯黎元所以憑心七覺繫念四勤住菩薩乘顯無三之教學如來行開不二之門汲引群迷導示衆惑今謹於某處建如干僧藏法華懺願多寶如來從地涌出普賢菩薩乘象空來並入道場證明功德總持性相同到無生宣帝昭烈王次子於揚州建太皇寺復造七級浮圖詔僧未滿五夏者皆參律部帝在位造金銅佛像寫藏經度僧尼盛擬先朝出釋鑑隋高祖三寶紀隋紀辨正録開皇元年三月詔於五嶽之下各置僧寺一所七月詔曰伏惟太祖武元皇帝間關三代造我皇基追仰神猷事冥真寂思欲廣崇寶剎經始伽藍增長福田微副幽旨其襄陽隋郡江陵晉陽並宜立寺一所建碑頌德每年國忌日設齊行道八關懺悔奉資神靈八月制曰昔周道既衰群凶鼎沸朕出車練卒蕩滌妖醜節義之徒輕生忘死干戈之下每聞殂落永念群生蹈兵刃之苦有懷至道興度脫之心思建福田法力冥助庶死事之臣善根增長悖逆之侶從暗入明並究苦空咸拔生死可於相州戰地建伽藍一所是冬沙門智周等自西域還進梵本經二百六十部敕付有司召人翻譯三年三月詔曰朕欽崇聖教念存神宇其周朝所廢之寺咸可修復又敕中好生惡殺王政之本佛道垂教善業可憑稟氣含靈唯命為重宜勸勵天下同心救護其京城及諸州官所立寺正五九月常起八日至十五日當寺行道其日遠近民庶凡是有生之類悉不得殺五年詔曰朕夙膺多祉恭嗣寶命方欲歸依正覺欽崇聖果今請經法師於大興善殿授朕菩薩戒然菩薩之教以解脫為先戒行之本慈悲為始今囹圄幽暗有動於懷自流罪以下悉可原放又敕曰佛以正法付囑國王朕是人尊受佛付囑自今以後訖朕一世每月常請二七僧隨番上下轉經經師四人大德三人於大興善寺讀一切經文十年敕曰自開皇十年已前諸有僧尼私度者及境內之人樂道並聽出家十一年制曰如來設教義存平等菩薩用心本無差別故能津梁品庶濟度群生朕位在人主紹隆三寶永言至理弘闡大乘諸法豁然體無彼我況於福業乃有公私自今凡是營建功德普天之內混同施造隨其意願勿生分別庶一切法門同歸不二十方世界俱至菩提十三年皇第三子蜀王秀獵政州之野馬突入一古窯滿窯皆佛菩薩之像帝聞詔諸像仰所在官司精加撿括運送近寺率土蒼生各施一文委官裝飭帝立疏文略曰弟子楊堅今於三寶前至心懺悔周室毀像殘經慢僧破寺如此重罪悉為懺悔敬施一切毀廢經像絹十二萬匹願三寶證明受我懺悔云云皇后亦施絹十二萬匹王公已下臺官主將以至州縣佐吏諸寺僧尼京城宿老下逮黔黎一一施錢再日設齊奉慶經像詔於諸州名山下各置僧寺一所并賜莊田十四年敕率土之內但有山寺一僧已上皆聽綸額私度者附貫十五年帝以僧尼時有過失付內律佛制不許俗看帝及皇后於京師法界尼寺造連基浮圖下安佛舍利七月放大光明請法純禪師入內為皇后受戒十七年正月沙門寶貴以開皇已來新所譯經奏上帝親製序翻經學士費長房初為僧周武廢教返俗帝召預參譯筆受詞義長房撰歷代三寶紀十五卷下敕行之二十年詔有毀佛經像者以惡逆論帝謂靈藏律師曰弟子是俗人天子律師是道人天子有離俗者任師度之由是度僧至數萬帝大悅曰律師化人為善弟子禁人為惡意則一也初帝微時遇梵僧以舍利一裹授之曰檀越他日為普天慈父此大覺遺靈與汝供養及帝即位嘗與法師曇遷置舍利掌中數之或少或多不定遷曰諸佛法身過於數量非世所測帝始作七寶箱貯之忽憶其事詔曰仰惟正覺大慈大悲救護衆生津梁庶品皈依三寶重興聖教思與四海共修福業永作善因同登妙果召沙門堪宣道者三十人各將侍者二人散官一人薰陸香百二十斤分送舍利往岐雍泰華等三十州建塔期以十月十五日午時同入塔帝於十月十五日午時御大興殿西向執圭而立延請佛像及沙門三百六十人幡蓋音樂自大興寺迎來至殿燒香禮拜率文武百僚齊食及舍利入塔時畢後三十州表奏皆有瑞應二年正月復敕秦陝恆杭等五十三州建塔期以四月八日午時同入塔並如前式各有感驗仁壽二年五月十五日雍州天雨金屑寶花七月十五日長安延興寺鑄丈六金銅佛像天雨寶屑銀花帝在位二十四年寫佛經四十六藏凡十三萬卷修治故經四百部造金銅佛像六十餘萬軀修治故像一百五十萬九千餘軀宮內造繡織像及畫像五彩珠幡不可稱計崇緝寺宇五千餘所譯經道俗二十四人所出經論垂五百餘卷詳載廣弘明集并王邵記王通字仲淹文中子集隋大業十三年通疾聞煬帝被害泫然而興曰生民厭亂久矣其或者將啓堯舜之運吾不與焉命也通卒於家門人諡曰文中子弟子薛收等編集其言名中說其周公篇曰詩書盛而秦世滅非仲尼之罪也虛玄長而晉室亂非老莊之罪也齊戒修而梁國亡非釋迦之罪也或問佛文中子曰聖人也其教何如曰西方之大教也或問長生神仙之道文中子曰仁義不修孝弟不立奚為長生李士謙喻報說出隋書謙少喪父事母以孝聞其族伯父瑒每歎曰此兒吾家之顏子也善天文術數自以少孤魏廣平王贊辟開府參軍事隋有天下畢志不仕未嘗飲酒食肉口無殺害之言如此積三十年雅好舉止約以戒定有謂其修陰德士謙笑曰夫陰德其猶耳鳴唯己知之人無得而知者今吾所作仁者皆知何陰德之有善談玄理嘗有一客在座不信佛家報應之說士謙諭之曰積善餘慶積惡餘殃豈非休咎之徵耶佛經曰輪轉五道無復窮已此則賈誼所云千變萬化未始有極忽然為人之謂也佛道未東而賢者已知其然矣至若鯀為黃能杜宇為鶗鵙褒君為龍牛哀為虎君子為鵠小人為猿彭生為豕如意為犬黃母為黿宣武為鱉鄧艾為牛徐伯為魚鈴下為烏書生為蛇羊祜前身李氏子此皆佛家變異形報之驗客人曰邢子才云世有松柏化為樗櫟僕以為然士謙曰此不類之談也變化皆由心業豈關木乎又問三教優劣士謙曰佛日也道月也儒五星也客不能難而去念常曰北史史官蔣沈等記李君之事詳悉如此豈非心懷佛德盡己之誠不敢欺訹後之來者歟士謙以日月星方三教以其照明世界運轉生靈則一德也是三者闕一則安立不成故易曰乾道變化各正性命賢哉李君吾見其深於性命之大原也楊素字處道出統紀素奇策高文為一時之傑封越國公尊重佛法造光明寺嘗遊華嶽道觀見壁間畫像問道士曰此何圖也道士曰老子化胡成佛圖素曰承聞老子化胡胡人不受老子變身為佛胡人方受是則佛能化胡道不能化何言老子化胡乎老子安用化胡為佛何不化胡為道道流不能對唐高祖舊唐史并辨正録帝於朱雀門南街建道場設無遮大會又設千僧齊捨晉陽舊第為興聖寺前後共建七寺又為太祖元皇帝造栴檀像三軀以薦冥福太宗舊唐史并稽古略貞觀元年正月詔在京德行沙門並各於當寺行道七日齊供所須有司準給二年三月帝追念初平天下手所誅戮將近千人切以如來聖教深尚仁慈禁戒之科殺害為重受命有司京城諸寺為建齊轉經行道七日七夜竭誠禮懺薦度所有御服並用檀捨冀三途之難因斯解脫萬劫之苦藉此弘濟下敕正五九月月六齊日普斷屠殺三年詔曰有隋失道九服沸騰朕親總元戎致茲明罰切恐九泉之下尚淪鼎鑊八難之間永纏冰炭所以樹立福田濟其魂魄可於建義以來交兵之處為義士凶徒殞身戎陳者各建寺剎招延勝侶望法鼓所震變炎火於青蓮清梵所聞易苦海於甘露所司量定處所並立寺宇具為事條以聞稱朕矜哀之意五年以慶善宮為慈德寺七年敕禁堰塞取魚并斷屠殺詔曰天下諸州有寺之處宜度僧尼數以三千為限其州有大小地有華夷當處所度多少有司詳定務取德業精明其往因減省還俗及私度白衣之徒若行業可稱通在取限時天下寺三千七百餘所度僧一萬七千餘衆詔法師玄琬入宮為妃嬪及皇太子諸王等授菩薩戒琬於十年十二月將入滅遺表曰聖帝明君恭敬三寶沙門或有犯法不應與民同科乞付所屬以僧律治之并上安養論三德論帝嘉納之有詔傷悼遺太子臨弔敕有司給葬具仍於葬所建佛塔一區敕庶子李伯藥撰碑十五年五月戊辰帝幸宏福寺召大德道懿等五人賜坐諭以創寺為專一追崇穆太后言發涕零懿及左右皆哽咽逡巡自製疏施絹二百匹自稱皇帝菩薩戒弟子某令回向罷顧謂道懿等曰頃以老子是朕先宗故令名位在前師等應有恨耶道懿曰陛下尊祖宗懿等蒙荷國恩安閒學道詔旨初下咸皆歡悅詎敢有恨帝曰尊祖重親有生之大本故先老子以別親疏之序非不留心於佛也朕自有國以來未嘗創立道觀凡有功德並歸僧舍雖往日操戈臨陳亦未始縱威濫殺但所在戰場皆立佛寺至於太原舊第亦以建寺奉佛朕存心如此師等想未諭也道懿等遽起趨謝帝曰少坐此是朕意不述則人不知天時向熱寺宇未備今所施可別造經寮令衆僧寬展行道十八年詔曰如來滅度以末代澆浮付囑國王大臣護持佛法然僧尼出家戒行須備若縱情放逸觸途煩惱關涉人間動遺經律既失如來玄妙之旨又虧國王受付之義遺教經是佛涅槃所說戒勒弟子甚為詳要末俗緇素並不崇奉大道將隱微言且絶永懷聖教用思弘闡宜令所司差書手十人多寫經本務盡施行其京官五品以上及諸州刺史各付一卷若見僧尼業行與經文不同宜公私勸勉必使遵行十九年正月玄奘法師自西域還帝曰師能委命求法惠利蒼生朕甚嘉焉奘奏西域所獲梵本經論六百五十七部乞就少林宣譯帝曰朕頃為穆太后創弘福寺可就彼翻譯敕房玄齡監護資備所須一出天府二十年七月辛卯法師玄奘表上新譯菩薩藏經六門陀羅尼經顯揚聖教論大乘雜集論凡五部五十八卷請帝為聖教序降手敕曰省書具悉雅意法師夙標高行早出塵表泛寶舟而登彼岸搜妙道而闢度門弘闡大猷蕩除衆罪朕學淺心拙在物猶迷況佛道幽微豈能仰讚側請為序非己所聞奘重表請製乃許之手敕答曰朕才謝圭璋言慚博達至於內典尤所未聞昨製序文深慚鄙拙穢翰墨於金簡標瓦礫於珠林忽得來書謬承褒讚循躬省慮彌益厚顏善不足稱虛勞致謝帝復覽新譯菩薩藏經愛其辭旨微妙因詔皇太子撰菩薩藏經後序十月車駕還京師敕有司於北闕紫微殿西南創弘法院留奘居禁中晝則陪御談論夜分就院譯經十二月皇太子為文德皇后創大慈恩寺成詔選京城宿望五十大德各度侍者六人入居新寺是月丙辰太子備寶車五十乘迎諸大德并綵亭寶剎數百具奉安新獲梵夾諸經及瑞像舍利等敕太常九部樂及長安萬年音樂京城諸寺花幡導引入寺帝御安福門樓執爐致敬經像過盡始罷皇情大悅又斷賣佛道像敕曰佛道形像事極尊嚴伎巧之家多有造鑄供養之人競來買贖品藻工拙揣量輕重買者不計因果止求賤得賣者本希利潤惟在價高罪纍特深福報俱盡違犯經教並宜禁約自今已後工匠皆不得預造佛道形像鬻賣其現成之像亦不得銷除各令分送寺觀令寺觀徒衆酬其價直仍仰所在州縣官司檢校敕到後十日使盡帝依梵網經故不許賣佛形像也二十二年上在春宮日天陰掌疼問及左右對曰應是太子洞玄下針處於是思報昊天追崇福業命有司擇地為母文德順聖皇后建慈恩寺凡十餘院一千八百九十七間度僧三百員敕奘三藏為上座盛事如碑所載是歲六月帝幸坊州玉華宮召奘法師至帝曰比日所譯何經奘曰近譯瑜伽師地論帝覽之謂侍臣曰佛教廣大若瞻天瞰海莫測高深九流典籍如汀瀠方溟渤耳世言三教齊致者是妄談也敕有司揀祕書手寫新譯經論各九部令宣賜九州總管展轉流布冀率土之內同稟未聞之法司徒長孫無忌中書令褚遂良奏曰佛教沖玄天人莫測言本則甚深語門則難入伏惟陛下至道照明輝光昱日澤霑遐界化溢中區擁護五乘建立三寶致法師叔葉而秀質間千載而挺生陟重險以求經履危途而訪道見珍異俗具獲真文歸國翻宣若庵摩之始說精文奧義猶金口之新開皆陛下聖德所感臣等愚瞽預此見聞苦海波瀾舟航有寄況天慈廣遠使布之九州蠢蠢黔黎俱餐妙法臣等億劫欣逢不勝慶幸帝問奘曰法門之益何所宜先對曰弘法須人度僧為最帝大悅由是廣度僧尼二十三年四月帝幸翠微宮法師玄奘陪駕每談敘淵奧帝必攘袂曰與法師相值恨晚耳未盡弘法之意夏五月帝不豫帝執太子手曰無忌遂良在國家事汝無憂矣是年崩于含風殿年五十有三太史令傅奕善天文曆數在隋為道士甚不得志太史令庾儉恥於術官薦奕以代既承命得志朝廷自武德貞觀年為太史令性不信佛凡七上疏請除佛法高祖悟奕譽道毀佛太宗以其疏付群臣議大臣皆曰佛法興自屢朝弘善遏惡冥助國家理無廢棄蕭瑀曰佛聖人也而奕非之非聖者無法當治其罪一日太宗謂奕曰佛道微妙聖跡可師且報應顯然汝獨不悟其理何也奕曰佛是西方桀黠欺訹夷狄及流入中國尊尚其教皆邪僻纖人摸寫莊老玄言飾其妖妄無補于國家有害於百姓帝惡其言不答自是終身不齒蕭瑀曰地獄正為此人設李師政著內德論三篇辨之奕後臨終惡病并墮地獄事俱出冥報記今六道集已載祥符常禪師曰嘗慨資治通鑑言貞觀中有僧自西域來善咒術能令人立死復咒之令蘇太宗擇飛騎中壯者試之皆驗因以問傅奕奕曰此邪術也臣聞邪不干正請試咒臣必不能行令咒奕奕初無所覺須臾僧忽僵仆遂不復蘇此必好事者曲為之辭何則若使果有是則僧非真僧咒非真咒正謂邪術耳固不足以張吾教之疵也而況斷無此理彼自西域遠至長安其術能死人而復蘇乃不暇自能衛其身對常人無故而僵死雖兒童莫之信也又當時京城有大德僧慧乘玄琬法淋明瞻諸公其肯坐視僞僧破壞教門不請峻治乃留帝命傅奕辨耶佛制戒律雖春蹊生草猶不許比丘踐之恐害其生也況肯說斷人命咒傳於世乎故余謂好事者曲為之辭斷可見矣空谷曰太宗明君也豈不識破彼邪術乎況貞觀初有道德高僧杜順和尚等十餘人續有三藏玄奘法師清涼觀國師宣律師等常居輦下太宗朝夕聚話論道無虛日諸師明通五眼學貫九流擔荷佛法重任者也何不破除邪術而容其遲玩乎高宗舊唐史并高僧傳永徽三年帝用七宮亡者衣物財帛而建鴈塔於慈恩寺其基四面各一百四十尺倣西域制度而有五級并象輪露盤高一百八十尺層層中心皆葬舍利不啻萬顆上層以石為室南面立碑載二聖所製三藏聖教序記乃尚書右僕射河南公褚遂良筆也永徽五年特旨度沙彌窺基為大僧顯慶元年敕天下僧尼有犯國法者以僧律治之不得與民同科三年六月十二日帝創西明寺成十三日帝出繡像長幡送寺安奉七月詔迎玄奘法師入居西明寺四年帝以玉華宮為寺追崇先帝詔奘法師居之麟德元年二月奘法師卒帝哭之慟輟朝三日顧左右曰朕失國寶矣可謂痛心敕準如來故事斂以金棺銀槨塔於滻水之東原敕搜聚天下化胡經焚棄不在道經之數時洛京恆道觀柏彥道士等奉表乞留詔曰三聖重光玄元統敘豈忘老教偏意釋宗朕志欲還淳情存去僞理乖事舛者雖在親而亦除義符名當者雖有冤而必録自今道經有記及化胡事者並宜削除有司條為罪制化胡經一百卷晉道士王浮僞造則天武后聞于闐國有梵本華嚴大經即遣使奉玉帛往求之并請彼國善梵學者一人隨經以來于闐國主以實叉難提此云學喜妙華嚴宗旨遣赴命則天見之大悅詔入大遍空寺同三藏菩提流志法師神測玄景復禮等大德翻譯則天幸寺嚫施供饌至聖曆二年十月八日功畢成八十卷天冊元年詔沙彌法藏於太原寺開示華嚴宗旨方緒經題感白光昱然自口而出須臾成蓋停空久之萬衆歡呼歎異則天命京城十大德為藏授具戒賜號賢首音釋嚭音痞迦葉佛梵語迦葉此云飲光亦名大龜氏姓也今此娑婆界名為賢劫有一千佛出世今此住劫有二十箇小劫初從人壽八萬四千歲過一百年減一歲減至人壽十歲復過一百年增一歲增至人壽八萬四千歲此一減增名一小劫共計一千六百八十萬年謂經十六萬八千箇一百年前八箇小劫無佛出世今當第九小劫減至人壽六萬歲時拘留孫佛出世減至人壽四萬歲時拘那含佛出世減至人壽二萬歲時迦葉佛出世減至人壽百歲釋迦如來出世如來滅度已三千餘年今當人壽六七十歲間減至人壽十歲復增至人壽八萬四千歲又減至人壽八萬歲時彌勒佛出世此是第十減劫也從第十一十二十三十四小劫皆無佛出世至第十五小劫有九百九十四佛相繼出世第十六十七十八十九小劫皆無佛出世至第二十小劫人壽增至八萬四千歲住劫滿時有樓至佛出世佛說法度衆生畢便入涅槃即壞劫時至矣言壞劫者初火災二水災三風災則山河大地乃至三十三天初禪二禪三禪天皆成空虛也如是二十小劫名為一中劫共計三萬三千六百萬年成住壞空四箇二十小劫即是八十箇小劫共計一十三萬四千四百萬年名為一大劫也是為天地成壞始終之極數周而復始運運無窮焉釋迦此云能仁姓也牟尼此云寂默號也嵐毗尼園或作藍彌尼梵語也華言解脫處婕妤上音接下音于婕妤女官亦美稱浮圖或言佛陀聲相近也華言淨覺然佛塔名塔波亦名浮圖華言聚相謂如來萬德所聚之相也隨文顯義乃能別之尸毗王釋迦如來過去劫為大國王名尸毗視一切衆生如母愛子勤修六度時天帝欲試之命毗首天變身作鴿帝自變身作鷹逐鴿鴿入王腋底時鷹語王言當還我鴿王曰我初發心一切衆生我皆度之鷹言王欲度一切衆生我非一切耶而奪我食王曰汝須何食鷹言我須新熱肉王念言自非殺生無由得也云何殺一生與一生自思惟已呼人持刀王自割股肉與鷹鷹言王與我肉輕重須輿鴿等王令人持稱以肉對鴿王割肉盡始與鴿等時天地震動大海波揚天散香花時鷹語王言割肉辛苦心不惱耶王言我心歡喜鷹言誰當信汝王誓曰我割肉施以求成佛心不嗔惱者願令我身即當半復時身半復如本天帝復讚歎禮足而去慈力王過去世時釋迦如來曾為轉輪聖王發菩提心為衆生故求聞佛法將有一梵志言若王身上剜作千瘡灌滿膏油然燈供養我為解說佛法王即命劊子持刀剜滿千瘡然燈供養梵志即說半偈目夫生趣死寂滅為樂王命諸天書偈傳奄聞者見者悉發道心云云薩埵王子過去釋迦如來為王太子名摩訶薩埵遊觀山林過竹林見一虎新生七子圍繞飢餓身體羸弱命將欲絶太子心念我今當捨此不淨之身以求無上菩提成妙法身即自放身臥餓虎前虎無力不能食自以乾竹刺頸出血從崖投下虎前大地震動天雨雜花妙香讚歎虎即舐血食肉唯餘骨在耳月光王亦名大光明住波羅奈國心慈一切不逆人意常行布施有一小國王心生疾妒令一婆羅門從月光王乞頭王自思惟我從無始來未曾為法空受生死勞我精神今以此身欲求菩提訾及衆生王即合掌向十方諸佛菩薩作禮白言願以威神助我令得成辦此事王即自以髮繫樹婆羅門持刀尋斷王頭持還本國天地大動日無精光云云爾時王者即釋迦如來也今人病梁武奉佛失國比上四王萬萬不及一也縑紈上音兼并絲絹也下音完又音玄素綺也與哲同桴音孚擊鼓杖也𮗯音姑鄉飲之爵耒力遂切音磊去聲耕田曲木也佚音逸蕩也嚮音向往時也又不久也樽俎上音尊酒器下音阻祭器四塵人身地水火風而成也五陰人身之色受想行識也六舟施戒忍進定慧之六波羅蜜亦云六度以此自度度他也三駕謂羊鹿牛三車喻聲聞乘緣覺乘佛乘也分段解脫生死有二一分段二變易分段者謂三界內衆生隨其作業所感果報身之形段則有長短命之分限則有延促是名分段也變易者謂聲聞緣覺菩薩雖離世間分段生死而有方便等土變易如初位為因後位為果又後位為因後後位為果以其因移果易故名變易也若照見五蘊中人我空故滅煩惱障即得分段解脫若照見五蘊自性空故即得變易解脫三點𠁼天竺伊字即大涅槃具法身般若解脫三德祕藏也七覺亦名七覺支亦名七菩提分支即分也一擇法覺二精進覺三喜覺四除覺五捨覺六定覺七念覺此七謂覺了所修之法是真是僞各有支派分齊不相雜亂也四勤即四正勤正則不邪勤則不怠一已生惡令永斷除二未生惡令不生三已生善令增長四未生善令得生泫音鉉泫然流涕瑒音羊玉名五道天人阿修羅鬼畜地獄今以修羅攝天鬼畜故云五黃能下音耐三足鱉禹父鯀為黃能訹音戌訹誘也菴摩俱云菴摩勒亦云菴沒羅即係其子食之除風冷人時手執此果昔佛說法於此閏中滻音鏟水名在京兆頨音羽頭妍也茶毗亦云闍維此云焚燒太宗自製疏文曰皇帝菩薩邢弟子某稽首和南十方請佛菩薩聖僧天龍大衆若夫至理凝寂道絶名言大慈方便臨機攝誘濟苦海以智舟朗重昏以慧日開曉度脫不可思議弟子夙罹愆亹早嬰偏罰追惟撫育之恩每念慈顏之遠泣血崩心永無逮及號天躄地何所厝身歲月不居炎涼亟改茶毒之痛在乎粉骨敬養已絶方恨不追冤酷之深百身何贖惟以丹誠歸依三寶謹於弘福道場奉施齊供并施淨財以充檀捨用斯功德奉為先靈願心悟無為神遷妙喜策紺馬以入香城躡金階而升寶殿遊玩法樂逍遙淨土永蔭法雲嘗餐甘露疾證菩提早登正覺六道四生並同斯願六齊日此以上半月下半月各三日言之上半月初八十四十五下半月二十三二十九三十上半月名白月故月漸白漸圓下半月名黑月故月漸缺漸黑十六日是下半月一日二十三日是下半月八日二十九三十日是下半月十四十五日而天上日月以半月十月為限海潮亦以半月消盈也此之六日天帝典主四天王各鎮一方常以月八日二十三日遣使者下按行人間考察善惡十四二十九日遣太子下十五日三十日四王自下特日月五星二十八宿諸天俱下四王命曰勤察衆生施行吉凶其有敬信三寶守齊持戒布施誦經修諸功德忠孝君親俱上奏天帝帝敕司命增福益壽遣神營護命終迎其神魂上天住七寶宮無願不從天上壽終下生王侯之家乃至成無上道若有殺盜邪淫妄言惡口瞋癡嫉妒不行忠孝誇佛法僧不信善惡果報四天王上奏天帝使司命滅尊惡還來侵生罹災禍死墮地獄餓鬼畜生罪畢為人生下賤家是故應當齊日責心慎身口意改往修來然佛法中日無好惡佛隨世惡日因緣故教衆生齊戒以除殃患原此六日教令受持八戒日過中不食為齊齊戒合稱故名八關齊戒非同世俗朔望不食葷名為齊也縱不能六日持齊戒而依六日不茹葷亦勝朔望千萬倍以朔望無所出處上半月素二日下半月一日皆無是知世之朔望齊無事無理非正教也法弟子陳啓執捐資敬梓解惑編一卷以此功德四恩總報三有齊資願與閲者發菩提心福智圓明早成正覺康熙癸亥仲春吉旦識
