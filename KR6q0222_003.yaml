body:
  text: 廣州南海寶象林沙門弘贊在犙編中宗舊唐史并傳燈統紀神龍二年降御札召六祖入京問法遣內侍薛簡持詔迎請祖表辭以疾簡回奏復遣使賜袈裟瓶鉢以諭主上向慕之意詔義淨三藏法師於內道場譯孔雀諸經御製聖教序以冠經首敕造聖善寺八月詔天下試行童經義通者度為僧試經度僧此始景龍二年敕崔思亮往泗洲迎僧伽大師至京帝及百僚皆稱弟子睿宗問萬回禪師曰僧伽何人答曰觀音化身普度僧尼萬數景龍三年帝召道岸律師入宮為妃主受歸戒圖形林光宮御製贊曰戒珠皎潔慧流清淨身局靈篇心融入定學妙真宗觀通實性維持法務綱紀德政律藏冀其傳芳像教因而光盛萬回生號州閔鄉張氏咸亨四年帝度為沙門回幼時致見書六千里外朝往暮回因號萬回玄宗舊唐史開元元年敕以寢殿材建彌勒佛殿帝問神光法師曰佛於衆生有何恩德致捨君親棄妻子而師事之神光曰佛於衆生恩過天地明逾日月德重父母義過君臣帝曰天地日月具造化之功父母君臣具生成之德何以言佛並過此乎神光曰天只能蓋不能載地只能載不能蓋日則照晝不照夜月則夜朗而晝昏父只能生不能養母只能養不能生君有道則臣忠君無道則臣佞以此而推德則不全且佛於衆生德則不爾論蓋則四生普覆論載則六道俱承論明則照耀十方論朗則光輝三有論慈則提拔苦海論悲則度脫幽冥論聖則衆聖中王論神則六通自在所以存亡普救貴賤皆攜惟願陛下留心敬仰帝悅曰佛恩如此非師莫宣朕當生生敬仰十九年御注金剛經頒行天下天寶六年詔不空法師入內立壇為帝灌輪王頂賜號智藏法師帝自持寶箱奉紫袈裟七年大將軍高力士於西京建寶壽寺成鑄洪鐘辦齊以慶之舉朝畢集約以擊鐘一杵施錢百緡有樂施者至二十杵十二年西番寇圍涼州帝命三藏不空祈陰兵救之空誦仁王密語數遍有神介胄而至帝親見之問曰此何神也空曰北方毗沙門天王長子也空誦密語遣之數日涼州捷報二月十一日城東北雲霧間有神兵至威武雄盛城北門樓有光明空中鼓角聲震天地西番賊畏懼卷甲而去帝悅因敕天下城樓皆立毗沙門天王祠梵語毗沙門此云多聞長子即那吒太子也今道士以太子帶骷髏立真武側罪大彌天真武乃北方一神耳睿宗景雲二年詔起一行禪師赴闕辭疾不行開元三年八月帝遣禮部齎詔詣當陽山起之至京帝曰師有何能對曰略能記覽帝命中官取宮籍示之師周覽方畢覆其本記唱數幅帝不覺降榻稽首曰師實聖人也嗟歎久之帝以麟德曆不驗詔師改撰新曆師推大衍數立術以應之曰開元大衍曆五十二卷編入唐書曆律志十一年師復製水運渾天黃道儀成古未有也帝悅親為製銘安武成殿以示百官肅宗玄宗第三子舊唐史并稽古略乾元元年大赦帝於禁中立內道場講誦贊唄詔五嶽各建寺聽白衣能誦經五百紙者度為僧乾元二年詔天下諸州各置放生池敕刺史顏真卿撰天下放生池碑銘詔不空法師入內建道場為帝受轉輪王位七寶灌頂代宗舊唐史并稽古略論衡永泰元年詔天下有司毋得捶辱僧尼九月鑄金銅佛像於光順門率百僚拜祀之十月吐蕃寇逼京師內出仁王經輦送西明諸寺置百尺高座講之寇平詔不空三藏法師重譯舊本仁王護國經帝親為之序時寇難屢逼祿山思明毒流方煽禁中講誦仁王經寇未及戰輒去非人事也大曆元年七月作盂蘭盆會於禁中設高祖太宗以下七聖位祈薦冥福歲以為常三年詔空為近侍大臣及諸鎮將帥悉授灌頂六年空進所譯經凡一百二十卷七十七部食邑三千戶固辭不已九年空曰白月圓滿吾當逝矣上表辭帝帝輟朝三日賜絹布雜物錢四十萬造塔道士史華以術得幸因請立刀梯與沙門角法時沙門崇慧表請挫之帝率百僚臨觀華履刀而上招慧登之慧躡而升往復無傷乃命以薪烈火聚於庭慧入以呼華華慚汗不敢正視帝大悅賜慧號護國三藏帝一日召國師惠忠入內引太白山人見之帝曰此人頗有見解請師驗之師曰汝蘊何能山人曰忝識山識地識字善算師曰山人所居之山是雄山是雌山山人茫然不能對師曰識地麼山曰識師指殿上地問曰此是何地山曰容弟子算方知師曰識字麼山曰識師於地上畫一畫曰此甚麼字山曰是一字師曰土上一畫是王字何謂一字耶又問能算麼山曰能師曰三七是多少山曰國師玩弟子三七豈非二十一師曰卻是山人弄貧道三七是十何謂二十一復問更有何能山人答曰弟子縱有亦不敢向國師開口師曰縱汝有能亦俱未是師卻謂帝曰問山不識山問地不識地問字不識字問算不解算陛下何處得此懵漢來帝謂山人曰朕有國位不足為寶禪師乃國寶也山人曰陛下真識寶者矣帝嘗與國師在便殿指天下觀軍容使魚朝恩謂師曰朝恩亦解些子佛法朝恩即問師曰何者是無明無明從何起師曰佛法衰相今現帝曰何也師曰奴也解問佛法豈非衰相今現朝恩色大怒師曰即此是無明無明從此起朝恩復抗聲曰有人言師今是佛得否師曰朝廷有人言汝是天子果否朝恩伏地曰死罪死罪朝恩實非天子師曰我不是佛所以二尊不並化朝恩曰師長作凡夫無成佛時耶師曰我向後必當作佛汝姓什麼朝恩曰姓魚師曰我向後作佛不名惠忠汝向後若作天子改卻姓莫不姓魚否朝恩伏地曰死罪死罪朝恩此去實不敢向師論佛法師謂帝曰幾怕殺此奴出傳燈并通載德宗代宗長子舊唐史并清涼本傳貞元二年詔律師道澄入宮為妃嬪內侍授皈戒賜號大圓律師四年詔迎鳳翔法雲寺佛指骨入禁中供養傳至諸寺瞻禮十五年四月帝誕節敕有司備儀輦迎教授澄觀國師入內殿闡揚華嚴宗旨觀升高座曰大哉真界萬法資始包空有而絶相入言詞而無跡妙有不有真空不空我佛得之妙踐真覺廓淨塵習寂寥于萬化之城動用於一空之中融身剎以相含流聲光而遐燭我皇得之靈鑒虛極保合太和聖文掩於百王淳風扇於萬國敷玄化以覺夢垂天真以怡情是知華嚴教旨寂廓沖邃不可得而思議矣失其旨也徒修因于曠劫得其門也等諸佛子一朝帝顧謂群臣曰朕之師言雅而簡辭典而富能以聖法清涼朕心仍以清涼賜為國師之號朕思從來執身心我人及諸法定相斯為顛倒群臣再拜稽首頂奉明命由是中外台輔重臣咸以八戒師禮之開成三年三月師入寂壽一百二歲帝輟朝三日奉金身塔終南山未幾有梵僧至闕表稱於蔥嶺見二使者凌虛而過問之答曰北天竺文殊堂神也往東取華嚴菩薩大牙歸國供養有旨啓塔果失一牙茶毗舌根不壞如紅蓮色舍利光明瑩潤無數憲宗出韓子外傳元和十四年正月帝遣中使杜英奇持香花往鳳翔府法雲寺護國真身塔所請釋迦文佛指骨入內帝御安福門迎拜留禁中供養三日五色光現百僚稱賀乃送諸寺王公士庶奔走膜拜具釋部威儀及太常長安萬年音樂旌幡鼓吹偉盛殊特刑部侍郎韓愈上表陳諫引古言今稱帝壽國祚之不延永帝大怒持以示宰相將抵以死裴度崔群曰愈言訐牾罪之誠宜然非內懷至忠安能及此願少寬假以來諫諍帝曰愈言我奉佛太過猶可容至謂東漢奉佛已後天子咸夭促言何乖剌耶愈人臣狂妄敢爾於是戚里諸王舊臣皆為愈哀請遂貶潮州刺史既至潮聞大顛禪師之名致書請入郡問道書曰愈啓孟夏漸熱惟道體安和愈弊劣無謂坐事貶官到此久聞道德竊思見顏緣昨到來未獲參謁已帖縣令具人船奉迎日久佇瞻愈白又書曰愈啓海上窮處無與話言側承道高思獲披接專輒有此咨屈此旬晴明不甚熱倘能乘閒一訪實謂幸也不宣又書曰愈啓慧勻至辱答問珍悚無已所示廣大深迥非造次可量傳曰書不盡言言不盡意然則聖人之意其終不可得而見耶如此而論讀來一百遍不如親面對之又曰道無凝滯行無繫縛苟非所戀著則山林閒寂與城隍無異大顛師論甚宏博而必守山林不至州郭自激修行立空曠無纍之地者非通道也勞于一來安於所識道故如是不宣於是大顛至郡留師旬日或入定數日方起愈甚敬焉師辭去不久愈祀神海上乃登靈山造師之廬問曰弟子軍州事繁省要處乞師一句師良久不顧愈罔措時三平為侍者乃敲床一下師曰作麼平云先以定動後以智拔愈乃拜三平而謝曰和尚門風高峻愈於侍者處得箇入路師問愈曰子之貌鬱然似有不懌何也對曰愈之用於朝享祿厚矣一旦以忠言不用奪刑部侍郎竄逐八千里播越嶺海喪吾女孥及至潮陽颶風鱷魚患禍不測毒霧瘴氣日夕發作愈少多病髮白齒豁黜於無人之地其生詎可保乎愈之來也道出廣陵廟而禱之幸蒙其力而卒以無恙以主上有中興之功已奏章道之使東巡泰山奏功皇天倘有意於此則庶幾召愈述作功德而薦之郊廟焉愈早夜待之而未至冀萬一於速歸愈安能有懌乎顛曰子直言於朝也忠於君而不顧其身耶抑尚顧其身強言之以徇名耶且子生死禍福不懸之天乎子姑自修而外任命可也彼廣陵其能福汝耶主上今繼天寶之後姦臣負國而討之不暇糧餽雲合殺人盈野僅能克乎而瘡痍未瘳方此之際而子又欲封禪告功以騷動天下而屬意在乎己之欲歸子奚忍於是耶且夫以窮自亂而祭其鬼是不知命也動天下而不顧以便己是不知仁也強言以干忠遇困而抑鬱是不知義也以亂為治而告皇天是不知禮也而子何以為之且子遭黜也其所言者何事乎愈曰主上迎佛骨入大內愈以佛者夷狄之一法耳三代無佛而年祚永久晉宋梁魏事佛不夭且亂恐主上惑於此是以不顧其身而斥之顛曰若是則子謬矣佛也者蔭天人之大器其道則妙萬物而為言其言盡性命之理其教則捨惡而趨善去僞而歸真其視天下猶父之於子也而子毀之是猶子而刃父也吾聞善觀人者觀其道之所存而不較其所居之地桀紂之君跖蹻之徒皆中國人也然不可法者以其無道也舜生東夷文王生西夷由余生于戎季札出於蠻彼二聖二賢豈可謂之夷狄而不法乎今子不觀佛之道而徒以為夷狄何言之陋也以五帝三王之代未有佛而長壽則外丙二年仲壬四年何其夭耶以事佛之人主夭且亂則漢明為一代之英主梁武壽至八十六豈必皆夭且亂耶且子嘗誦佛書疑其與先王異者可道之乎愈曰何暇讀彼之書顛曰子未嘗讀彼之書安知不談先王之法言耶佛與人臣言必依於忠與人子言必依於孝及其言之至無方者也無體者也妙之又妙者也今子自恃通四海異方之學而文章磅礡孰如姚秦之羅什乎子之知來藏往孰如晉之佛圖澄乎子之盡萬物不動其心孰如梁之寶志乎愈默然良久曰不如也顛曰子之才既不如彼矣彼之所從事者而子反以為非然則豈有高才而不知子之所知者耶今子屑屑於形器之內奔走乎聲色利欲之間少不如志則憤鬱悲躁若將不容其生何以異於蚊虻爭穢壤淤稿之間哉於是愈瞪目而不收氣喪而不揚反求其所答忙然有若自失逡巡謂顛曰師之言盡於此乎顛曰吾之所以告子者蓋就子之所能而為之言非至乎至者也曰愈也不肖欲幸聞其至者可乎顛曰誠爾心寧爾神盡爾性窮物之理極天之命然後可聞也爾去吾不復言矣愈趣而出秋八月己未帝與宰臣語次久之因語及愈有可憐者而皇甫鋪素薄愈為人即奏曰愈終疏狂可且內移帝納之遂授袁州刺史愈復造顛廬送衣二襲請別曰愈也將去師矣幸聞一言顛曰吾聞易信人者必其守易改易譽人者必其謗易發子聞吾言而易信之矣庸知復聞他說不復以我為非哉遂不告愈知其不可聞乃去至袁州尚書孟簡知愈與大顛游以書抵愈喜其改迷信向愈答書稱大顛頗聰明識道理實能外形骸以理自勝不為事物侵亂因與之往還也近世黃山谷謂愈見大顛之後文章理勝而排佛之詞亦少沮云詳見稽古略并通載念常曰舊史稱退之性愎訐當時達官皆薄其為人及與李紳同列紳恥居其下數上疏訟其短今新史則以退之排佛老之功比孟子嘉祐中有西蜀龍先生者忿其言太過遂擇退之言行悖戾先儒者條攻之一曰老氏不可毀二曰愈讀墨子反孟玷孔若此類二十篇行于世及觀外傳見大顛之說凡退之平生蹈僞于此疏脫盡矣歐陽文忠公嘗歎曰雖退之復生不能自解免得不謂天下至言哉而荊國王文公亦曰人有樂孟子拒楊墨也而以排佛老為己功嗚呼莊子所謂夏蟲者其斯人之謂乎道歲也聖人時也執一時而疑歲者終不聞道夫春起於冬而以冬為終終天下之道術者其釋氏乎不至於是者皆所謂夏蟲也文公蓋宋朝巨儒其論退之如此則外傳之說可不信夫穆宗諱恆憲宗第三子舊唐史長慶元年三月盧龍節度使劉總舉幽燕二十餘郡歸朝乞為僧詔賜僧衣號大覺大師署所居第為報恩寺長慶二年三月帝遣左街僧録靈阜齎詔起汾州無業禪師赴闕阜至宣詔畢稽首曰主上此度恩旨不同願師起赴師笑曰貧道何德纍煩人主汝可先行吾從別往遂沐浴敷座告門人慧愔等曰汝等見聞覺知之性與太虛同壽一切境界本自空寂迷者不了即被境惑一為境惑流轉不窮常了一切空無一法當情是諸佛用心處言訖端坐至中夜而逝阜回奏其事帝欽歎久之賜諡大達國師師蒙憲宗兩朝敬重凡三詔不赴師嗣馬祖一禪師宣宗諱忱憲宗第十三子舊唐史大中五年正月詔弘辨禪師入內帝曰禪師既會祖意還禮佛看經否對曰沙門禮佛誦經蓋是住持常法有四種焉依佛戒修身參尋知識漸修梵行履踐如來所行之跡帝曰何為頓見何為漸修對曰頓明自性與佛無二然有無始染習故假漸修對治令順性起用如人喫飯非一口便飽云云是日便對漏下七刻帝悅賜號圓智禪師繼有詔旨增修天下祖塔應未經賜諡者所在以聞太常考行頒賜師嗣馬祖懿宗出舊唐史等咸通十二年賜知玄法師沉檀寶座高二丈餘十四年造綵幡花蓋敕往鳳翔寺塔迎佛指骨四月八日至京帝御安福門迎拜入內瞻禮群臣有諫者言憲宗迎佛骨尋即晏駕帝曰朕生得之死無所恨帝每於禁中設講席自唱經旨手録梵文而為贊唄憲宗時北方天帝降夢令中興佛法帝不承命愛服金丹致藥性燥急內豎畏誅而深宮祕邃故有不測之禍也唐史贊曰甚矣至治之君不世出也禹有天下傳十有六王而少康有中興之業湯有天下傳二十八王而其甚盛者號稱三宗武王有天下傳三十六王而成康之治與宣之功其餘無所稱焉雖詩書所載有時闕略然三代千有七百餘年傳七十餘君其卓然著見于後世者此六七君而已嗚呼可謂難得也唐有天下傳世二十其可稱者三君玄宗憲宗皆不克其終盛哉太宗之烈也其除隋之亂比跡湯武致治之美庶幾成康自古功德兼隆由漢以來未之有也至其牽於多愛復立浮圖好大喜功勤兵於遠此中材庸主之所常為然春秋之法常責備於賢者是以後世君子之欲成人之美者莫不歎息於斯焉念常曰君子謂立言之難其實非難特為好惡所欺耳如歐陽文忠公作太宗本紀贊雖筆高語奇傑出諸史至貶太宗復立浮圖好大喜功勤兵於遠類中材庸主所為而不取豫謂文忠責備之深而為好惡所欺也方貞觀之世天下昆蟲草木咸被其澤至於日月霜露所至之國皆款關而修職直獨高麗莫離支叛逆阻命太宗身任千載道德英雄之主其肯坐視之留為子孫憂而不少假經略乎蓋其威德之盛其勢之必然非好大喜功之謂也昔黃帝平蚩尤七十戰而勝其亂高宗伐鬼方三年而後克太宗舉偏師而陰山平臨駐蹕而高麗服然黃帝高宗經孔子而未嘗少貶文忠特以為太宗之疵庸詎非責備之過歟以太宗盛德大業如此猶曲貶之將恐後之君子懷免貶之難而無意於功名也文忠徒欲高尚其事而不知此亦自蹈好大之失矣至於復立浮圖乃所以和順道德而齊天地鬼神之心以開濟天下後世之人為無窮之益也文忠以為不當則是太宗暗於取舍矣使太宗果暗於此則當時房杜王魏之流亦因循尸祿而暗於取舍者哉或曰文忠慕韓愈為人故不得不爾嗚呼文忠何忍哉慕人毀佛而兼棄太宗之道德是不為好惡所欺耶孔子立名教者也老氏則非毀之及孔子刪禮則曰吾聞諸老聃云然孔子亦以人而廢言乎亦若世情之好惡耶況真佛也者耶聖凡本有之體毀之乃所以自毀之也詎傷於真佛哉嘗聞文忠一夕夢為勇士數輩攝至太宗之庭太宗怒而責曰吾文武勳烈如此不能逃子之貶何也文忠震懼而寤後欲追改之而業已進書頒行矣遂不克改嘗慨然曰平懷最難此殆非偶然而云耳出通載空谷曰孔子作春秋太史公作史記班固作西漢書范曄作東漢書陳壽作三國志唐太宗作晉書李延壽作南北史魏徵作隋書劉昫作唐書司馬溫少微江公皆作通鑑鄭夾漈作通志馬端臨作文獻通考揭傒斯作宋史李燾作宋鑑曾子野作史略宋景濂作元史皆以天地之心為心是曰是非曰非不存私意諸君史筆如秉龍泉太阿殺人活人無偏無黨佛法大道也可尚不可排苟或可排則太宗諸子已排之矣奚待後世擅其己意者曲排之也內德論典儀李師政撰若夫十力調御運法舟於苦海三乘汲引坦夷途於火宅勸善進德之廣七經所不逮戒惡防患之深九流莫之比但窮神知化其言宏大而可驚去惑絶塵厥軌清邈而難蹈華夷士庶朝野文儒各附所安鮮味斯道自非研精以考真妄沈思而察苦空無以立匪石之信根去若網之疑蓋遠則淨名妙德弘道勝而服勤近則天親龍樹悟理真而敦悅羅什道安之篤學究玄宗而益敬僧睿慧遠之歸信迄皓首而彌堅邁士安之淫書甚宣尼之玩易千金未足驚其視八音不能改其聽聞之博而樂愈深思之深而信彌篤皆欲罷而不能則其非妄也必矣哉我皇誕膺天命弘濟區宇覆等蒼旻載均厚地掃氛祲清八表救塗炭寧兆民五教敬敷九功惟敘總萬古之徽猷改百王之餘弊搜羅庶善崇三寶以津梁芟夷群惡屏四部之稊莠遵付囑之遺旨弘紹隆之要術功德崇高昊天罔喻但縉紳之士祖述多途各師所學異論蜂起或謂三王無佛而年永二石有僧而政虐損化由於奉佛益國在於廢僧苟明偏見未申通理博考興亡足證浮僞何則亡秦者胡亥時無佛而土崩興佛者漢明世有僧而國治周除佛寺而天元之祚未永隋弘釋教而開皇之令無虐盛衰由布政治亂在庶官歸咎佛僧實非通論且佛唯弘善不長惡於臣民戒本防非何損害于家國若人人守善家家奉戒則刑罰何得而廣禍亂無由而作騏驥雖駿不乘無以致遠藥石徒豐未餌焉能愈疾項籍喪師非范增之無算石氏興虐豈浮圖之不仁但為違之而暴亂未有遵之而凶虐由此觀之亦足明矣復有謂正覺為妖神比淨施於淫祀訾而謗之無所不至聖朝勸善立伽藍以崇福迷民起謗反功德以為疣此深訕上非徒毀佛愚竊撫心而太息所以發憤而含毫者也忝賴皇恩預霑法雨切磋所惑積稔於茲信隨聞起疑因解滅昔嘗苟訾而不信今則篤信而無毀近推諸己廣以量人凡百輕毀而弗欽皆為討論之未究若令探賾索隱功齊於澄什必皆深信篤敬志均於名僧矣師政學匪鉤深識不臻妙少有所聞微去其惑謹課庸短著論三篇辨惑第一明邪正之通蔽通命第二辨殃慶之倚伏空有第三破斷常之執見核之以群言考之以衆善上顯聖朝之淨福下折淫祀之虛誹徒有斯意實乏其才屬詞鄙陋援證庸淺雖竭愚勤何宣聖德庶同病而未愈者聞淺譬而深悟也如藩籬之卉或蠲疾於腹心藜藿之餐儻救餧于溝壑若金丹在目玉饌盈案顧瞻菲薄良足陋矣三篇詳出廣弘明集虞世南出法帖并舊唐史南字伯施光祿大夫貞觀八年自立疏曰弟子早年忽遇重患當時運心差愈之日奉設千僧齊今謹於道場供千僧蔬食以其願力希生生世世常無病惱七世久遠六道冤親並同今願云云其撰帝王紀略論曰老子之義谷神不死玄牝長存久視長生乘雲駕鶴此域中之教也釋氏之教空有不滯人我兼忘超出生死此象外之談者也有問梁武帝熏修危亡世南曰釋教出世之津梁絶塵之軌躅運於方寸之內超於有無之表塵纍既盡攀緣已息然後入於解脫之門蓋以所修為因其報為果人有修布施持戒忍辱精進禪定智慧六行皆多不全有一缺焉果亦隨滅是以鬷明醜於貌而慧於心趙一高于才而下於位羅褒富而不義原憲貧而有道其不同也如斯懸絶興喪得失咸必由之下士庸夫見比干之剖心以謂忠貞不可為聞偃王之亡國以謂仁義不足法也若然者盜跖高枕於東陵莊蹻懸車於西蜀考終厥命良足貴乎後世南卒太宗夢見之因詔曰世南德行純備志存忠益奄從物化良用悲傷昨因夜夢倏睹斯人兼進讜言有若平生之舊可即其家造五百僧齊佛像一軀以資冥福以申朕思舊之意鑑史只載太宗夢世南而為彼資冥福竟不録又凡王臣敬佛法語皆削去之惟載傅奕請除佛法之疏豈當時諸大名儒之言論不如一傅奕術官耶作史者不但毀佛而且瞞心不志至於若是乎又云太宗本不信佛惟順穆太后之心而已然太宗凡所交兵之處並建寺剎樹立福田為義士凶徒資其魂魄有六七所其破晉州立慈雲寺命褚遂良撰碑破汾州立弘濟寺命李百藥撰碑破鄭州立等慈寺命顏師古撰碑破呂州立普濟寺命許敬宗撰碑破洛州立昭覺寺命朱子奢撰碑破洛州廣平府立昭福寺命岑文本撰碑其餘布滿天下烏能掩人耳目而謂順太后心可乎盡信書不如無書此之謂歟吳道子名畫記并統紀道子陽翟人初名道子玄宗改名道玄工畫下筆有神玄宗召入內供奉於景公寺畫地獄變相圖都人咸觀皆懼罪修善兩市屠沽不售張仲素舊唐史素為翰林學士憲宗敕素撰佛骨碑略曰岐陽法雲寺鳴鸑阜有阿育王所造之塔藏佛指節太宗特建寺宇加之重塔高宗遷之洛邑天后薦以寶函中宗記之國史肅宗奉之內殿德宗禮之法宮據本傳必三十年一開則玉燭調金鏡朗氛祲滅稼穡豐魯山令舊唐史元德秀字紫芝河南人少孤事母孝舉進士諡文行先生不忍去母左右自負母入京母亡廬墓側刺血寫佛經數千言絶筆感異香芬馥彌日而息食不鹽酪藉無茵席不肯婚人以為不可絶嗣答曰兄有子先人得祀吾何娶為初兄子襁褓喪親無資得乳媼德秀自乳之數日涌流能食乃止家貧擢為魯山令歲滿笥餘一縑駕柴車還愛陸渾佳山水家無僕妾歲饑或日一爨鼓琴以自娛及卒家唯枕履簞瓢而已弟元結哭之或曰子哭過禮歟結曰大夫生六十年未嘗識女色未嘗有十畝之地十尺之舍十歲之僮未嘗完布帛而衣具五味而餐吾哀之以誡荒淫貪佞綺紈梁肉之徒耳念常曰凡諸史雜傳俱未有卓行篇唐史特設此題載元魯山數人而已觀魯山行己之操唐史數千人中遂嶄然傑出顧不美哉舊史稱其居母喪刺血寫佛經數千言絶筆感異香芬馥彌日而息而新史削之夫魯山居喪所為出乎至誠宋景文何嫌而削之若謂惡求福於佛佛固未嘗邀魯山魯山自為之而不疑何佛之嫌若以身體髮膚受之父母不應毀則乳亦婦人之事非男子有也魯山尚能出乳以食兄之子獨不當以血為母寫經何也景文深存名教然君子百行殊途同歸奚必靳靳然以儒釋歉哉出通載孟簡答韓書附見韓文公集簡字幾道元和中為尚書素好佛韓愈與書有云積善積惡殃慶自以類至何有去聖人之道從夷狄之教云云簡答書云來云言積善積惡殃慶自以類至若是則釋氏辨之精詳盡欲人積善耳故迦文為大士言六度為中根言十二因緣為小根言四聖諦又云依法不依人假如飛廉惡來之所為者皆亡國滅身之道故雖華夏其可從乎夏禹文王之所作皆萬世受賜故雖戎狄其可斥乎閣下徒以夷狄之說辱聖賢之身聖賢之身必能忍辱聖賢之法其可辱乎深所不取也但閣下不奉即已區區毀黷豈積善之云乎彼楊墨老氏之書其所述作於理偏虛非中道要切釋氏之教則不然大明積惡之根源核天下神道報應之微細皎然言善惡之異路為廣其道奈何韓君以愚人下俚翁嫗之情見待之耶然其法行於世使人人自畏惡修善豈不大助教化之防歟柳宗元全文載柳集宗元字子厚河東人少精敏絶倫為文章卓偉精緻第進士博學宏辭科貞元中拜監察御史送濬上人歸省序略曰大覺氏之道本於孝敬而後積以衆德歸於空無其教曰禪曰法曰律上人專於律行恆久彌固其儀型後學者歟誨於生靈觸類蒙福其積衆德者歟覲於高堂視遠如邇其本孝敬者歟撰南嶽大明律師碑略曰儒以禮立仁義無之則壞佛以律持定慧去之則喪是故離禮於仁義者不可與言儒異律於定慧者不可與言佛送浩初上人序略曰儒者韓退之病豫嗜浮圖言訾豫與浮圖遊且曰見送元生序不斥浮圖浮圖誠有不可斥者往往與儒教合不與孔子異道退之好儒未能過楊子楊子之書於莊墨申韓皆有取焉浮圖者反不及莊墨申韓之怪僻險賊耶吾之所取者與儒教合雖聖人復生不可得而斥也退之所斥者其跡也又曰其教人始以性善終以性善不假耘鋤本其靜矣李翱傳燈并本集翱字習之後魏尚書左僕射沖十世孫中進士第元和初為國子博士史館修撰嘗為朗州刺史仰慕藥山惟儼禪師道風屢請不赴乃特入山致敬藥山端然看經殊不顧視翱乃云見面不如聞名拂袖便行藥山卻召翱翱回首山曰何得貴耳賤目遂頂拜起問如何是道藥山以手指天復指淨瓶翱曰不會山云雲在青天水在瓶翱拜謝乃呈偈云鍊得身形似鶴形千株松下兩函經我來問道無餘事雲在青天水在瓶一夕師登山忽雲開見月大笑一聲聲落澧陽八九十里翱聞之復寄偈曰選得幽居愜野情終年無送亦無迎有時直上孤峰頂月下披雲嘯一聲翱嘗著復性三篇其一謂情昏則性匿忘情則復性其二謂無思則寂照其三謂昏而不思終不明道庾承宣于頔舊唐史登貞元八年第與韓愈歐陽詹等同榜號龍虎榜嘗撰福州淨光塔銘其序略曰觀察使柳公監軍使魚公相與言曰報君莫大於崇福崇福莫大於樹善樹善莫大於佛教教之本其在浮圖歟夫浮圖者上參諸天下鎮三界影之所蔭如日月之照破昏為明鈴之所響如金石之奏聞聲生善如是之福盡歸人主謀之既臧相顧踊躍食王祿者樂於檀施荷帝力者悅之獻工役無告勞功用斯畢皇帝嘉焉賜額曰貞元無垢淨光之塔于頔字允元貞元十四年拜山南東道節度使嘗問紫玉禪師如何是黑風吹其船舫漂墮羅剎鬼國師曰于頔這客作漢問恁麼事作麼頔當時失色師指云秪這箇便是漂墮羅剎鬼國也頔聞已信受出傳燈録杜荀鶴附音釋中裴休丞相傳燈録戊辰二年觀察使裴休守宣城常與名僧講道門人謂公曰敢問三界之言未立人不知修行不見因果介景福者不為之少洎斯教也行乎中國愚人畏罪損其惡賢人望福增其善增之不已則至今當盡善矣損之不已至今當無惡矣何昏迷暴虐無減於秦漢之前福慧聰明不增於魏晉之後歸之者殊途輻湊立之者萬法雲興宜使吾人盡升覺路不宜蚩蚩庶類由古至今若斯之迷也由之之用庸非溺乎公笑謂之曰大明肇啓法不齊備聖人繼出代天為工結繩畫卦文質滋改一聖立一法生天道人事顯若符契夫燧人氏之未有火也則天無火星人無火食龜無火兆物無火災必矣少昊氏之未理金也則天無金星人無金用龜無金兆物無金災必矣及聖人攻木出火鍛石取金於是乎精芒主宰騰變上下則知世法時事隨聖人也考精神之源窮性命之表作大方便護於群生群生受之而不知蓋猶天道運行物以生茂皆謂自己孰知其然也於是問者廓然自得佛味及詔許立寺而宣城士民相鼓以萬請先立之於宣郭遂復新興寺焉休乃禮迎黃檗希運禪師至郡寓開元寺朝夕受法己巳三年休謁潭州華林覺禪師問有侍者否師曰有一兩箇休云在甚麼處覺乃喚大空小空二虎自菴後而至休驚懼師曰客在此且去二虎遂退覺嗣馬祖一禪師李商隱高僧傳并統紀隱字義山詩文奇古其讚佛偈曰吾儒之師曰魯仲尼仲尼師聃龍吾不知聃師竺乾善入無為稽首大覺吾師師師商隱慕悟達國師之道以弟子禮事之嘗苦眼疾乞達冥禱達寄天眼偈三章讀訖疾愈竺乾即天竺非韓篇藤州鐔津釋契嵩撰敘曰非韓子者公非也質於經以天下至當為之是非如俗用愛惡相攻必至聖至賢乃信吾說之不苟也其書三十篇僅三萬餘言今略録其一二云韓子與孟簡尚書書曰來示云有人傳愈近少奉釋氏者傳者之妄也潮州時有一老僧號大顛頗聰明識道理實能外形骸以理自勝不為事物侵亂要自以為難得因與往來及祭神至海上遂造其廬及來袁州留衣與之別乃人之情非崇信其法求福田利益也噫韓子雖強為之言務欲自掩豈覺其言愈多而其跡愈見韓子謂大顛實能外形骸而以理自勝不為事物侵亂也者韓子雖謂人情且爾亦何免已信其法也矣夫佛教至論乎福田利益者正以順理為福得性如法不為外物所惑為最利益也韓子與大顛游其預談理論性已廁其福田利益矣韓子何不思以為感乃復云云吾少時讀大顛禪師書見其謂韓子嘗問大顛曰云何為道大顛即默然良久韓子未及諭旨其弟子三平者遂擊其床大顛顧謂三平何為三平曰先以定動後以智拔韓子即曰愈雖問道於師乃在此上人處得入遂拜之以斯驗韓子所謂以理自勝者是也韓子雖巧說多端欲護其儒名亦何以逃識者之所見笑耶大凡事不知即已不信即休烏有知其道之如此信其徒之如是而反排其師忍毀其法君子處心豈當然乎大顛者佛之弟子也佛者大顛之師也夫弟子之道固從其師之所得也韓子善其弟子之道而必斥其師猶重人子孫之義方而輕其祖禰孰謂韓子知禮乎又曰積善積惡殃慶各自以其類至何有去聖人之道捨先王之法而從夷狄之教以求福利也此韓子未之思也夫聖人之道善而已矣先王之法治而已矣佛以五戒勸世豈欲其亂耶佛以十善導人豈欲其惡乎書曰為善不同同歸於治是豈不然哉若其教人解情妄捐身世修潔乎神明此乃吾佛大聖人之大觀治其大患以神道設教者也其為善抑又至矣深矣廣大悉備矣不可以世道輒較也孔子曰君子之於天下也無適也無莫也義之與比義也者理也謂君子理當即與不專此不蔑彼韓子徒見佛教之跡不睹乎佛教聖人之所以為教之理宜其苟排佛老也文中子曰觀極讜議知佛教可以一矣此固韓子之不知也又曰且彼佛者果何人哉其行事類君子耶小人耶若君子也必不妄加禍於守道之人如小人也其身已死其鬼不靈云云此乃韓子疑之之甚也既未決其類君子小人烏可輒便毀佛耶其閭巷凡庸之人最為無識欲相詬辱也猶知先探彼所短果可罵者乃始罵而揚之今韓子疑佛未辨其類君子之長小人之短便酷詆之不亦暴而妄乎哉幾不若彼閭巷之人為意之審也謂佛為大聖人猶不足以盡佛況君子小人耶雖古今愚鄙之人皆知佛非可類夫君子小人而韓子獨以君子小人類佛又況疑之而自不決乎誠可笑也又曰天地神祇昭布森列非可誣也又肯令其鬼行胸臆作威福於其間哉夫天地神祗誠不可誣固如韓子之言但其欲賴天地神祇不令鬼作威福此又韓子識理不至也苟自知其所知詣理理當斥斥之理不當斥則不斥知明則不待外助理當則天地自順吾輩於事是非抑揚特資此矣不類韓子外引神祇以為咒矢而賴之也易曰先天而天弗違後天而奉天時天且弗違況於人乎況於鬼神乎韓子之徒何嘗倣佛見乎聖人之心耶劉昫唐書謂韓輩詆排佛老於道未弘誠不私也史臣云是非不謬也矣又韓子讀墨謂孔子必用墨子墨子必用孔子不相用不足為孔墨及與孟簡書乃曰二帝三王群聖之道大壞後之學者無所尋逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也韓子何其言之反覆如此惑人而無準也又韓子序送高閒曰今閒師浮屠氏一死生解外謬是其為心必泊然無所起其於世必淡然無所嗜韓子為此說似知佛之法真奧有益人之性命焉夫一死生者謂死猶生也生猶死也在理若無其生死者也既見其理不死不生則其人不貪生而惡死也夫解外謬者自其性理之外男女情污嗜欲淫惑百端皆其謬妄也謬妄已釋死生既齊故其人之性命乃潔淨而得其至正者也老子曰清淨為天下正斯言似之夫性命即正豈必在閒輩待其死而更生為聖神為大至人耶即當世自真可為正人為至行既賢益賢不善必善而韓子不須與閒之言其原道乃曰絶爾相生養之道以求其所謂清淨寂滅也夫清淨寂滅者正謂導人齊死生解外謬妄情著之纍耳以全夫性命之正者也韓子為書不復顧前後乃遽作原道而後生末學心不通理視之以謂韓子之意正乎是也遂循手跡以至終身昧其性命而斐然傲佛不識韓子為言之不思也就使從閒而言自閒釋氏之所由非欲推其道為益於世意苟有益於世而君子何不稱之孔子曰大人不倡游言蓋言無益於用而不言也謂韓子聖賢之徒安得為無益之言耶將韓子雖謂文人於道尚果有所未至乎吾不知也又韓子斥潮州其女孥從之商南層峰驛遂死其後移葬韓子銘其壙恨其路死遂至罵佛因曰愈之少為秋官言佛夷鬼其法亂治梁武事之卒有侯景之敗可一掃刮絶去不宜瀾漫夫華夏有佛古今賢愚雖匹夫匹婦莫不皆知佛非鬼知其法不教人為凶惡以亂政治而韓子獨以為鬼亂治韓女自斃何關乎佛而韓子情昵私其女至乃戾古今天下之人褻酷乎不測之聖人誣毀其法尤甚列子謂西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉非此謂三王五帝三皇之言聖者也宋文帝謂其群臣何尚之等曰佛制五戒十善若使天下皆淳此化則朕坐致太平韓子叢蔽而固不省此言也余觀韓子之書見其不至若前之評者多矣始欲悉取而辨之近聞蜀人有為書而非韓子者方傳諸京師所非謂有百端雖未睹乎蜀人之書吾益言之恐與其理重姑已劉昫唐書謂韓子其性偏辟剛訐又曰於道不弘吾考其書驗其所為誠然耳欲韓如古之聖賢從容中道固其不逮也宜乎識者謂韓子第文詞人耳夫文者所以傳道也道不至雖甚文奚用若韓子議論如此其道可謂至矣而學者不復考之道理中否乃斐然徒效其文而譏沮佛教聖人大酷吾嘗不平比欲從聖賢之大公者辨而裁之以正夫天下之苟毀者而志未果然今吾年已五十者且鄰於死矣是終不能爾也吾之徒或萬一有賢者當今天子明聖朝廷至公異日必提吾書貢而辨之其亦不忝爾從事於吾道也矣浮屠即浮圖吳越王出稽古略姓錢諱忠懿留心釋教嗣位之初凡兩浙諸郡名山聖跡之處皆賜金帛創建僧伽藍福州支提山乃天冠菩薩道場王施七寶鑄天冠菩薩像一千身仍創寺宇弘麗甲於七閩焉王延永明壽禪師入府受菩薩戒署號慈化定慧禪師建伽藍於南山曰慧日永明請師居之師著宗鏡録一百卷王為製前後兩序頒入大藏流通趙王鎔五代禪林類聚并語録鎔帥真定自稱趙王一日攜諸子入東院訪從諗禪師值師坐禪不起鎔禮拜訖師以手拍膝云會麼王曰不會師云自小持齊今已老見人無力下禪床王尢加敬重翌日王命客將傳請師下禪床接之侍者曰和尚昨見大王來不下禪床今將軍來為甚麼卻下禪床師曰非汝所知這裏下等人來出山門接中等人來下禪床接上等人來禪床上接不可喚大王作中下等人恐屈大王也客將傳語王聞歡喜即請師入內供養師既屆城門闔城威儀迎之入內師才下寶輦王乃設拜請師上殿正位而坐是日齊筵將罷各問佛法師運慈悲一一開悟王讚師像曰碧溪之月青鏡中頭我師化我天下趙州昔北齊文宣帝嘗謁僧稠禪師稠坐不起迎侍者勸迎稠曰昔優填王每至問詢賓頭盧尊者尊者不下床迎後為佞臣讒王懷惡心來尊者知起迎七步七日後王失國位吾今雖寡德冀帝獲福耳宣帝俄受臣譖帝銜之將復入寺按其不敬誅之稠冥知之五更獨出寺十餘里候之須臾帝至怪問其故稠曰恐身血不淨穢污伽藍遠來就刃耳帝悚然悔謝謂尚書令楊遵彥曰朕不明幾妄黷聖師帝乃躬負稠身還寺稠罄折不受帝曰弟子負師遍天下未足謝愆云云因問曰弟子前身作何等稠曰作羅剎王是以今猶好殺蓋餘習耳稠即以盤水咒之命帝臨觀見自形正羅剎狀仍有群羅剎隨之帝大驚從受菩薩戒自是絶葷終日坐禪禮佛行道如旋風焉出通載并高僧傳宋太祖北山録并歐陽外傳疏建隆元年正月受周恭帝禪詔以是年二月十六日聖誕為長春節普度童行八千人十二月詔於廣陵戰地造寺曰建隆賜田四頃出年録初太祖目擊周世宗鎔範鎮州大悲菩薩像鑄錢太祖密訪麻衣和尚問曰自古有毀佛天子乎麻曰何必問古請以柴官家目擊可驗世宗姓柴諱榮太祖聖后柴世兄之子也太祖養為子封晉王即帝位在位六年壽三十九殂又問不知天下何日定麻曰甲子將大定因問古天子毀佛法與大周何如麻曰魏太武毀寺焚經像坑沙門故父子不得其死周武帝毀佛寺籍僧歸民未五年遽縈風疹北伐年三十六崩於乘輿國亦尋滅唐武宗毀天下佛寺在位六年年三十二神器再傳而黃巢群盜並起太祖曰天下久厭兵毀佛法非社稷福奈何麻曰白氣已兆不逾數月至申辰當有聖帝大興興則佛法賴之亦興傳世無窮請太尉默記之及即位屢建佛寺歲度僧人二年聖誕日京師及諸郡縣咸令有德沙門升座祝聖永為常準三年詔每歲試童行通妙法華經者祠部給牒披剃若特詔疏恩如建隆太平興國普度僧尼不限此例也乾德四年詔遣僧百人往西域求經開寶元年九月詔成都府造金銀字藏經各一藏敕兵部劉熙古監視五年敕雕佛經版印一藏計一十三萬版帝自用兵平列國前後造金銀字經數藏出稽古略八年上自洛陽回京手書金剛經常自讀誦趙普因奏事見之上曰不欲甲胄之士知之但言常讀兵書可也太宗國朝會要并統紀太平興國元年敕普度天下童子三年敕沙門贊寧修僧史四月敕往明州阿育王山迎真身舍利塔入禁中供養得舍利一顆造浮圖十一級下作天宮以葬之五年敕造萬尊金銅文殊菩薩像及普賢像高二丈七年詔立譯經傳法院于東京如唐故事宰輔為譯經潤文設官分職西天中印土惹爛陀羅國密林寺天息災與法天施護譯經帝製前序詔普度天下童行為僧不限有司常制自即位至八年度一十七萬餘人敕天下諸路皆立戒壇凡九十七所敕江寧府長干寺曰天禧塔曰聖感帝注四十二章經入藏頒行真宗之世西域盛貢梵典度僧二十四萬人真宗太宗第三子稽古略咸平四年天竺三藏法師法賢進新譯經帝製序五年西天三藏法師施護譯給孤長者女得度因緣經帝製繼聖教序祥符二年公主太宗第七女生不茹葷懇求出家賜名清裕號報恩慈正覺大師建崇真資聖禪院安之帝賜譯經院修心偈曰初祖安心在少林不傳經教但傳心後人若悟真如性密印由來妙理深出明理正宗記詔天下立放生池仁宗鄭景重家集帝常頂玉冠冠上琢觀音像左右以玉重請易之帝曰三公百官揖於下者皆天下英賢豈朕所敢當特君臣之分不得不爾朕冠此冠將令回禮於大士也嘉祐三年契嵩禪師進正宗記二十卷輔教編三卷定祖圖等書帝覽其書至謀道不謀名為法不為身歎愛其誠賜其書入藏出僧寶傳宸奎閣英宗仁宗之兄出統紀治平二年敕大相國寺造三朝御製佛牙讚碑翰林學士王圭撰文太宗讚曰功成積劫印文端不是南山得恐難眼睹數重金色潤手擎一片玉光寒鍊時百火精神透藏處千年瑩采完定果熏修真祕密正心莫作等間看真宗讚曰西方大聖號迦文接物垂慈世所尊常願進修增妙果庶期饒益富黎元仁宗讚曰三王掩質皆歸土五帝潛形已化塵夫子域中誇是聖老君世上亦言真埋軀秪見遺空冢何處將身示後人唯有吾師金骨在曾經百鍊色長新那吒太子送佛牙與南山宣律師神宗英宗子詔中使梁從政闢汴京相國寺六十四院為二禪八律起自元豐庚申成是壬戌之秋徽宗出南渡中興小曆并普燈崇寧元年敕書一件應天下舊來名德僧為衆師法未曾諡名者仰所屬勘會聞奏諡給師號詔天下軍州創崇寧寺又改額曰天崇寺至高宗改報恩寺光孝追崇嚴薦崇寧三年敕迎相國寺釋迦如來牙入內供養隔水晶匣舍利出如雨點因製讚曰大哉釋迦文虛空等一塵有求皆赴感無剎不分身玉瑩千輪在金剛百鍊新我今恭敬禮普願濟群倫孝宗稽古略隆興元年詔蔣山禪師了明住徑山明嗣大慧杲禪師時楊和王敬之捨蘇州莊田歲入二萬斛徑山因是豐足增益出明禪師行業碑淳熙二年夏六月一日宣若訥禪師入對內觀堂帝曰近看寶積經其文何廣訥曰華嚴般若寶積涅槃皆為大機說法文長義廣帝曰楞嚴深造淵微何故說得如此好又說得如此瀾翻訥曰佛乃識達本源者也從體起用以無盡藏三昧說默一如中使奏未時訥退光宗紹熙初帝居重華宮許訥肩輿出入注金剛般若經進呈光宗御製贊文淳熙七年秋帝召明州雪竇寺禪師寶印入對選德殿帝曰今時士大夫學孔子者多只工文字語言不見夫子之道不談夫子之心唯釋氏不以文字教人直指心源頓令悟入不亂於生死之際此為殊勝印曰非獨後世學者不見夫子之心當其孔門顏子號為具體盡平生力量只道得箇瞻之在前忽焉在後如有所立卓爾竟捉摸未著而聖人分明八字打開向諸弟子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也以此觀之聖人未嘗回避諸弟子而諸弟子自蹉過了淳熙八年御製論原道略目朕觀韓愈原道言佛老之相混三教之相絀未有能辨之者但文煩而理迂揆聖人之用心則未昭然何則釋氏專窮性命棄外形骸不著名相而於世事了不相關又何與禮樂仁義哉然尚猶立戒曰不殺不淫不盜不飲酒不妄語夫不殺仁也不淫禮也不盜義也不飲酒智也不妄語信也如此與仲尼何遠乎從容中道聖人也聖人所為孰非禮樂孰非仁義又烏得而名焉譬如天地運行陰陽循環之無端豈有意春夏秋冬之別哉此世人強名之耳亦猶仁義禮樂之別聖人所以設教治世不得不然也因其強名揆而求之則道也道也者仁義禮樂之宗也仁義禮樂固道之用也楊雄謂老氏棄仁義滅禮樂今跡老子之書其所寶者三曰慈曰儉曰不敢為天下先孔門曰溫良恭儉遜讀避御諱又曰惟仁為大老子之所謂慈豈非仁之大者耶曰不敢為天下先豈非遜之大者耶至其會道則互相偏舉所貴者清淨寧一而與孔聖果相背馳乎蓋三教末流昧者執之自為異耳夫佛老絶念無為修心身而已矣孔子教以治天下者特所施不同耳譬猶耒耜而耕機杼而織後世徒紛紛而惑固失其理或曰當如之何去其惑哉曰以佛修心以老治身以儒治世斯可也唯聖人為能同之不可不論也出中興治蹟十三朝聖政録呂蒙正字聖功出武庫太宗淳化真宗咸平間兩入相封許國公諡文穆微時窶甚嘗謁人有詩云十謁朱扉九不開滿身風雪又歸來入門懶睹妻兒面撥盡寒爐一夜灰有僧憐且奇之給其食彌月又盡乃令就居房廊隨僧粥飯遂得安心讀書獲薦僧復備裝遣之竟魁多士後執政十年郊祀俸給皆不請帝問其故對以私恩未報帝詰之以實對帝曰僧中有若人耶以恩俸與寄食之寺以酬宿德公嘗晨興禮佛祝曰不信三寶者願勿生我家願子孫世世食祿護持佛法公之姪夷簡簡之子公著並封申公皆知敬佛法今世傳飯後鐘不但謗僧而且冤屈呂公不少竹窗二筆云誣枉賢者則成口業而世所傳出野史戲文中不足信也楊億出東都并普燈録真宗朝詔撰大藏目録入藏流通諡文公其撰清規序有云或有假號竊形混於清衆致喧擾之事擯令出院者貴安清衆也或有所犯即以拄杖杖之集衆燒衣鉢道具遣逐從偏門而出者示恥辱也一不污清衆二不毀僧形三不擾公門四不泄於外四來同居聖凡孰辨且如來應世尚有六群之黨況今像末豈得全無但見一僧有過便雷例譏誚殊不知輕衆壞法其損甚大且立法防姦不為賢士然寧可格而有犯不可有犯而無教吾儒不遵孔教者尤多僧有過不玷吾儒吾儒不遵孔教自辱更甚護法論曰今之浮圖雖千百中無一能倣佛古人者豈佛法之罪也其人之罪雖然如是禮非玉帛而不表樂非鐘鼓而不傳非藉其徒以守其法則佛法殆將泯絶而無聞矣續佛壽命何賴焉濫其形服者誅之自有鬼神矣警之自有果報矣威之自有刑憲矣律之自有規矩矣吾輩何與焉蓋昔無著遇文殊時已有凡聖同居龍蛇混雜之說況今去聖逾遠求其純一也不亦難乎然念大法所寄譬猶披沙揀金裒石攻玉縱於十斛之沙得粒金一山之石得寸玉尚可以為世珍寶也非特學佛之徒為然孔子之時已分君子儒小人儒矣況茲後世服儒服者豈皆孔孟顏閔者哉雖曰學者求為君子安能保其皆為君乎耶歷觀自古巨盜姦臣強叛滑逆率多高才博學之士豈先王聖教之罪歟豈經史之不善歟由此喻之末法像教之僧敗群不律者勢所未免也沙門不畜妻子者使其事簡纍輕道業易成也易其形服者使其遠離塵垢而時以自警也惜乎竊食其門者志願衰劣不能企及古人良可歎也且導民善世莫盛乎教窮理盡性莫極乎道彼依教行道求至乎涅槃者以此報恩德以此資君親不亦至乎故後世聖君為之建寺宇置田園不忘付囑使其安心行道隨方設化名出四民之外身處六和之中其戒淨則福蔭人天其心真則道同佛祖原其所自之恩皆吾君之賜也苟能以禪律精修於天地無愧表率一切衆生小則遷善遠罪大則悟心證聖上助無為之化審資難報之恩則不謬為如來弟子矣苟遠佛祖之戒濫膺素餐罪豈無歸乎顏之推曰開闢以來不善人多而善人少何由悉責其精潔乎見有名僧高行棄而不說若睹流俗凡僧便生非毀且學者之不勤豈教者之為過俗僧之學經律何異士人之學詩禮以詩禮之教格朝廷之人略無全行者以經律之禁格出家之輩而獨責無犯哉且闕行之臣猶求祿位毀禁之侶何慚供養乎其於戒行自當有犯一披法服已墮僧數是三寶中人歲中所計齊講誦持比諸儒俗猶不啻山海也王安石字介甫武庫及行録編年熙寧間拜相封荊公後罷相歸建康奏施舊第為禪寺請沙門克文住持敕賜額曰報寧賜文號曰真淨公問張方平曰孔子去世百年生孟子後絶無人或有之而非醇儒方平曰豈為無人亦有過孔孟者公曰何人方平曰馬祖一汾陽無業雪峰存巖頭奯丹霞然雲門偃王公意未解方平曰儒門淡薄收拾不住皆歸釋氏公欣然歎服後以語張商英商英撫几賞之曰至哉此論也熙寧間公行青苗法其子雱為崇政殿說書陰為父佐務新法必行雱卒公亦罷相宴閒中一如夢寐見一使領雱荷鐵枷號泣公前謂獲譴由行青苗法公問使者乞解脫使曰建寺齊僧可免由是捨宅建寺為薦冥福熙寧八年公復相一日奏事退上曰佛法於中國有補乎公曰君子小人皆知畏罪而從善豈小補哉青苗法起自安石而子受報何也曰安石初心實欲利民而不知民之弊其子不達安石之心而左佐之故受其報故君子不可而有私心焉司馬光字君實統紀并通載元祐初拜相封溫公諡文正嘗作解禪偈其序曰文中子以佛為西方聖人信如文中子之言則佛之心可知矣今之言禪者好為隱語以相迷大言以相勝使學者倀倀然益入於迷妄故豫廣文中子之言而解之作解禪偈六首若其果然則雖中國亦可行矣其一曰忿怒如烈火利欲如銛鋒終朝常戚戚是名阿鼻獄其二曰顏回安陋巷孟軻養浩然富貴如浮雲是名極樂國其三曰孝道通神明忠信行蠻陌積善來百祥是名作因果其四曰言為百世師行為天下法久久不可掩是名不壞身其五曰仁人之安宅義人之正路行之誠且久是名光明藏其六曰道意修一身功德被萬物為賢為大聖是名佛菩薩公嘗書心經以贈僧復題其後略曰退之排佛而稱大顛外形骸以理自勝要自胸中無滯礙由是觀之於佛不為無得而所排者跡耳溫公不但不識禪而且不識孔子孔子曰吾欲無言又曰二三子以我為隱乎吾無隱乎爾豈亦好為隱語我釋迦如來說法四十九年而云吾未嘗說著一字末後拈花示衆人天罔措惟迦葉一人契旨微笑即與正法付之昔維摩示疾文殊與諸賢聖往問維摩問諸大士以何為不二法門諸大士各各答已文殊問曰仁者以何為不二法門維摩默言不答所以至道無言言生理喪故古德云口欲談而辭喪心欲緣而慮忘法華經云是法非思量分別之所能解一切聲聞緣覺菩薩所不能知唯佛與佛乃能究盡三乘賢聖尚不能測佛智況凡情而能測度哉故達磨西來不立文字直指人心見性成佛三教聖人本無言說唯以悟明心性而已奚拘文字語言乎溫公以名言道理而窺心性誠未夢見在所謂對醯雞而談浩劫向井蛙而言滄海在雞蛙知見誠為大言參軍齊王巾作頭陀寺碑云是以掩室摩竭用啓息言之津杜口毗耶以通得意之路陳瓘忠肅公云釋氏曰止止勿說老氏曰智者不言孔氏曰默而識之此祖宗之所躬行而非有言之士所能議哉瓘號了翁石室論曰溫公廣文中子意作解禪頌六首其卒章曰言為百世師行為天下法為賢為大聖是名佛菩薩噫文正公繼孔孟荀楊為大賢者也庸有不知佛哉觀其頌則文正公平生所為皆佛菩薩之心也特禪之一法雖吾門亦標表以為教外別傳自非積三二十年息心絶慮則莫能究其旨謂之隱語大言似是而實非也何則昔薛收子遇隱士負苓者謂伏羲氏畫卦泄道之密漏神之機分張太和磔裂元氣使知者不知太朴散矣矧不立文字之禪直指人心於語言形跡之表詎可常程義理而求其言說耶是不獨文正公文中子楊孟諸賢未暇留神吾徒傳教大法師輩固有不知而興謗者乃蠱毒達磨毀害二祖故先德云千人萬人中撈摝一箇半箇而已夫豈易信也哉學士李屏山出通載屏山曰蘇軾作司馬光墓志云公不喜佛曰其精微大抵不出於吾書其誕吾不信嗟乎聰明之障人如此其甚耶同則以為出於吾書異則以為誕而不信適足以自障其聰慧而已聖人之道其相通也如有關籲其相合也如有符璽相距數千里如處一室相繼數萬世如在一席故孔子曰西方有聖人焉莊子曰萬世之後一遇大聖而知其解者是旦暮遇之也其精微處安得不同列子曰古者神聖之人先會鬼神魑魅次達八方人民末聚禽獸蟲蛾備知萬物情態悉解異類音聲其所教訓無遺逸焉何誕之有孔子遊方之內故六合之外存而不論鄒衍列禦寇莊周方外之士已無所不談矣顧不如佛書之縷縷也以非耳目所及光不敢信既非耳目所及吾敢不信耶郭璞日者也十年於晉室若合符券疑吾佛不能記百萬之多劫耶左慈術士也變形於魏都皆同物色疑吾佛不能示千百億之化身耶長房壼中之遊人信之矣不信維摩丈室容三萬座與納須彌於芥子中之說乎邯鄲枕上之夢人信之矣不信多寶佛塔住五千劫耶度僧祗如彈指頃之說乎若俱不信不知光亦嘗有夢否瞑於一床栩栩少時也山川聚落森然可狀人物器皿何所不有俯仰酬醋於其間自成一世此特凡夫第六分離識之所影現者耳其力如是況以如來大圓鏡智菩薩之如幻三昧乎學者當自消息之毋虛名所劫持也伊川曰看一部華嚴經不如看一艮卦余謂程子以艮其所為止於其所當止疑釋氏止如死灰槁木而止耳故出此輕語顧豈知華嚴圓教之旨一法若有毗盧墮於塵勞萬法若無普賢失其境界豎說之則五十七聖位於一彈指如海印頓現橫說之則五十三法門在一毛端如帝網相羅德雲曾過於別峰普眼不知其正位逝多園林迦葉不聞彌勒樓閣善財能入向非此書之至學道者墮於無為之坑談玄者入於邪見之境則老莊內聖外王之說孔孟上達下學之意皆掃地矣雲棲竹窗隨筆云宋儒有言讀一部華嚴經不如看一艮卦此說高明者自知其謬庸劣者遂信不疑開邪見門塞圓乘路言不可不慎也假令說讀一部易經不如看一艮卦然且不可況佛法耶況佛法之華嚴耶華嚴具無量門諸大乘經猶是華嚴無量門中之一門耳華嚴天王也諸大乘經侯封也諸小乘經侯封之附庸也餘可知矣又新建創良知之說是其識見學力深造所到非強立標幟以張大其門庭者也然好同儒釋者謂即是佛說之真知則未可何者良知二字本出子輿氏今以三支格之良知為宗不慮而知為因孩提之童無不知愛親敬長為喻則良知者美也自然知之而非造作者也而所知愛敬涉妄已久豈真常寂照之謂哉真之與良固當有辨孔叢子云心之精神是為聖楊慈湖平生學問以是為宗其於良知何似得無合佛說之真知歟曰精神更淺於良知均之水上波耳惡得為真知乎哉且精神二字分言之則各有旨合而成文則精魂神識之謂也昔人有言無量劫來生死本癡人認作本來人者是也慈湖儒者也不觀仲尼之言乎操則存舍則亡出入無時莫知其鄉則進於精神矣復進於良知矣然則是佛說之真知乎曰亦未也真無存亡真無出入也莫知其鄉則庶幾矣而猶未舉其全也仲尼又云無思也無為也寂然不動感而遂通天下之故夫泯思為而入寂是莫知其鄉也無最後句則成斷滅斷滅則無知矣通天下之故無上三句則成亂想亂想則妄知矣寂而通是之為真知也然斯言也論易也非論心也人以屬之著卦而已蓋時未至機未熟仲尼微露而寄之乎易使人自得之也甚矣仲尼之善言心也信矣仲尼之為儒童菩薩也然則讀儒書足了生死何以佛為曰佛談如是妙理遍於三藏其在儒書千百言中而偶一及也仲尼非不知也仲尼主世間法釋迦主出世間法也心雖無二而門庭施設不同學者不得不各從其門也或言父母之喪不作佛事此晦菴家禮也嗟乎世遂有生子登樞要饒財寶而不得其為己禮一佛誦一四句偈飯一沙門復於七七日中宰牲牢致胙於宗族交遊以為崇正道闢邪說不知祗以增親之業助其沉淪死者有知當撫膺痛哭於泉下矣反不及貧人之子得報其親也豈不重可哀哉顏氏家訓古今人所讚歎而其間獨曰必作佛事顏朱皆賢者也試合而觀之音釋愎音闢戾也狠也剛愎自用也十力如來證得實相之智了達一切無能壞無能勝故名十力一知是處非處智力二知過去現在未來業報智力三知諸禪解脫三昧智力四知諸根勝劣智力五知種種解智力六知種種界智力七知一切至處道智力八知天眼無礙智力九知宿命無漏智力十知永斷習氣智力調御是佛十號之一鬷音宗釜屬又衆也祲音浸陰陽精氣相浸漸成災祥也擢音濁拔也抽也舉也用也六度即六波羅蜜以此自度度他也一布施二持戒三忍辱四精進五禪定六智慧十二緣生亦名緣起又名因緣謂無明等展轉感果名因互相由藉為緣三世相續無間斷也一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死言三世相續無間斷者謂由過去世無明行二者為因感現在世識名色六入觸受五者為果由現在果起愛取有三者為現在因出現在因感未來世生老死二者為果如是循環無間斷也四聖諦苦集滅道也苦是世間果集是世間因知苦即當斷集滅是出世間果道是出世間因欲得寂滅涅槃之樂果即當修出世之聖道也黷音讀黑也垢也圂也蒙也訐音結而斥人以為有者姬媵上音雞稱美婦女曰姬下音孕送女從嫁也石室宋志磐字靈芝號石室作佛祖統紀栩音許栩栩欣暢貌逝多園梵語逝多舊日祗陀此云戰勝是舍衛國波斯匿王道王之子園亦云林給孤長者金錢布地與太子買此地為佛建寺太子施此林樹供佛二人同心故名祗樹給孤獨園澧音里州名四部即四衆比丘比丘尼五戒男五戒女杜荀鶴唐員外郎杜荀鶴自號九華山人送僧詩日利門名路兩無憑百歲風前短焰燈只恐為僧心不了為僧心了總輸僧敕寫新譯經自秦漢晉齊梁隋唐以來未有刊字故敕寫之後至五代唐明宗長興三年宰相馮道李愚請刻九經板於是傳布甚廣此刊字印板上之始念常嘉興祥符寺華亭念常禪師集佛祖通載
