body:
  text: 廣州南海寶象林沙門弘贊在犙編明太祖高皇帝皇明護法集天下大道惟善無上其善無上者釋迦是也固大慈忍志立大悲願心行無所不至化無所不被論性原情談心妙理潔六塵之無垢淨六根之無翳去諸魔而清法界制外道以樂人天斯行斯修而歷劫無量乃降兜率至於梵宮既捨金輪而猶苦行於雪嶺時道成午夜明星相符朕觀如來以己之大覺而欲盡覺諸法界衆生其為慈也大其為悲也深可謂無上者歟昔釋迦之為道孤處雪嶺于世俗無干及其道成也善被兩間靈通上下使鬼神護衛而聽從故世人良者愈多頑惡者漸少所以治世人主每減刑法而天下治斯非君減刑法而由佛化博被之然也所以柳子厚有云陰翊王度是也梵宮即天竺迦毗羅國淨飯王宮天竺人語同梵天語書同梵天書故云梵宮遊寺記朕因憂慮既多特入寺中與禪者盤桓暫釋幾冗之一時入寺既行凡所到處無不有佛及至方丈平視兩壁皆懸水墨高僧凡四軸六人一軸三禪海水一軸了經松下一軸撫鹿溪邊一軸樂水於巖前嗚呼住持者志哉所以設此意在感動心懷堅立寂寞之機甚得其宜也何以見之如三禪海水者其海潑天飛浪煙海四際其高僧凝然舉塵而揮鼎足而坐可謂奇矣動修者一也又了經于松下對月于昊穹可謂清之極矣復有一僧前撫鹿于溪後山神以密護可謂行至矣又坦然而無慮樂然而無憂樂水於山根可謂寂寞而已斯四軸六人足可堅修者之心朕為斯而樂至暮而歸餘月復至寺由東廡而入見畫像圖形皆男女夾雜濃梳艷裹者紛然將謂動小乘而堅大乘也徐至苑中見有數架修上薔薇朕亦謂非宜也少時憩方丈顧左右壁亡其前日所有高人四軸不覺興歎矣何哉所以歎者不惟畫於薔薇不合有而有四軸高僧當懸除去皆非所宜故興歎息焉祭寶志禪師文昔者師能出世異人性備六通景張佛教使凶頑從化善者愈良及其終也擇地于鍾山之陽陰其宅而居之經今八百六十七年今朕建宮在邇其為師焚修者俯而視之因敕中書下工部造浮圖於山之左今將完成徙師於是於戲漏盡毋生人我劫終勿墮塵埃惟師神通尚饗維摩居士讚獅子座中花蕊遍廚間香積味新鮮誰人問病躊躇去鐵馬嘶風牛策鞭禪海羅漢讚爾怪且玄海氣如煙拂塵蕩垢鼎足而禪薄天飛浪何處宿緣宜哉尊者處危自然洪武九年試經給沙門度牒十年詔天下沙門講心經金剛楞伽三經命宗泐如玘長老注釋頒行又敕一切南北僧及有道善人但有願歸三寶或受五戒十戒持齋戒酒習學經典明心見性僧俗善人許令齎持戒牒隨身執照不論山林城郭鄉落村中恁結壇上座拘集僧俗人等日則講經説法化度一方夜則取靜修心十四年命度僧一千名悉給與度牒贍僧田二百五十頃有奇十八年敕建雞鳴寺造浮圖五級祠寶志公歲遣官祭祀時雲南有十僧來欲往浙江遊玩寺院敕禮部與文書咨兵部應付腳力遞送至鎮江府交卸聽從遊玩又護持朵甘思烏思藏詔大矣哉大覺金仙行矣哉歷無量阿僧祗下兜率生梵宮異哉雪嶺之修世人過者乎天上人間經劫既廣忍辱愈多方成佛道善被人世法張寰宇人有從斯道者天鑒神扶身後同遊於佛境若違斯道而慢佛者則天鑒神知羇困地獄與鬼同處直候拂石劫盡而方生其斯憂乎苦乎一念同佛則百禍煙消化為諸福今朵甘思烏思藏兩衛地方諸院上師踵如來之大教備五印之多經代為闡揚化凶頑以從善啓人心以滌愆朕謂佛為衆生若是今多院諸師亦為佛若是而為暗理王綱與民多福敢有不尊佛教而慢諸上師者就本處都指揮司如律施行毋怠五印度即五天竺十一月十八日僧録司講經法師如玘卒詔禮部辦素饌庫內支價買祭物件完備祭祀及葬遣禮部侍郎章祥致祭御親製文十九年八月八日出榜張挂禁治諸色人等毋得輕慢佛教罵詈僧人非禮攪擾違者本處官司約束欽此欽遵給出榜文頒行天下各寺張挂禁約二十一年敕僧録司於天禧寺試經度僧給與度牒烏蠻曲靖等處每三十里造一座菴自耕自食化他一境的人六月十四日敕今後但有不守戒律僧發往天界能仁寺工役二十四年旨曰曩者民間世俗多有倣僧瑜伽教者呼為善友為佛法不清顯密不靈為汙濁之所汙今後止許僧為之敢有似前如此者罪以遊食二十七年詔曰自佛去世之後諸踵佛之道所在靜處不出戶牖明佛之旨官民趨者纍代如此效佛宣揚者智人也所以佛道永昌法輪常轉邇年以來姦邪無籍之徒避患難以偷生更名易姓潛入法門由是奔走市村無異乞覓者致使輕薄小人毀辱罵詈有玷法門特敕禮部條例所避所趨者榜示之凡僧不許具僧服入公廳跪拜設若自身有犯即預先去僧服以受擒拿敢有連僧服跪公廳者處以極刑又欽賜田地稅糧全免常住田地雖有稅糧仍免雜派僧人不許充當差役官司有將寺物沒官及改充別用者即以臟論一切官民敢有侮慢於僧者治之以罪天子之量猶太虛滄海無所不容無所不納故僧有不守戒律者不加刑罰唯遣寺作役令其自慚改悔如元世祖但令閲經懺悔所以聖人心同一德豈同世俗蚊蚋之胸襟見一僧有過如冤如仇不思三教中孰能無過堯舜尚有四凶況其餘者即如族間豈得人人賢善如有過者何以捨而不誡反責他非古德有云他非不用頻頻舉己過還須漸漸除能服此語則人我除是非息矣又不但太祖世祖即魏梁唐宋代代敕約僧有過犯皆以佛律治不得與民同科如魏宣武帝景明二年詔僧有犯悉付昭玄都統法師以內律僧制判之梁武帝制僧尼犯過依佛律行罰唐高宗永徽并顯慶年二次下敕天下僧尼犯國法者以內律治不得與民同科宋徽宗宣和敕吳國公主敬重空門品官庶民有毀辱僧尼者照祥符三年指揮宋真宗年敕品官無故毀辱僧尼口稱禿字者勒停見任庶民流千里元世祖曰以俗制於僧失其崇敬遍諭天下各主綱維主掌教門護持佛法臣下聞奏云有俗僧人宜令同民帝令修補寺院以遮其過阿合麻丞相奏天下僧尼頗多混濫精通佛法可允為僧無知無聞宜令例俗膽巴帝師奏云多人祝壽好多人生怨好帝曰多人祝壽好其事乃止即如太祖高皇帝僧犯國法殺盜姦尚先去僧服方許擒拿不令辱於僧體可謂護法之至極其餘小罪但令作役而已此乃上合天心下滋黎庶如大集經云佛言其有王臣見有於佛法中出家者作大罪業但擯令出國不得鞭打何況鞭打出家具持戒者時在會一切天龍八部神衆而白佛言若諸國王見有為佛出家持戒不持戒鞭打之者我等不復護持養育如是國王捨離國去其國即有疾疫飢饉刀兵俱起非時風雨亢旱毒熱傷害苗稼若有宰官鞭打彼等其王不遮護者我等亦當出其國土所以歷代帝王皆以天心佛心而護持三寶致使天龍八部衛祐國土一切人民離諸殃患如唐朝歷代王臣皆信敬三寶故致夜不閉門斗米三錢今人不知輒輕三寶觸彼天龍威怒致令風雨失時三災疊作不自省悔而反怨王天罪莫大焉三災疾疫飢饉刀兵續原教論沈士榮撰洪武十八年翰林待詔沈士榮撰上卷七篇曰原教論觀心解內教外教辨執迹儒者參禪辨論禪辨作用是性解下卷七篇曰名儒好佛解自私辨莊老異同辨錯説諸經解較是非得失辨三教論諸師人物雄偉論其序云夫情智相違而後有教識趣相違而後有辨故分別是非所以立教不辨何以立理哉昔人欲理之明乃設難以為問答使讀之者了然不疑今儒者疑難於佛必當辨之所以立教明理也昔諸佛出世諸大菩薩化為外道各執異説問難於佛如來乃破其邪執立如是義説如是經則諸教皆由論辨而起也若唐宋大儒各執所見疑難於佛毀訾排斥或有甚焉亦或菩薩化身儒門故爾相違使有以辨之以彰至理歟果亦未造佛之閫域實有所疑歟自是以來數百年間以儒名者之於佛教或為敬信或為非議毀讚不常是非莫辨使至道不明誠可悲矣士榮自知愚陋所學不及先儒之萬一又未得吾佛證入之門伏念二教之相違久矣而智者則默然而不為之辨坐視求學之士循習舊聞或生誹謗喪內學之家珍傷名教之根本故不自揆度輒以其所非斥之言具録於前為之辨解於後著論三篇解五篇辨六篇通十四原其異同謂之論釋其疑惑謂之解明其是非謂之辨理學君子幸決擇而去取焉固不礙於聖賢之學也時洪武乙丑季夏上弦建安沈士榮謹序太宗文皇帝高祖第四子皇明護法集永樂四年迎西僧尚師哈立麻至京師先是上在藩邸聞烏思藏有尚師哈立麻者異僧也及即位遣中官侯顯齎幣往迎五歷寒暑乃至車駕躬往接之五年直隸及浙江諸郡軍民子弟披剃為僧赴經請度牒者千八百人禮部以聞二月命西僧尚師哈立麻於靈谷寺啓建法壇薦祀皇考皇妣尚師率天下僧伽舉揚普度大齋科十有四日慶雲天花甘雨甘露舍利祥光青鸞白鶴連目畢集一夕檜柏生金色花花遍於都城金仙羅漢變現雲表白象青獅莊嚴妙相天燈導引幡蓋旋繞亦既來下又聞梵唄空樂自天而降群臣上表稱賀學士胡廣等獻聖孝瑞應歌頌自是之後上潛心釋典作為佛曲使宮中歌舞之三月初六日文武等官奉天門早朝奏準奉聖旨著落禮部知道新出榜曉諭該行腳僧持齋受戒恁他結壇説法有人阻當發口外為民欽此三月封西僧尚師哈立麻為萬行具足十分最勝圓覺妙智慧善普應佑國演教如來大寶法王西天大善自在佛領天下釋教賜金百兩銀千兩彩幣寶鈔織金珠袈裟金銀器皿鞍馬賜儀仗與郡王同其徒孛羅等皆封為大國師並賜印誥金幣等物宴之於華蓋殿十一年敕江寧造大報恩寺及塔其塔始晉孝武中并州劉薩訶暴死七日而蘇觀音菩薩教於建業即江寧府洛陽臨緇鄮陰今寧波府阿育王塔成都五處皆阿育王塔往禮拜者不墮地獄訶方至丹陽望見長干有異氣於光處掘地得舍利三顆爪髮各一造塔一級藏之後稍增至三級梁天監元年改阿育王塔造長干寺出塔中舍利及爪髮髮青紺色伸之隨手長短放之屈為螺形乃高大其塔帝幸寺設無礙大會法食老少士女莫不欣悅遠近馳仰冠蓋雲集凡天下罪無輕重皆赦除之塔元末燬永樂十一年重建畢工於宣德初純用五色琉璃磚瓦凡九級級級八門舉高一十四丈照耀雲日剎表高數丈上設黃金珠寶頂奇製極工世所希有每放光明種種異相非一或有聲如雷焉長干即報恩寺前街名十七年御製諸佛菩薩名稱歌曲大小五十卷佛名經三十卷神僧九卷入藏敕僧一如編彙禪宗語録奏曰中間合無去取上曰祖師説的都是佛法不要去取宣一如等八人校勘藏經重刊藏板著衆僧用心看中書寫藏經敕問藏經校勘好否奏已七番校過御製經序十三篇佛菩薩讚跋十二篇為各經之首上問經板著幾人完奏云看工匠多少上曰著二千五百一年了得麼不敢對上曰經板刊後留在何處亦不敢對上曰安一藏者裡安一藏南京石上也刻一藏於大石洞藏著向後木的壞了有石的在是年秋御製佛曲成併刊佛經以傳九月十二日欽頒佛曲至大報恩寺當日夜本寺塔見舍利光如寶珠十三日現五色毫光慶雲捧日千佛觀音菩薩羅漢妙相畢集續頒佛經佛曲至淮安給散又現五色圓光彩雲滿天雲中現菩薩羅漢天花寶塔龍鳳獅象又有紅鳥白鶴盤旋飛繞十八年三月初六日宣僧擴思等道士袁仁等同進旨曰道家經好生紕繆且老子稱淨樂國王在於何時袁對云無年代旨問擴思且如有報恩重經等不是佛説的休入藏裏欽此上曰止如分數珠經血盆經高王經等皆非佛説不可入藏奏曰道家有太上實録謗佛上曰向年間著收來還也不曾這劉淵然該殺的道士袁奏曰太上實録多有好言語在內上曰我敬佛他謗佛留了我心不喜欽此昔元世祖焚道藏偽經時實録隱匿故魔邪流至於今也續又命尚書呂震都御史王彰齎捧諸佛世尊如來菩薩尊者名稱歌曲往陝西河南頒給神明協應屢現慶雲圓光寶塔之祥文武群臣上表稱賀上甚嘉悅中宮因是益重佛僧建立梵剎以祈福者遍兩京城內外云餘詳載護法録及稽古略神宗顯皇帝萬曆四十五年上於五臺山建龍華大會御賜錫杖衣鉢一千二百五十副盛闡宗猷月川承芳二師住持如是三年三次云尚直尚理編中吳沙門空谷景隆述太原王先生名中字克平問空谷禪師曰中也聞諸先達曰佛是聖中之至聖佛之教法大道之學也不識晦菴先生之本意何為而排之乞師一言以為啓迪空谷曰據直言之子則有所嫌忌逮欲無言又辜子問但請力學至於擴充之地而無迫隘之量然後彼之短長瞭然可見何待發問而後知乎孟子謂孔子登東山而小魯登泰山而小天下不其然歟今夫儒之論道經邦老之歸根復命佛之明心見性皆明道而弘善也書曰為善不同同歸乎治漢牟子曰君子博取衆善以輔其身此之謂也是故達人大觀庶幾明道理識言語烏可死於一人半人之語乎吾輩心宗之學微用文義貫穿道理而已子讀萬卷經書始為通方達士太原曰非一朝而可造詣吾師於理明切至當得相扣也空谷曰然則為汝隱然指歸令汝自見韓子未知佛法所以排佛及見大顛禪師後深敬佛法晦庵潛心佛學可謂博矣其排佛者心病也苟不排佛則後學多看佛書凡看佛書則見其心病矣由是密設牆塹關住後學令走不出識不破也太原曰晦庵牆塹設在何處空谷曰指程子云佛氏之言比之楊墨尤為近理所以其害為尤甚令如淫聲美色以遠之大學中庸序文或問諸書注語文公家禮喪禮篇有云不作佛事復指司馬溫公語注云世俗信浮圖誑誘等語全是晦庵心之所之不是溫公之語如是用心是其設牆塹也所以皮膚之學者偏要排佛才讀數十卷書心忿忿然遽以排佛為急務嗚呼學至宏博自然通泰排佛之心稍覺輕矣學而至化出彼牆塹之外自知排佛之非追悔不及矣當知三教之學乃至琴碁書畫百工技藝學而至於變化之地始得活機之妙不然則在死殺法裏蘧伯玉六十而化始得處心之要學而至化卒難得也太原曰學而至化固難得也且言牆塹誰能出焉空谷曰能出者是儒也未造此地者恬然受其瞞昧而不知爭能出也太原曰曾有能出者乎空谷曰有簡而言之若屏山李公石塘胡公樂軒陳公希逸林公西山真公海粟馮公松雪趙公須溪劉公德機范公曼石揭公邵庵虞公仲弘楊公大朴危公天錫薩公兼善達公溍卿黃公廉夫楊公季迪高公歐陽玄公斯道烏公仲舉張公景濂宋公叔能戴公伯溫周公伯昂葉公大章徐公達善王公君羽錢公介山王公性學李公廣孝姚公節庵高公儀之王公子啓曾公等是也司馬溫公與元城劉先生曰佛家言天堂地獄且夫實有此否元城曰佛之説此俾人易惡向善也且鄒衍謂天地之外如神州赤縣者八九莊子謂六合之外聖人存而不論凡人耳目所不及安知其無溫公動容而服膺自此敬佛溫公手書一卷心經贈僧復題其後云退之排佛而稱大顛外形骸以理自勝且胸中無滯礙由是觀之於佛不為無得而所排者迹耳已而元城曰溫公老先生深知佛法所以資治通鑑未始排佛溫公著大同集解禪偈古文孝經旨解潛虛擬太玄等書皆正直之辭斷無排佛之語文公家禮所注溫公之語虛架而無根矣濂溪二程是佛法中人爭肯排佛溫公程子排佛之言顯是晦庵所造載於二家名下以為自己排佛之本也道餘録收二程子排佛二十八條晦庵排佛二十一條總是晦庵胸中所蘊不是程子見識程子苟存此見爭能著易傳耶易傳辭理俱勝不失東林總禪師濂溪周元公口傳心受之意一模脫出渾無暌舛未嘗有此僻隘之心溫公程子不肯排佛通鑑易傳良可徵也晦庵非惟曲排佛法抑亦曲指溫公程子損其名德也太原曰程子排佛之語出於程子文集豈是晦庵所造空谷曰橫渠與濂溪同問道於東林總禪師今來橫渠西銘正蒙二書皆有排佛之語二書皆是晦庵打點并加注語集為朱子成書西銘正蒙排佛之語未必出於橫渠之口多出晦庵之筆程子文集排佛之語同此籌也橫渠與周子同問道於東林性理群書等又謂橫渠問易於程子噫橫渠年雖少於周子亦是同時人也何不問易於周子卻問易於程子此或實事亦未可知或是後人欲尊程子矯立此事亦未可知已而凡著書者互引此事泛而説之是以此事遍於群書遂為實事豈不見晦庵凡造語要人信伏便指為程子所説嗚呼證龜成鱉此之謂也太原曰何由知為晦庵之語乎空谷曰言語若認不出何以知人乎太原曰既謂知人濂溪何人也空谷曰履德君子也故無昧佛之言耳太原曰誠知人矣夫溫公正人君子二程子慎德君子吾知三子不肯謗佛如保曾參不殺人也通鑑易傳誠為證據中也亦知周程道學得於禪宗傳至晦庵不越其教不知晦庵何以昧佛之德反而排之所以問也獲聆斯語已知其心矣空谷曰濂溪窮究道學於黃龍佛印東林三禪師也程子多遊禪室多讀佛書固知程子必是慎德君子不肯叛佛晦庵立言泛用佛理反而排之者俾人不識也是故遮掩周程學佛之根然亦遮掩不盡中庸或問謂楊氏等受學於程門其言皆佛老之餘緒多説遊楊謝氏等言出於佛老晦庵明知周程楊等道學出於禪宗適之所謂其所排者設牆塹耳太原曰朱子注書多引佛語不知何書佛語注之空谷曰晦庵所用佛語若虛靈不昧此句出智度論并禪書不可限量出華嚴寶積大集等經似是而非出潭津集大學補闕全是禪語略翻變之始言一理中散為萬事末復合為一理真實無妄真實之理有是理而復有是事天地之理至實無妄聖人之心至實無妄皆是東林口授周子語意能知覺所知覺出楞嚴等經千聖相傳心法脫然有悟處又非見聞思慮之可及也物我一理固有之性心之體用吾心正而天地之心亦正萬物之本源一心之妙用活鱍鱍地徹頭徹尾做工夫到者裡咬菜根無縫塔三句語劄著病處一刀兩段一棒一條痕一摑一掌血皆出禪書并諸經注復卦引楞嚴經語為證據云非惟年有變月亦有之云云出周易附録纂注晦庵注書唯毛書一經乃是學力注成簡用佛法自餘四書等注并諸製作皆用佛法泛以佛經禪語改頭換面翻變其語而取其意如是用者遍於群書晦庵如是所用佛語又諱周程明露佛語不識晦庵是何心哉蓋欲遮掩心病盡力攔住後學不看佛書意欲滅盡佛法不顯露其心病故作感興詩云誰哉繼三聖為我焚其書噫亦有不受他瞞攔不住者識破他矣適之所謂希逸林公文獻黃公景濂宋公等是也惜乎後學被前人指昧佛者為道學之傳不昧佛者不為道學之傳如是籠住後學不敢轉動故不識抱德明理正人君子也嗚呼此之智識欲望林黃宋公何異汙池之下望蒼天也苟不能撒藩籬於大方之家破識情於真性之府不免區區縛於常人言語裏宋人昧佛者惟橫渠以至晦庵數人而已不昧佛者還多焉濂溪二蘇張九成呂東萊等是也昔者漢唐已來而至於宋黃龍佛印東林晦堂靈源大慧諸禪師等不以儒釋相分平等開導體佛之心也豈料他人將我佛法作儒法用欲歸功於自己所以轉身排佛文中子用孔孟之學著書卻敬佛法宋人用佛法著書卻排佛法欲令後學不看佛書庶不識其用佛法著書所以然也宋人於佛法中所得者如以一毫蘸水所得極少以此極少之水令後學取足受用不復入海教壞人心違悖佛法失於大善過莫大焉至於文公家禮沮人供佛不作佛事從其説者失諸善利深可愍傷夫漢唐已來君臣達士皆遵佛法豈非高明賢德乎後人不省察古今言語之是非故溺於宋人之詭計也范文正公捨宅為寺寺名天平公凡蒞所守之地必造寺度僧興崇佛法賢德之僧必與友善公之子孫蕃衍代代為官逮今不絶苟非佛福田中所植陰德感動天心能若是乎太原曰除晦庵外亦有排佛者此復何如空谷曰自無主見不能識其道之深淺唯憑晦庵之説從而排之是為隨人腳跟轉亦如水母以蝦為目𧎫鮚以蟹為足後人從晦庵而排佛猶二者之倚他物若失所倚則茫然罔措太原曰亦有不因晦庵之説而自排者此復何如空谷曰譬如世人唯識常見之物不識難見之物忽遇明月之珠夜光之璧光華璀璨流輝奪目不識是寶疑之為怪尋握利劍猛力而拒之爭知此物能使貧者富賤者貴有如是功與德也韓子見大顛後所有敬佛之辭後人刪而去之晦庵校韓文尚留韓子上大顛三通書後人再刊又將此三書一併刪去故知後人既服晦庵之藥執迷於排佛尤甚於晦庵爭知晦庵設此關竅曲排之也後人不識其所以然將為是實從實而排之所謂一人傳虛萬人傳實嗟乎晦庵設箇關竅在此後人尚識不破爭得如薛簡張拙白居易杜鴻漸李習之韓昌黎陸亙陳操李駙馬富鄭公楊次公郭公輔趙清獻馮濟川張九成呂居仁楊大年沈休文等諸大名賢能參吾宗之禪關乎佛法苟非大道曷能感諸名賢如是崇尚也若不取諸賢之大公甘屈於一人半人之己意者實未思之誤也太原曰晦庵非惟排佛抑亦排老此復何如空谷曰其於老子之教初無干涉故不欲排老若獨排佛則有譏議故以二教同而排之謂為排抵諸宗扶樹儒宗而已曾不知天生三教推不向前捺不向後為世模範不可無也如太空之有天地非天地則無覆載也太原曰或謂佛學為九流之墨家然否空谷曰子胡不知也九流載於史記漢武帝時司馬相如之所述也此時未有佛法言墨家者墨翟也墨以行事為教耳佛以大道為教統天地三教之極祖也惜相如之不遇乎遇則推尊而尚之必有可觀者也太原曰佛有兼愛近乎墨也空谷曰慈悲喜捨佛之德也豈是溺情汩志之愛乎慈悲之愛者德也溺情之愛者私也韓昌黎曰博愛之謂仁此流於情而混淆也孔子曰博施於民而能濟衆必也聖乎孟子曰惻隱之心仁之端也孔孟非溺情汩志亦非真妄混淆故可與慈悲之愛相表裏嗚呼儒宗以綱常為先明道兼之釋宗以明道為先綱常兼之衆人觀之似乎不同達人觀之而實同也夫既慈愛於衆以及鳥獸昆蟲者豈不忠於君不孝於親不修道德不弘仁義乎凡如是者未之有也太原曰晦庵所惡虛無寂滅之教新安陳氏曰老氏虛無佛氏寂滅此説何如空谷曰虛無寂滅有權實二義以權言之則虛無寂滅是空幻之語凡夫執有小乘執空中乘執不有不空大乘當體即空不墮衆數妙有非有真空不空不立一塵不捨一法縱橫逆順法法全真是故大覺世尊為破凡夫之有故乃曰此身虛幻令心寂滅為破小乘之空故乃責其陷於解脫深坑令求出離為破中乘之不有不空故乃責其縛於幻有令求大乘此皆善權方便之術也以實言之則虛無寂滅是萬有之母出生天地人物動植飛潛而至萬法者也佛教曰從無住本立一切法乃至無有少法可得然燈佛為我授記老子曰道可道非常道名可名非常名無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其竅孔子曰易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此禮曰無為而物成是天道也子思子曰上天之載無聲無臭三教聖賢之旨皆是真常寂滅真空不空初無少異佛説生滅滅已寂滅為樂蓋令空其妄情也夫天地人物以及萬類皆一氣展縮初無間然展而為陽縮而為陰陰極而陽陽極而陰靜為陰基動為陽體靜極而動動極而靜靜即虛無寂滅也靜極而動動即虛無寂滅中出生萬有也晦庵讀佛書可只見得破凡夫方便語乎可是不識虛無寂滅是萬有之母乎可是不識三教聖人之旨皆是真空寂滅之理乎可是自欺其心特爾曲説疑誤後學乎所以惡佛老為虛無寂滅之教也其脫於大理豈小小哉太原曰理學類篇程子曰聖賢以生死為本分事無所懼故不論死生佛氏之學為怕生死故只管説不休此説何如空谷曰世人識情繫縛循環生死莫之能已佛説諸經指而諭之依法修行悟明生死豈是怕生死乎世人只見幻身生死不見佛性不生不死不知生從何來死從何去設使欲知亦無所措手是以強説此言修飾而已大似不得飯喫強言不飢也孔子曰未知生焉知死又曰原始反終老子曰歸根復命賈誼曰化為異類王逸少曰死生亦大矣聖賢豈不言生死耶此章問端若是程子之語則程子見識自納敗闕矣若是後人謬指程子所説則玷辱之咎其在後人也李平山曰聖人原始反終知生死之説豈不論生死乎程子之不論生死正如小兒夜間不敢説鬼病人諱死其症難醫者也空谷曰晦庵言死者形既朽滅神亦飄散雖有銼燒舂磨且無所施此則虛無寂滅至於空蕩無歸矣且如有人臥於武林夢居金陵與彼親友同席飲食是時惟知有此飲食之身不知亦有幻身臥於武林也夢飲食者神識也亦名精魂也凡人思善思惡生死不絶者即此神識也死者受苦銼燒舂磨即此神識也是時惟知有此受苦之身不知亦有幻身死於人間也如彼夢飲食者不知亦有幻身臥於武林也當知幻身猶房屋也神識猶屋中之人也人既出之不顧房屋神識既出不顧幻身晦庵所謂形既朽滅神亦飄散雖有銼燒舂磨且無所施是則惟見幻身生滅不知神識不消滅也是猶惟知房屋傾頽不知屋中之人先出屋外渾無損也此不消滅之神識隨業受報出殼入殼或苦或樂也晦庵謂死者形朽滅神飄散然祭祀是誰受饗耶周禮禮記皆以祭祀為先祭祀之道是虛設耶宜省察之又言范文正公曰若獨享富貴而不恤宗族異日何以見祖宗于地下理學類編晦庵又曰死則氣散泯然無迹有托生者是偶然聚得不散又去湊著那生氣亦能再生晦庵既謂形朽滅神飄散泯然無迹何人羞見祖宗于地下乎何物湊著生氣而再生乎自相矛盾莫能解釋也史記等書曰魏武子謂兒顆曰吾死後可嫁吾妾未幾又曰吾死後須殺吾妾以為從葬已而顆從前命嫁之後顆為晉將臨敵秦將杜回忽有一老人結草以抗回顆乃擒回顆於夜間見老人來告曰我即嫁妾之亡父也公嫁我女故來報德耳唐太宗早聞武后欲壞其法故欲殺之袁天罡曰其人年將老若殺之則再生人世年月日長怨怒愈深太宗然之天罡謂再生人世晦庵謂形朽滅神飄散兩家之言天地懸隔孰是孰非夫天罡明理之人也豈衆人可同日而語哉問曰論語云攻乎異端斯害也矣晦庵指佛老為異端此説何如空谷曰異端者雜學也孔子謂習於雜學則害於正道之學直言而已且無蘊奧何以拗直為曲乎孔子存時佛法未至中國孔子惟聞佛之道德故稱西方有大聖人漢明帝時佛法才至中國孔子已沒六百年矣是以孔子不見佛法也既不見佛法指佛何法為異端乎佛法既為異端孔子何以指佛為聖人乎老子既為異端孔子何以言曰老聃博古知今則吾師也是以博問老子之後傳誦其語以示門弟子焉晦庵非惟曲排佛老亦悖孔子崇尚佛老也後世指佛老為異端者徒掩其德設此逢蒙之計也後學自無所燭者未免隨人指呼效而言之喚鐘作甕也一朝學到李屏山林希逸而至景濂大章諸公之地自能識破矣夫佛老者道學也指道學為異端者其為智乎不智乎其為善心乎瞞人乎汝亦學理者猶未識破也今識破之後不可死一人半人之語乎唐太宗篤志尚佛逮無加矣玄奘法師沒世之日高宗顧左右曰朕失國寶矣輟朝三日玄宗肅宗代宗宣宗尚佛尤甚代宗指南陽忠國師曰國中無寶此僧乃國寶也宋朝一十六主合三百七十年之天下王王尚佛身為帝王心為佛祖傾誠至矣惟徽宗信林靈素之言敬老求仙後無驗賜死滅其家屬也相國韓公琦侍郎歐陽修張端明祕書關彥長章表民員外郎陳舜俞等未讀佛書未知敬佛逮乎明教嵩禪師并鐔津集一出諸公自此敬佛後有好佛之甚者禮曰雖有嘉肴弗食不知其味雖有至道弗學不知其善是故學然後知不足教然後知困知不足然後能自反也知困然後能自強也豈不其然乎自晉以來謝安石才德之量經綸之手孰能加焉王羲之識量高古才思逸群孰能加焉陶淵明性情之正去住之高孰能加焉謝靈運風規瀟灑文章之精孰能加焉崔公群相天下而天下賢之孰能加焉衡陽龐蘊識見之高道學之勝孰能加焉裴晉公樹大勳業著於盛唐孰能加焉顏魯公具大節義文章書法孰能加焉相國裴公休文章之古道學之至孰能加焉二蘇子黃山谷儒學之至禪學之勝孰能加焉陳忠肅公道學政事高識美德孰能加焉狀元王日休博學智識高明正大孰能加焉未暇廣而論之略言此諸名賢篤志尚佛天下孰不知之此諸名賢道德明敏豈不逮於晦庵乎豈不逮於後世排佛之人乎蓋為意誠心正公而無私重於佛聖人之至道也晦庵多注書故後學敬之不識其心病故不擇其言皆從其説也太原曰近思録理學類編北溪性理等書皆以凡情度量佛法乞師明辨之空谷曰彼皆不識佛隨人猜忌而已以世人之心測度佛聖人境界不啻太空粒粟天地毫芒何足辨也豈不見晦庵臨訣困篤自悔曰到此時節輸黃面老子一著斯自供款也晦庵排佛老筆於書中其來三百餘年矣沮人多少善心了也沮人多少陰德了也日後天地氣數翻變其説亦未可知或有公而無私者惡其偏見鳴鼓而攻之亦未可知也太原曰中也雖不敏亦知佛法不可排也世之排者致令後學失其善心於天理何如空谷曰佛法者生育天地之大本主宰萬化之靈機上窮空界下徹地輪莫非佛之所攝如是大道何懼排乎觀其排意速欲去盡爭知愈排愈盛愈抑愈揚猶一掌擬掩太陽徒奮身力如仰面噀天自污其首逆風揚塵自坌己身然則何益矣太原曰謗佛法者有罪乎無罪乎空谷曰萬般罪過惟謗佛法者最為極重夫佛法者超度三界萬靈之大法也粉骨碎身尚不能報佛恩之萬一況欲謗乎惜乎佛法來遲老子素王不相會遇是故佛法不得老子素王發揮其道指諭後學也是以後學不識佛聖人超三界之大道輒恣其情互加誹謗自損其德自罹其殃可勝道哉可勝道哉尚直編正統間作姚廣孝撰道餘録以辨明道晦庵之言此不繁録三寶猶世間沃壤良田種甘栽而得甘果種苦栽而收苦果蒔良稻而刈粳米植荊棘而饒棘刺然田無憎愛亦無增減惟自獲其美惡又如淨地以香塗之地亦不欣以穢塗之地亦不怒惟自手而招香臭耳佛亦如是毀之佛亦不嫌敬之佛亦不愛惟自身感其殃慶而於田於佛何有損益哉或護法天龍善神見而譴謫猶傍觀者見以穢塗淨地良田種荊棘即憤而嫌責禍在目前矣若見以香塗淨地良田而種粳稻即讚仰而匡護禎祥自至而殃禍遠矣其有智者當自思之佛於我何仇輕之獲何德僧於我何冤毀之得何利豁然自省則排毀之心當下泮消矣晦庵臨訣困篤自悔云到此時節輸黃面老子一著則其已種於善因矣昔者調達藏毒藥於指甲往禮佛足欲將甲刺傷佛足令毒攻佛而佛足變為琉璃地即坼開生身陷落時心生悔敬欲稱南無佛未及佛字身已入地獄佛即與之授記於當來世成辟支佛號曰南無晦庵謗佛罪雖極重而其臨終自悔之善根將來必與調達把臂同遊也優婆塞戒經云佛言善男子為破諸苦斷除煩惱受於無上寂滅之樂以是因緣受三歸依云何三歸謂佛法僧佛者能説壞煩惱因得正解脫法者即是壞煩惱因真實解脫僧者稟受破煩惱因得正解脫故論云歸依佛者謂一切智五分法身也歸依法者謂滅諦涅槃也歸依僧者謂諸賢聖學無學功德也由此三寶常住於世不為世法之所陵慢以稱寶者如世珍寶為衆生所重今此三寶為諸群生三乘七衆之所歸仰故名三歸也彥琮法師著福田論曰夫福田者何耶三寶之謂也功成妙智道登圓覺者佛也玄理幽寂正教精誠者法也禁戒守真威儀出俗者僧也皆是四生導首六趣舟航高拔天人重踰金石譬乎珍寶劣相擬議佛以法主標宗法以佛師居本僧為弟子崇斯佛法可謂尊卑同位本末共門語事三種論體一致李卓吾卓吾諱贄萬曆間官至刺史挂冠祝髮住持龍湖率衆焚修為人豪爽英敏著述頗多有華嚴合論簡要及焚書幾卷多論佛法性理等學竹窗二筆云唐宰相杜黃裳臨終自悔不得為僧命剃染以殮又宋名執政某遺命亦然此非宿世堅持正因焉能居大位而醒然不昧風火散時具如是耿耿操略然有二説或一念之迷至死反本或故為示現警悟同流是未可知也晦庵云佛經説六根六塵六識四大十二緣生皆極為精妙又云形既朽滅神亦飄散雖有銼燒舂磨且無所施大十二緣生者乃三世因果循環不滅之定理既知三世循環不滅而復云神亦飄散雖有銼燒舂磨且無所施如此議論前後相違誠無主宰定見何能判皙三教是非而為智者立言無謬也附簡諸宰輔敘佛教隆替狀唐釋道宣漢明帝永平中上夢金人飛行殿前乃使秦景等往西域尋佛法遂獲三寶東傳洛陽畫釋迦立像是佛寶也翻四十二章經是法寶也迦竺來儀是僧寶也立寺於洛城西門度人開化自近之遠展轉住持終於漢祚魏氏一代五主四十五年隆敬漸深不聞拜毀吳氏江表四主五十九年孫權創開佛法感瑞立寺名為建初其後孫皓虐政將事除屏諸臣諫之乃止召僧而受五戒蜀中二主四十三年于時軍國謀猷佛教無聞信毀晉司馬氏東西立政一十二主一百五十六年中朝四帝崇信之極不聞異議唯東晉成帝咸康六年丞相王導太尉庾亮薨後庾冰輔政帝在幼沖為帝出詔令僧致拜時尚書令何充尚書謝廣等建議不合拜往反三議當時遂寢爾後六十二年安帝元初中太尉桓玄以震主之威下書令拜尚書令桓謙中書王謐等抗諫曰今沙門雖意深於敬不以形屈為禮迹充率土而趣超方內是以外國之君莫不降禮如育王等禮沙彌之事也良以道在則貴不以人為輕重如魏文之軌于水淚光之遇子陵等尋大法東流為日諒久雖風移政易而弘之不異豈不以獨絶之化有日用於陶漸清約之風無時害於隆平者乎玄又致書廬山遠法師序老子均王侯於三大遠答以方外之儀不隸諸華之禮乃著沙門不敬王者論五篇其事由息論載廣弘明集及安帝返政還崇信奉終于恭帝有宋劉氏八君五紀雖孝武晚年將隆虐政暫制拜君尋依先政事還停息齊梁陳氏三代一百一十餘年隆敬盡一信重逾深中原魏氏十有餘君一百五十五年佛法大行備見魏收良史唯太武真君七年聽讒滅法經於五載感癘而崩還興佛法終於靜帝傳載廣弘明集及魏書釋老志自晉失御中原江表稱帝國分十六謂五涼四燕三秦二趙夏蜀也斯諸偽政信法不虧唯赫連勃勃據有夏州凶暴無厭以殺為樂佩像背上令僧禮之後為震死及葬又震出之其子昌襲位尋為北魏所吞妻子刑刻具如蕭子顯齊書高齊在鄴六帝二十八年信重逾前國無兩事宇文周氏五帝二十五年初武帝信重佛法造寺建塔度僧二千寫經十餘部後納道士張賓之惑便受道法將除佛教有安法師著二教論以抗之論云九流之教教止修身名為外教三乘之教教靜心惑名為內教老非教主易謙所攝帝聞之存廢理乖遂雙除屏不盈五載身歿政移帝感癘疾身瘡大發而殂太子贇即帝位詔曰佛法弘大前古共崇詎宜隱沉捨而不行自今應王公下至黎庶並宜修事知朕意焉出周紀帝造像一萬餘軀命寫般若經三千部大齋八戒念佛不替出辨正録隋氏承運二帝三十七年文帝崇信載興佛法海內置塔百有餘州皆發休瑞具如圖傳煬帝初年深敬佛法後因嗣籙改革前朝雖令致敬僧竟不屈自大化東漸六百餘年三被誅除五令致拜既乖經國之典又非休明之政刳斫之虐被於亂朝抑挫之儀揚于絶代故使事理乖常尋依舊轍良以三寶為歸戒之宗五衆居福田之位雖信毀交貿殃咎推移斯自人有窊隆據道曾無興廢所以一千大聖出賢劫之大期壽六萬年住釋門之正法況乃十六尊者行化于三洲九億應供護持于四部據斯以述曆數未終焉得情斷同符儒典且易之蠱爻不事王侯禮之儒行不臣天子在俗四位尚有不屈之人況棄俗從道而便責同臣子之禮又昊天上帝嶽瀆靈祗君人之主莫不祭饗而下拜今僧受佛戒形具佛儀天龍八部奉其道而仰其容莫不拜伏於僧者故得冥祐顯徵祥瑞雜沓聞之前傳豈復同符老氏均王侯於三大者哉故沙門之宅生也財色弗顧榮祿弗縻觀時俗若浮雲達形命如陽焰是故號為出家人也所以出家不存在家之禮出俗無霑處俗之儀其道顯然百代不易之令典者也其流極廣故略述之應供即羅漢廣弘明集云內經稱沙門拜俗損君父功德及以壽命梵網經云出家人不向國王父母禮拜順正理論云國王君主於諸比丘定無希求禮敬者懼損其德及壽命故諸天神衆於優婆塞邊在家受佛五戒者亦無敢希求禮敬時北方多聞天王請目連舍利弗尊者并五百聖僧至自天宮中設供養復啓尊者曰從今後諸出家在家受佛戒者至我廟中皆應施我頌願或佛所説偈或自作頌祝願天增福壽也我等眷屬專誡護持正法令出家在家佛弟子於一切時常無惱害如昔優陀延王納佞臣讒謂賓頭盧尊者王每至問訊不起迎逆王遂生惡念今往不起當奪其命時尊者知王惡念而來即自思惟我若起迎彼便失位若不起迎彼奪我命即墮地獄寧令失位不令墮地獄便起遠迎王後七日被慰禪國王擒捉鎖腳七年乃脫出家乃佛之子塵外之賓雖未得道已是三寶中人故其受戒之日天魔震懾天帝歸依設若反敬僧寶失尊三寶既缺人天無依出家秪當立身行道以報君親代君親禮敬三寶以祝遐寧是為出家盡忠盡孝敬君愛親之大禮豈同世俗以擎拳屈膝小節而為忠孝者乎唐高宗下敕令僧拜父母程士顒等上沙門不應拜親疏臣聞佛化所資在物斯貴良田拔沉冥於六道濟蒙識於三乘其德既弘其功亦大所以佛為法王幽顯之所歸依法為良藥煩惑由之清蕩僧為佛種弘演被於來際遂使歷代英主重道德而護持清信賢明度子女而承繼固得僧尼遍於區宇垂範導於無窮佛有誠教出家不拜其親欲使道俗殊津歸戒以之投附出處兩異真俗由之致乖法綱懸殊敬相全別太常伯劉祥道曰剃髮有異於冠冕袈裟無取於章服出家故無家人之敬捨俗豈拘朝廷之禮高尚其事不屈王侯帝王有所不臣蓋此之謂也司戎奏曰釋與堯孔殊制傷毀與禮教正乖蓮花非結綬之色貝葉異削圭之旨人以束髮為華飾釋則落而不容去國不為不忠辭家不為不孝出塵滓割髮於君親奪嗜欲棄情於妻子理區分於物類不可涯檢於常塗生莫重於父母子則不謝施莫厚於天地物則不答君親之恩事絶名象豈稽首拜首可酬萬分之一者歟南山曰夫以出處之迹列聖齊規真俗之科百王同軌干木在魏高枕而謁文侯子陵居漢長揖而尋光武彼小道尚懷高蹈之行豈此沙門不乘間放之美但三寶嚮位用敷歸敬之儀五衆陳誠載啓福田之道若削同儒禮則佛非出俗之人下拜君父則僧非可敬之色是則三寶通廢歸戒絶於人倫儒道是師孔經尊於釋典在昔晉宋備有前規八座詳議足為龜鏡也又沙門不拜俗論夫沙門不拜俗者何蓋出處異流內外殊分居宗體極息慮忘身不汲汲以求生不區區以順化情超宇內迹寄寰中斯所以抗禮宸居背恩天屬化物不能遷其化生生無以纍其生長揖君親斯其大旨也出廣弘明集藏中有沙門不應拜俗等事六卷北藏縣字函南藏冠字函馮神德上釋在道前表伏惟皇帝陛下包元建極御一飛貞乘大道以流謙順無為而下濟因心會物教不肅成今乃定佛道之尊卑抑沙門之拜伏拜伏有同常禮未是出俗之因尊卑物我之情豈曰無為之妙陛下道風攸闡釋教載陳每至齋忌皆令祈福一依經教二者何獨乖違陛下者造化之神宗父母者人子之慈稱陛下以至極之重猶停拜敬之儀所生既曰人臣何得曲伸情禮捨尊就愛棄重違經緣情猶尚不通據教若為行用陛下統天光道順物流形形物尚不許違淨教何宜改作願陛下因天人之志順萬物之心停拜伏之新儀遵尊卑之舊貫庶望金光東耀不雜塵俗之悲紫氣西輝無驚物我之貴即大道不昧而得相於明時福業永貞庶重彰於聖日謹言釋崇拔上親同君不令致拜表伏聞道俗憲章形心異革形則不拜君父用顯出處之儀心則敬通三大以遵資養之重近奉恩敕令僧不拜君王而令拜其父母斯則隆於愛敬之禮闕於經典之教僧寶存而見輕歸戒沒而長隱豈有君開高尚之迹不悖佛言臣取下拜之儀面違聖旨可謂放子為求其福受拜仍獲其辜一化致疑二理矛盾伏願從君敬之禮以通臣下之儀輕黷扆旒彌增隕越謹言右大司成令狐德棻等議奏曰竊以凡百在位咸隆奉上之道當其為師尚有不臣之義況佛之垂法事越常規剃髮同於毀傷振錫異乎簪紱出家非色養之境離塵豈榮名之地功深濟度道極崇高何必破彼玄門牽斯儒轍披法服而為俗拜踐孔門而行釋禮存其教而毀其道求其福而屈其身詳稽理要恐有未愜云云唐武宗廢釋教服金丹受符籙丹發背遍體惡瘡狂亂旬日不能言而崩東晉哀帝在位四年餌長生藥藥發不能親政太后臨朝帝壽二十五崩又南唐主李升餌方七藥疽發背召齊王璟入侍疾謂璟曰吾餌金石欲益壽乃更傷生汝宜戒之是夕殂宣宗即位大復佛教詔曰會昌五年所廢寺宇釐革過當事體乖謬諸宿舊僧可仍舊修復住持有司毋得禁止敕兩街四寺各置戒壇剃度僧尼帝以道士蠱先朝毀佛教敕功德使楊欽義捕趙歸真劉玄靖鄧元超等十二人並集朝堂誅之陳其尸首又詔浙西觀察使李德裕佐毀佛教罪惡貶潮州司馬再貶崖州司戶惡疾而卒先有僧謂裕曰公當萬里南行平生應食萬羊今九千五百矣羊若盡不可還也裕不悟又夢行晉山盡目皆羊牧人曰此公平生所食也猶不悟至是振武節度使李暨饋羊四百前僧曰滿公羊數令公不還豈非業耶正月十五日長安有人夜行經穆宗陵下見朱衣執版從空下曰冢尉何在有二吏從墓出應曰在矣朱衣曰録海西君使者至也未吏曰計程可十八日方至朱衣曰何稽吏曰李炎坐毀佛教奪壽去位當與海西君同録其魂而至時有賈客鈴聲東來朱衣二吏忽不見數日帝果崩出太平廣記李炎字德裕海西君即武宗宰相李訓奏罷殿內道場沙汰僧尼是夜暴風起含元殿鴟吻俱落拔殿前三大樹壞金吾仗館舍內外城門樓觀數十餘所光化門西城俱壞士民震恐帝知忤天意亟下敕停沙汰詔復立大內儀像風頓息出舊唐史并五行志宋天台法師智磐曰人君毀佛必有濟惡魏武以崔浩周武以張賓唐武以李趙究之大法如日在天不受毀辱而君臣俱蒙惡報何不幸歟至若沙汰如桓玄在晉傳奕在唐姚崇於明皇李訓於文宗皆牽時事不遂所志若周世宗天性毀佛不得其佐韓歐天性排佛不逢其君使世宗得崔浩當甚太武韓歐逢三武不減李訓崔浩凌遲德裕竄死不令之終亦足為報然則韓歐非藉善知識道力挽回不能善其後也明矣宋徽宗神宗第十三子帝向敬佛後有道士林靈素善妖術宿於亳淮泗間乞食諸寺僧薄之府官石仲聞其吐納燒煉之術仲攜往謁宰相蔡京京致見帝靈素大言曰帝即天上長生帝君帝欣然信之賜金門羽客建通真宮以處之帝自號教主道君皇帝改天下寺為神霄玉清萬壽宮改院為觀命近臣取佛經焚棄之每一宮觀給田數千頃皆外蓄妻子置姬媵美衣玉食者幾二萬餘人十一月有星如日南行而落光照人物與月無異改佛號大覺金仙僧稱德士尼為德女而冠服之群臣諫者酷虐誅之逐僧出寺不令帶衣鉢財物而使道士安心住坐夏五月都城水高十餘丈詔林靈素禳水無驗時泗州僧伽大士降上命禳水大士登城水勢頓竭賜號巨濟大士水未至前一夕五鼓西北有赤氣數十道亙天犯紫宮北斗仰觀星皆若隔絳紗方起時拆裂有聲然後大發後數夕又作聲益大且久更猛而赤氣出西北數十百道其中聞以白黑自西北俄入東北又延及東南其聲亦不絶逮晚方止秋九月詔佛德士復釋氏所賜神霄宮并田産盡還僧寺冬十一月放林靈素歸溫州賜死出宋史并通載三報論因俗疑善惡無現驗作晉釋慧遠撰經説業有三報一曰現報二曰生報三曰後報現報者善惡始於此身即此身受生報者來生便受後報者或經二生三生百生千生然後乃受受之無主必由於心心無定司感事而應應有遲速故報有先後先後雖異咸隨所遇而為對對有強弱故輕重不同斯乃自然之賞罰三報之大略也非夫通才達識人要之明罕得其門降茲已還或有始涉大方以先悟為蓍龜博綜內籍反三隅於未聞師友仁匠習以移性者差可得而言請試論之夫善惡之興由其有漸漸以之極則有九品之論凡在九品非其現報之所攝然則現報絶夫常類可知類非九品則非三報之所攝何者若利害交於目前而頓相傾奪神機自運不待慮而發發不待慮則報不旋踵而應此現報之一隅絶夫九品者也又三業殊體自同有定報定則時來必受非祈禱之所移智力之所免也將推而極之則義深數廣不可詳究故略而言之相參懷佛教者以有得之世或有積善而殃集或有凶邪而致慶此皆現業未就而前行始應故曰禎祥遇禍妖孽見福疑似之嫌於是乎在何以謂之然或有欲匡主救時道濟生民擬步高迹志在立功而大業中傾夭殃頓集或有棲遲衡門無悶於世以安步為興優遊卒歲而時來無妄運非所遇世道交淪于其間習或有名冠四科道在入室全愛體仁慕上善以進德若斯人也含沖和而納疾履信順而夭年此皆立功六德之舛變疑嫌之所以生也大義既明宜尋其對對個有本待感而發逆順雖殊其揆一耳何者倚伏之契定於在昔冥符告命潛相回換故令禍福之氣交謝於六府善惡之報舛互而兩行是使事應之際愚智同惑謂積善之無慶積惡之無殃感神明而悲所遇慨夭殃之於善人咸謂名教之書無宗於上遂使大道扇於小成以正言為善誘應心求實必至理之無疵原其所由由世典以一生為限不明其外其外未明故尋理者自乖於視聽之內此先王即民心而通其分以耳目為關鍵者也如今合內外之道以求弘教之情則知理會之必同不惑衆途而駭其異若能覽三報以觀窮通之分則尼父之不答仲由顏冉對聖匠而如愚皆可知矣亦有緣起而緣生法雖預入諦之明而遺愛未忘猶以三報為華苑或躍而未離子淵者也推此以觀則知有方外之賓服膺妙法洗心玄門一詣之感超登上位如斯倫匹宿殃雖積功不在治理自安消非三報之所及因茲而言佛經所以越名教絶九流者豈不以疏神達要陶鑄靈府窮源盡化鏡萬象於無象者也顏之推曰夫信謗之徵有如影響耳聞目見其事已多或乃精誠不深業緣未感時儻差闕終當獲報耳善惡之行禍福所歸九流百氏皆同此論豈獨釋典為虛妄乎項橐顏回之短折原憲伯夷之凍餒盜跖莊矯之福壽齊景桓魋之富強若引之先業冀以後生更為通耳如以行善而偶鍾禍報為惡而倘值福徵便可怨尤即為欺詭則亦堯舜之云虛周孔之不實也又欲安所依信而立身乎三報證驗現報者如崔浩奉道士寇謙之道浩不喜佛謂佛法虛誕勸魏太武帝除滅佛法誅沙門毀經像浩路行見遺像必停車尿之見妻郭氏誦金剛經乃奪而焚之捐灰棄廁不久帝身殃惡癘追悔無由視浩若仇使有司執浩檻車置於城南道側使衛士十人路人行尿其面呼聲嗷嗷徹於道路自曰此吾投經尿像之現報也凌遲而死浩時年七十矣崔門既誅崔姓無遠近及盧氏郭氏柳氏皆浩親姻悉夷五族尸無收者崔寇二家親戚坐罪及於僚屬凡百二十人又積怨在人人競尿尸至糜潰乃止帝遘癘疾兩年遍身發瘡膿血交流遇弒出魏史詳載廣弘明集元魏釋老志中後周世宗乙卯九月敕毀天下寺觀鐘磬鈸鐸佛像鑄周通錢時鎮州大悲像極靈應詔下人莫敢近帝自往持斧鑱破面胸衆方毀背毀未竟群力皆墮腕死遂停其半觀者為之悚栗己未六月帝北伐疽發胸糜潰而殂於道又黑連勃勃赫連氏名勃勃即屈丐胸奴種也稱夏國對僧曰勃者佛也佛者即吾也佩佛像於背後令僧致拜是年雷震死國亦尋滅又宋元嘉年謝晦鎮荊州沙門僧昌於城內立塔晦躬役介夫令撞擊陊壞龕像摧損倏有暴風連天雲霧作昏驍烈為之膽寒晦被塵土以手拭塵膚隨指落潰爛瘡瘐體無完肌未幾坐反狀斬於市夷九族右二出北五録釋明琛每以徵難為心時有法師講經琛往徵詰不勝懷忿與一僧同伴回至中途坐樹下覺內熱解衣臥須臾兩腳合成蛇尾語伴曰速上樹蛇心至則恐吞噬便全身作蛇惟頭未變在地自打倏成蛇頭身長五丈舉首四視日如大星諸蛇總集相隨趣谷同伴目驗至鄴説之因忿心故成蛇出高僧傳又顏之推曰梁時江陵劉氏以賣鱔為業後生一兒頭具是鱔自頸已下方為人耳又王克為永嘉郡有人餉羊集賓欲宴而羊繩解來投一客先跪兩拜便入衣中客竟不言固無救請須臾宰羊者為煮先行至客一臠入口便下皮肉周行遍體痛楚號叫方乃説之遂作羊鳴而死又楊思達為西陽太守值侯景亂時復旱儉飢民盜田中麥思達遣一部曲守視所得盜者輒截手腕凡戮十餘人部曲後生一男自然無手又齊國有一朝奉家甚豪侈非手殺牛則噉之不美年三十許病篤大見群牛來舉體如被刀刺叫呼而終又江陵高偉隨吾入齊凡數年向幽州淀中捕魚後病每見群魚齧之而死尚直編云浙右有人印造佛天三界紙馬開張店業店屋楣間平鋪閣板作臥室于閣上一夜觸翻尿器淋漓污馬仍將此馬晒乾賣之本年從店中提出此人雷打死於門前又一貧家夫婦二人有絶糧忍餓之患夫攜一鵝入市鬻之得米二斗飢苦迫甚以二升沽酒飲之回至中途醉臥於地被人竊去其米及醒慞惶歸家妻知之不勝哀苦夫乃投水而死妻曰夫既死矣我何存之亦投水而死明日天雷打死一男子擲置於二尸之旁書其背云竊其米者此人也松江有人為雷打死書其背云十年前與一婦人入寺登塔第二層行淫故誅竹窗三筆云報之遲速蓋各有因緣但世人見惡者不報或更昌隆乃憤憤不平未知三世之説故也夫後之二報人不及見惟重現報今姑記現報數事目擊而非傳聞者一人撾笞婢僕動以百數一日將一僕繫頸東柱繫足西柱使伸縮無路而痛責不休其父大怒遄往解放而囑曰汝速去渠若告汝逃亡我即告渠忤逆遂得生還後此人亦以己子賣與他家而自身為鄉宦守門又一人平生笞人如官府後亦受官刑斃囹圄中一人終家內室也妄費無算後子女滅盡老無依賴為人縫補經絡一人貴宦子也驕奢佚遊侈費不知慚愧後追逐遊僧丐者趁食於諸方一人毀訾天神無所顧忌後為村民所毆得疾身殞一人辱詈如來及諸賢聖皆人不忍聞者俄而客死於外不得歸一人瞋母不悉委財帛折其供事觀音大士一臂後走馬湖塘墮落折臂幾死又一人生七女七男凡生一女才墮地即溺殺之其七男先後相繼亦死男女十四人無一存者惟老夫老婦相對哭泣而已又數人出家者我慢自賢凡時人或有言論一概呵以為非乃復輕藐先哲妄加毀訾後俱不壽皆惡疾死姑記之以警狂傲明崇禎甲戌帝毀鐘磬佛像鑄錢徐國公聞即佩太祖像齎銅鎚上殿帝潛隱深宮其事乃息時九蓮菩薩降神公主口呵責於帝帝復夢入地獄閻王以釘釘眼遂失一目即頒詔令天下人齋戒念佛余年二十有五親見其詔至甲申春李賢逆賊陷都城帝自縊而崩國亦隨滅又廣州羊城康熙辛亥年二月有一婦人藥毒前夫又推前夫姑落井死人無知者後時夜間婦即見鬼卒拘至城隍所隍與冠襆頭者同審即以鐵夾棍夾斷惡婦腳令示陽間善惡無爽平藩闖給以食置西門外馬廠前衆人往觀婦人日食如常折腳以盆盛在前自向人説過兩日便下油鍋如期作痛苦之狀不堪觀也又云更過兩日身受碎剮不數日遂死平藩令人割其首棄骸於荒郊狗食之又昔佛在世有一家夫婦二人惟共一張疊布並無餘衣夫出乞食婦在房中裸體而坐婦出乞食夫亦房中裸體時有一比丘乞食次其家夫婦二人識曰我等前生不施今生貧窮今生不施後生更苦今無餘物唯此一疊依之而活今寧捨命將此疊施即謂比丘曰大德可近窗前接疊我裸形不能出房奉施比丘感其捨命而施持回上佛時值人天王臣共集聽佛説法佛令諸比丘共分其疊為授記曰彼夫婦二人當來成佛同號白疊如來王聞佛記即為立宅給以田地奴婢又昔守末利園婢供養須菩提現為波斯匿皇后於末利園中得因名末利夫人昔一比丘得六神通一沙彌年始八歲師知沙彌餘有七日命若在此亡恐其父母怨恨即使歸家看親八日早方回路逢大雨有蟻孔水流將入沙彌以土壅決水別流八日早還師見怪之即入定見其救蟻延壽語彼令知現世增壽八十餘出譬喻經又宋郊少時隨父任應山讀書見大水漂蟻穴至郭編竹橋渡之後以陰德中狀元又萬曆己丑南京焦竑廷試寓店有婢至店遺落金叉竑拾之知主必苦治婢來覓待二日婢果來覓竑還之而試場已封忽火燒場屋覆試而竑中狀元非陰功而何故諺言若不得天火燒怎得狀元焦竑有號漪園居士生報者如隋宜州皇甫氏子名遷私取母錢六十文死託胎家內母豬腹中産豚子養兩年賣錢六百文託夢母及妻令贖之又天台國清寺僧智環將常住布十匹與本縣丞李意及環死作寺家奴背有智環字後丞死亦作寺奴背亦有李意及字又唐淮西毛罕妻周氏生子豬頭象耳騾腳魚腮人身父母欲淹死遂作人言我為先世曾借開元寺常住錢五千文麻布二匹不還故遭此罰望父母收養待長大送寺償債年十七送寺掃地時時以鐵杖自鞭叫言還債以賴債故因名賴債又孝義縣路伯達負同縣人錢一千文違契不還與錢主誓願曰若我不還公錢死後當於公家作牛未逾一年而死至二歲錢主牸牛産一赤犢子額有白毛為路伯達三字子將錢求贖主不肯乃送啓福寺運磚木造塔見者皆發善心焉又崇禎間寧波府管春打草難賣無子每日得錢但取給足餘投井中年月既纍頗不介意時有僧從乞百金春曰吾打草難賣那得銀兩僧曰但肯捨即有春曰無不肯捨僧使人淘井適得百金而去後時春被雷擊死書生朱元價以硃題尸背云佛不仁三字價後中狀元奉敕往高麗其王李倧謂價曰吾誕子今已八歲不能言笑而背上有硃字價令引出見字曰吾冤屈汝也遂即言笑價因謂王説其本末然管後生當惡報由今生施福即現生貧身償之而後身得為太子也又潮州箍桶翁每日得銀以三分買香燭供佛及死無財殯殮時王教官愍其無報於自館中書紙曰箍桶日三分燒香不顧貧天空佛不見死可問閻君教官聞州官生子往賀州官曰吾得子甚怪背有數字問是何字答箍桶日三分王曰余自書也何為現於此使人回館取來看而兒背字已滅矣後報者如經載一屠兒七生已來常為屠兒不墮惡道常生人天然其七生已前曾施緣覺尊者一食福力故七生不墮惡道而七生已來所作屠罪之業過七生已次第受之無有得脫又目連尊者多生之前名羅卜母名青提今生復為母子母由前生慳詐故墮餓鬼中目連雖神通第一而不能救佛令七月十五日齋僧是日即見母生天矣又羅旬比丘已得阿羅漢果乞食七日不得先日有長者請舍利弗尊者齋尊者愍彼次日攜往值長者有官事出門不暇授食羅旬飢死諸比丘問佛佛説其過去迦葉佛時出家阻一施主齋僧故今受斯果報由前出家功德今得阿羅漢果又阿那律尊者是佛叔之子出家證阿羅漢得天眼第一由過去劫為樵夫施辟支佛一食由是已來常生天上人間富貴之家由過去一生與賊為伴入寺劫奪見佛前燈暗剔明由此功德得天眼第一阿羅漢此云無生不受三界生死阿那律此云無滅由施一食生生福不滅故辟支佛此云獨覺又宋武帝始登位夢一道人曰君於前世施維衛佛一鉢飯今居此位帝問嚴公虛實公送七佛經呈覽維衛佛是過去劫毗婆尸佛又唐知玄法師俗姓陳五歲能詩十四歲講涅槃經三學洞貫名冠一時異迹尤多世稱為陳菩薩後忽於定中見菩薩以手摩玄頂演説妙法而安慰之言訖即隱俄見一珠入玄左股隆起痛甚上有朝錯二字遂成人面瘡然玄前身是漢袁盎奏斬錯腰於東市玄十世為高僧錯仇報不得因過受懿宗僖宗二帝寵遇一念名利心起於德有損故能報之後詣西蜀遇迦諾迦尊者洗以三昧水即愈若其名心不起縱百千世亦不能報菩薩預知故於定中説法安慰也又百丈禪師上堂一老人隨衆聽法畢衆皆退老人不退師問之答曰某迦葉佛時領徒住此因學人問大修行人邏落因果也無我答不落因果自爾五百生墮野狐身今求師代一語師令申前問答不昧因果老人拜謝曰我住山後乞依亡僧津送次日師令維那白椎送亡僧衆聚議僧無亡者師領衆至巖下以杖挑出一死野狐依茶毗葬之迦葉佛在盤古前人壽二萬歲時出世過一百年減一歲今減至人壽六七十歲間其野狐身久可知矣尚直編云永樂二十二年台州天封寺維那士弘為雷打死頃焉復蘇之自言死去見諸天神教誡曰汝先世為巡檢曲罪一夫枉惟極刑汝能奉佛故未償其命後世為住持僧將常住銅錢潛埋三窖死後遂湮沒之二世罪故今誅惟今世奉觀音大士至誠姑存之後至宣德二年溺水而死如斯三報遍諸經論傳記及現見聞者曷能勝舉哉音釋明太祖太祖御護法集數百篇雲棲護法録中未全瑜伽此言三業相應謂施食時要身口意相應𧎫鮚上音鎖下音反魚名斫音捉斬也周書云斫朝涉之脛扆旒上音衣上聲屏風高八尺下音留以絲繩貫玉垂之前後曰旒長尺寸而垂齊眉天子冠也九品優婆塞戒經云衆生造業有具不具一若先念後作名作具足二若先不念直造作者名作不具足三復有作不具足者謂作業已果報不定四復有作已不具足者謂作業已定當得報五復有作已亦具足者時報俱定六復有作已不具足者持戒正見七復有作已爾具足者毀戒邪見八復有作已不具足者三時生悔九復有作已亦具足者三時不悔如惡既爾善亦如是三時生悔者初作時正作時作已時嗷音敖哀聲嗷嗷陊音柁落也又崩也楣音枚門上橫梁宋郊渡蟻宋郊宋祁兄弟也俱應試時有胡僧襯其貌驚曰公似曾活數百萬命者郊曰我貧儒何力致此僧云不然凡有生者皆命也郊以活蟻對僧云是已公弟當大魁多士然公亦不出弟下後唱名祁果首選朝廷謂不可以弟先見改祁第七以郊為第一始信僧言不妄也五衆一比丘受佛二百五十大戒二比丘尼受佛三百四十八戒三式叉摩那受佛六法四沙彌受佛十戒五沙彌尼受佛十戒言七衆則加在家男女受五戒者
